婆樓別取低座坐於一方世尊告布吒婆樓曰布吒婆樓今汝等集此以何因緣為何論議而汝等論議因何中止耶六布吒婆樓聞是言已答世尊曰世尊吾等集此所欲論者可且置之因此等論世尊日後易得聞也世尊曩者多有外道沙門婆羅門集此論議場所就增上想滅發生論議曰增上想滅云何而起耶時有一類作是說言人人皆以無因無緣而想生無因無緣而想滅生時即有想滅時則無想斯一類者以如是說增上想滅餘者對之作是說言不然吾友想實人我也夫人我有來有去來時即有想去時即無想斯一類者以如是說增上想滅復有餘者對之作是說言不然實有沙門婆羅門具大神通與大威力彼等於人移想而來掣想而去移來則有想掣去則無想斯一類者以如是說增上想滅復有餘者對之作是說言實則不然蓋有天神具大神力與大威力其於人也移想而來掣想而去移來則有想掣去則無想斯一類者以如是說增上想滅世尊爾時我心生念念言世尊嗚呼世尊精通此法倘於此時世尊在者倘於此時善逝在者實因世尊熟知增上想滅者也世尊何者是增上想滅七布吒婆樓彼沙門婆羅門言人人皆以無因無緣而想生無因無緣而想滅固有誤也所以者何布吒婆樓有因有緣人之想生有因有緣人之想滅由於修習而一類之想生由於修習而一類之想滅世尊說言云何修習布吒婆樓今者如來出現於世如來是應供等正覺乃至身業語業清淨具足營淨生活具足戒行諸根之門悉為守護具足正念正智自知滿足參照沙門果經四至四二布吒婆樓云何比丘具足戒行布吒婆樓今有比丘捨殺離殺不用刀杖懷慚愧心充滿慈悲利益一切生類有情而住哀愍此為比丘戒行一分如是如是乃至復次或有沙門婆羅門為世所敬食他信施然於諸種無益徒勞之明若許願還願乃至給樹根施藥料除藥料等以此等明邪命自活今於是事皆悉捨離此又為比丘戒行一分參照同經四三至六二八布吒婆樓比丘如是戒行具足因戒制御故任在處處皆無怖畏如是乃至彼具足聖戒聚內心感受無垢純淨安樂布吒婆樓比丘如是具足戒行參照同經六三九布吒婆樓云何比丘守護諸根之門布吒婆樓今有比丘以眼根見色境時如是如是乃至此諸聖根具足制御內心感受無垢純淨安樂布吒婆樓比丘如是守護諸根之門乃至如是如是考照同經六四至七四一捨此五蓋觀自身者便生歡喜歡喜者生喜懷喜者身安穩身安穩便覺樂樂則心入三昧彼離諸欲離不善法有尋有伺離生喜樂入住初禪因此先滅欲想是時生離生喜樂之微妙真實想以此之故彼於是時具有離生喜樂之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一一世尊復言布吒婆樓復有比丘滅除尋伺內心靜安得心一境相無尋無伺定生喜樂入第二禪是時先滅離生喜樂之微妙真實想同時生定生喜樂之微妙真實想以此之故彼於是時具有定生喜樂之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一二世尊復言布吒婆樓復有比丘離喜住捨正念正智身受快樂如諸聖說捨念樂住入第三禪是時先滅定生喜樂之微妙真實想同時生捨樂之微妙真實想以此之故彼於是時具有捨樂之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一三世尊復言布吒婆樓復有比丘捨樂離苦先滅憂喜不苦不樂捨念清淨入第四禪是時先滅捨樂之微妙真實想同時生不苦不樂之微妙真實想以此之故彼於是時具有不苦不樂之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一四世尊復言布吒婆樓復有比丘超出所有色想滅障礙想不憶異想故達空是無邊之空無邊處因此先滅色想同時生空無邊處樂之微妙真實想以此之故彼於是時惟有空無邊處之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一五世尊復言布吒婆樓復有比丘超出所有空無邊處達識是無邊之識無邊處因此先滅空無邊處之微妙真實想同時生識無邊處之微妙真實想以此之故彼於是時具有識無邊處之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一六世尊復言布吒婆樓復有比丘超出所有識無邊處達所有皆無之無所有處因此先滅識無邊處之微妙真實想同時生無所有處之微妙真實想以此之故彼於是時具有無所有處之微妙真實想如是由修習故一想生由修習故他想滅此即由於修習也一七布吒婆樓緣比丘以達有獨特之想彼便由前至後次第以達想之極致處此想之極致時彼作念言思慮之事於我為惡不思慮事於我為善設我仍有思慮意欲我之此想雖得消滅而餘粗想將復再生我今寧可不為思慮不起意欲彼便不為思慮不起意欲不為思慮不起意欲已其想即滅餘想不生而彼達於想滅布吒婆樓如是次第以達增上想滅智定一八布吒婆樓於汝意云何汝前頗曾聞如斯次第增上想滅智定不不也世尊今吾唯知從世尊所說謂布吒婆樓緣比丘以達有獨特之想彼便由前至後次第以達想之極致處此想之極致時彼作念言思慮之事於我為惡不思慮事於我為善設我仍有思慮意欲我之此想雖得消滅而餘粗想將復再生我今寧可不為思慮不起意欲彼便不為思慮不起意欲不為思慮不起意欲已其想即滅餘想不生而彼達於想滅布吒婆樓如是次第以達增上想滅智定布吒婆樓實如是也一九世尊世尊說示想之極致為一為多耶布吒婆樓吾所說示想之極致亦一亦多如是世尊云何說示想之極致亦一亦多耶布吒婆樓實如是如是達於想滅遂如是如是現想之極致布吒婆樓故吾說示想之極致亦一亦多二世尊先有想生然後智生耶先有智生然後想生耶抑智與想非前非後而生耶布吒婆樓先有想生然後智生實由想生而智生起是以人人皆悉自知實由此緣故於吾生智慧布吒婆樓可知依此理趣先生想後生智由想生故有智生起二一世尊想即人我耶抑想與我為異耶布吒婆樓汝以何者為我耶世尊吾自思惟粗我有形四大所成段食所養布吒婆樓汝之粗我有形四大所成段食所養設若真實布吒婆樓則汝想與我實非一物布吒婆樓由此差別智可得而知想我非一布吒婆樓如是粗我有形四大所成段食所養且置不論但於此人猶有一想生他想滅布吒婆樓由此差別可得而知想我實非一二二世尊吾以我為意所成支節具足諸根圓滿布吒婆樓汝之我為意所成支節具足諸根圓滿設若真實布吒婆樓則汝之想與我實非一物布吒婆樓由此差別可得而知想我非一布吒婆樓如是我為意所成支節具足諸根圓滿且置不論但於此人猶有一想生他想滅布吒婆樓由此差別可得而知想我實非一也二三世尊吾以我為無形而想所成布吒婆樓汝之我為無形而想所成設若真實布吒婆樓則汝之想與我實非一物布吒婆樓由此差別可得而知想我非一布吒婆樓如是我為無形而想所成且置不論但於此人猶有一想生他想滅布吒婆樓由此差別可得而知想我實非一二四復次世尊人我即為想耶抑想與我為異耶斯義吾可得知不布吒婆樓人我與想為同一耶抑想與我為各異耶汝欲知此甚難甚難以汝依他宗見有他宗信忍持他宗所期以他宗之研究為歸以他宗之行持為旨故二五世尊若吾依他宗見有他宗信忍持他宗所期以他宗之研究為歸以他宗之行持為旨者故此想即為人我耶抑我與想為各異耶知之甚難如是世尊復欲請問世界常住耶唯此真實而餘為虛妄耶布吒婆樓世界常住耶唯此真實而餘為虛妄耶此為吾所不記如是世尊此世界無常耶唯此真實而餘為虛妄耶布吒婆樓世界無常耶唯此真實而餘為虛妄耶此為吾所不記復次世尊世間有限耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記如是世尊世界無限耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記二六復次世尊此命與身為一耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記復次世尊此命與身為各異耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記二七如是世尊如來死後存在耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記如是世尊如來死後不存在耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記如是世尊如來死後亦存在亦不存在耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記如是世尊如來死後亦非存在亦非不存在耶唯此真實而餘為虛妄耶布吒婆樓此為吾所不記二八世尊凡此等等世尊何故判為不記耶布吒婆樓此不與義合不與法合而非根本梵行非趣出離非趣離欲非趣止滅非趣寂靜非趣證悟非趣正覺非趣涅槃是故依吾判為不記二九如是世尊世尊所記為何者耶布吒婆樓此是苦實吾所記者也布吒婆樓此是苦集實吾所記者也布吒婆樓此是苦滅實吾所記者也布吒婆樓此是趣苦滅道實吾所記者也三然而世尊世尊所記為何故耶布吒婆樓此實合義合法是根本梵行是趣出離是趣離欲是趣止滅是趣寂靜是趣證悟是趣正覺是趣涅槃故為吾所記誠然世尊誠然善逝世尊請便今正是時於是世尊起座而去三一世尊去未久普行外道等皆向布吒婆樓普行外道作譏誚言曰布吒婆樓於沙門瞿曇所說作如是讚嘆誠然世尊誠然善逝然於世間常住耶世界無常耶世界有限耶世界無限耶命與身為一耶命與身各異耶如來死後存在耶如來死後不存在耶如來死後亦存在亦不存在耶如來死後亦非存在亦非不存在耶凡此諸問吾等不見沙門瞿曇確示一法布吒婆樓聞是言已告彼等普行外道曰諸士世界常住耶乃至如來死後亦非存在亦非不存在耶凡此諸問吾固不見沙門瞿曇確示一法但沙門瞿曇所說之道如實真正真如而住法合法矧沙門瞿曇如是善說如實真正真如住法合法之道時理智如吾者何由不讚嘆此善說法耶三二後二三日象首舍利弗與布吒婆樓詣世尊所象首舍利弗禮敬世尊坐於一面布吒婆樓亦親禮世尊殷勤問訊已就一面坐布吒婆樓白世尊言世尊世尊去未久普行外道等皆向吾作譏誚言曰布吒婆樓於沙門瞿曇所說作如是讚嘆誠然世尊誠然善逝然於世界常住耶乃至如來死後亦非存在亦非不存在耶凡此諸問吾等不見沙門瞿曇確示一法世尊吾聞是言已答彼等普行外道曰諸士世界常住耶乃至如來死後亦非存在亦非不存在耶凡此諸問吾固不見沙門瞿曇確一示法但沙門瞿曇所說之道如實真正真如住法合法矧沙門瞿曇如是善說如實真正真如住法合法之道時理智如吾者何由不讚嘆此善說法耶三三布吒婆樓彼等一切普行外道皆悉盲目為無眼子而於其中唯汝一人具眼士也布吒婆樓我所說法有決定記不決定記布吒婆樓云何名為我所說法不決定記蓋謂世界常住耶者是也布吒婆樓此為我所說法不決定記復次布吒婆樓謂世界無常耶者是也此為我所說法不決定記布吒婆樓謂世界有限耶乃至如來死後亦非存在亦非不存在耶者是也此亦為我所說法不決定記布吒婆樓何故此等為我所說法不決定記布吒婆樓以此等不與義合不與義合不與法合非根本梵行非趣出離乃至非趣涅槃故也是故此等為我所說法不決定記布吒婆樓云何名為我所說法之決定記布吒婆樓此是苦實為我所說法之決定記布吒婆樓此是苦集實為我所說法之決定記布吒婆樓此是苦滅實為我所說法之決定記布吒婆樓此是趣苦滅