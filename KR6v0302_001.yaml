曇得自在耶不得自在耶得自在也瞿曇三二婆悉咤於汝意云何諸婆羅門有愛著耶無愛著耶有愛著也瞿曇有怨心耶無怨心耶有怨心也瞿曇有瞋心耶無瞋心耶有瞋心也瞿曇有恨心耶無恨心耶有恨心也瞿曇得自在耶不得自在耶不得自在也瞿曇三三婆悉咤如是諸三明婆羅門有愛著梵天無愛著諸三明婆羅門有愛著而猶得與無愛著之梵天共行住不不也瞿曇無是事也三四善哉婆悉咤謂有愛著之彼諸三明婆羅門身滅死後得與無愛著之梵天共住無是理也三五婆悉咤實亦如是諸三明婆羅門有怨心梵天無怨心乃至諸三明婆羅門有瞋心梵天無瞋心乃至諸三明婆羅門不得自在梵天得自在諸三明婆羅門不得自在而猶得與得自在之梵天共行住不不也瞿曇無是事也三六善哉婆悉咤謂不得自在之彼諸三明婆羅門身滅死後得與得自在之梵天共住無是理也婆悉咤由是言之諸三明婆羅門以邪道為正道步趨邪道則身沈身沈遂身滅履乾燥地如渡河中是故諸三明婆羅門所有三明等於沙漠形同叢林齎致不幸者也三七婆悉咤聞如是說白世尊言瞿曇我聞沙門瞿曇明識與梵天得共住之道婆悉咤於汝意云何摩那沙迦多村距此近而不遠耶唯然瞿曇摩那沙迦多村距此近而不遠婆悉咤於汝意云何茲若有人生於是村長於是村暫時離住其村之地餘人問彼赴村道徑婆悉咤彼生是村長於是村今聞人問赴村道徑有遲疑耶不也瞿曇無有遲疑所以者何生於是村長於是村者赴村道徑能盡知故三八婆悉咤正使生於是村長於是村者聞人問彼赴村道徑或有遲疑而若如來聞人問梵天界事或達梵天界道則無有遲疑婆悉咤我知梵天知梵天界又知達此之道我之知此一如達梵天界生梵天界者三九青年婆悉咤聞如是說白世尊言瞿曇我聞沙門瞿曇明識與梵天得共住之道善哉唯願世尊瞿曇為我等故開示與梵天得共住之道於婆羅門而施拔濟婆悉咤然則諦聽當善憶念將為汝說婆悉咤報世尊言唯然四世尊言曰婆悉咤今者如來出現於世如來是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也如來於此世界天界魔界梵天界於此大衆諸天世人沙門婆羅門獨自證悟而為說示如來宣說教法初善中善終亦善文義具足示教梵行完全清淨無與倫比參照沙門果經四四一若長者若長者子若生於餘地次低種姓者聽受如來教法彼等聽受已信仰如來得信仰故作如是念障礙哉塵道家居自在哉出家生活專修梵行完全清淨耀如螺鈿若處居家殊非易易今我寧可剃除鬚髮著袈裟衣離家出家參照同經四一四二如是出家者以波羅提木叉制禁永住持戒精勤正行雖於小罪亦見怖畏受持學處而自修學身業語業清淨具足營淨生活具足戒行諸根之門悉為守護具足正念正智自知滿足參照同經四二四三至七五婆悉咤云何比丘具足戒行今有比丘捨殺離殺如是如是捨離五蓋乃至樂則心入三昧乃至離生喜樂無不普洽七六彼以慈心在於一方遍滿而住同向第二第三第四方處遍滿而住如是在上下四側一切方處向具有一切世界悉以廣大無邊無怨無瞋之慈心遍滿而住七七復次婆悉咤譬如法螺名手氣力強盛其聲殊易響徹四方婆悉咤以成滿之慈行以心解脫實亦如是於欲界業無所餘剩婆悉咤此實得與梵天共住之道也七八婆悉咤比丘住於悲心如是如是住於喜心如是如是住於捨心遍滿一方同向第二第三第四方處遍滿而住如是在上下四側一切方處向具有一切世界悉以廣大無邊無怨無瞋之捨心遍滿而住七九婆悉咤譬如法螺名手氣力強盛其聲殊易響徹四方婆悉咤以成滿之捨心以解脫心實亦如是欲界所業無所餘剩此實得與梵天共住之道也八婆悉咤於汝意云何如是而住之比丘有愛著耶無愛著耶無愛著也瞿曇有怨心耶無怨心耶無怨心也瞿曇有瞋心耶無瞋心耶無瞋心也瞿曇有恨心耶無恨心耶無恨心也瞿曇得自在耶不得自在耶得自在也瞿曇八一婆悉咤如是比丘無愛著梵天無愛著無愛著之比丘得與無愛著之梵天共行住耶唯然世尊得與梵天共行住也善哉婆悉咤當如是言無愛著之比丘身滅死後得與無愛著之梵天共住理所應爾婆悉咤如是比丘無怨心梵天無怨心乃至比丘無瞋心梵天無瞋心乃至比丘無恨心梵天無恨心比丘得自在梵天亦得自在得自在之比丘得與得自在之梵天共行住耶唯然瞿曇得與梵天共行住也善哉婆悉咤當如是言得自在之比丘身滅死後得與得自在之梵天共住理所應爾八二青年婆悉咤與跋羅陀皤闍聞是說已白世尊言嗚呼瞿曇是殊勝教也嗚呼瞿曇是殊勝教也瞿曇猶如使倒者得起隱者得現迷途者示之以道冥室燃燈有目得視可敬瞿曇亦復如是以無數方便說法示教今者我等歸依尊者瞿曇歸依法歸依比丘僧唯願世尊攝受我等自今已後至盡壽命歸依世尊為優婆塞大本經第十四第一誦品一如是我聞一時世尊在舍衛國祇樹給孤獨園花林窟時衆多比丘托鉢歸來食後集坐花林圓堂於前生事而起論議間有說言以前生如是如是故是於前生如是如是二世尊以清淨超人間天耳聞諸比丘作如是議即從座起來花林圓堂就座而坐坐已謂諸比丘曰諸比丘今集坐此何所論議互共何言未終畢耶諸比丘等聞如是問白世尊言世尊今者我等托鉢歸來食後集坐花林圓堂於前生事而起論議間有說言以前生如是如是故是於前生如是如是世尊互共言畢時世尊來三諸比丘汝等欲聞前生法言耶世尊世尊講說前生法言正是良時善逝正是良時諸比丘等聞世尊說謹當受持諸比丘諦聽諦聽應善憶念我當說之諸比丘等諾世尊言敬聽世尊四世尊