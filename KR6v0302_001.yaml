二如是如是其心傾注於智見如是乃至此又為彼智明一分乃至無復來此生此又為彼智明一分阿摩晝此是其智明也參照同經八三至九八阿摩晝如是比丘足稱智成就德成就智德成就若有較此智德成就更殊勝者絶無有也三阿摩晝於此無上智德成就有失敗因敗因有四云何為四阿摩晝今有沙門或婆羅門不達無上智德成就之境而擔負道具以自落果實為食行於曠野入深林中彼非智德成就者僅其侍者耳阿摩晝此是無上智德成就第一敗因阿摩晝復有沙門或婆羅門不達無上智德成就亦不達自落果實為食之境而持鋤負籠食莖根果行於曠野入深林中彼非智德成就者僅其侍者耳阿摩晝此是無上智德成就第二敗因阿摩晝復有沙門或婆羅門不達無上智德成就之境不達自落果實為食亦不達莖根果食之境而於村城起護摩堂以奉事火彼非智德成就者僅其侍者耳阿摩晝此是無上智德成就第三敗因阿摩晝復有沙門或婆羅門不達無上智德成就之境不達自落果實為食不達莖根果食亦不得事火之境於四通衢道起四門屋諸從東西南北四方沙門或婆羅門來此屋者隨力供給彼非智德成就者僅其侍者耳阿摩晝此是無上智德成就第四敗因阿摩晝無上智德成就有如是四敗因四阿摩晝於汝意云何汝及汝師得謂有此無上智德成就不瞿曇不謂也我及我師如何人耶無上智德成就如何事耶瞿曇我及我師去此無上智德成就皆為遠也阿摩晝於汝意云何汝不得達無上智德成就之境其擔負道具與汝師共以自落果實為食行於曠野入森林不不也瞿曇阿摩晝於汝意云何汝不達無上智德成就亦不達自落果實為食之境其持鋤負籠與汝師共食莖根果行於曠野入森林不不也瞿曇阿摩晝於汝意云何汝及汝師不達無上智德成就不達自落果實為食亦不達莖根果食之境其於村城起護摩堂奉事火不不也瞿曇阿摩晝於汝意云何汝及汝師不達無上智德成就不達自落果實為食不達莖根果食亦不達事火之境其於四通衢道起四門屋諸從東西南北四方沙門或婆羅門來此屋者隨力供給不不也瞿曇五阿摩晝汝及汝師於無上智德成就全無資格復次於無上智德成就之四敗端亦無資格阿摩晝汝師婆羅門沸伽羅娑羅如是放言禿頭沙門卑陋下劣習黑冥法彼等何得與通三明之婆羅門交談共論而彼自身雖次劣行亦不得成就阿摩晝汝師之言何其禍汝六阿摩晝婆羅門沸伽羅娑羅受拘薩羅國波斯匿王供養而王於彼不許一面波斯匿王與彼共議隔幕而談阿摩晝波斯匿王於純正受食者云何不許與之一面阿摩晝汝師之言何其禍汝七阿摩晝於汝意云何設若波斯匿王或坐象首或坐馬背或立車台與其大臣若諸王子有事共議王離其處立於一方時設有首陀羅族者或首陀羅僕來而彼首陀羅族或首陀羅僕立於王處論議王事云如王語言王所言詢王所詢彼寧得為王或為副王不不也瞿曇八阿摩晝汝之為汝有如是者昔婆羅門諸衆仙人如呵咜摩婆摩婆摩提婆毗婆審咜耶婆提伽鴦耆羅跋羅陀皤闍婆摩咜迦葉婆咎作祕典誦祕典今之婆羅門於此等古典聖句所歌所語所集載者倣效而歌倣效而語效言所言效說所說唯此而已乃謂如是我阿摩晝與我師誦此祕典於是汝為仙人得入仙道無是理也九阿摩晝於汝意云何汝曾於婆羅門長老師或師之師聞是說不昔婆羅門諸衆仙人如阿咜摩乃至婆咎作誦祕典今之婆羅門於此等古典聖句所歌所語所集載者倣效而歌倣效而語效言所言效說所說唯此而已彼等古仙如汝師徒今之所為頗行沐浴塗油整髮髯著華鬘飾瓔珞著白衣五欲自恣不不也瞿曇一彼等如汝師徒今之所為食白米飯諸種湯汁諸種肴味不不也瞿曇彼等如汝師徒今之所為以麗裝美女隨侍不不也瞿曇彼等如汝師徒今之所為乘華尾馬車手執長棒鞭撻而行不不也瞿曇彼等如汝師徒今之所為深溝高壘固戶堅關以健者持長劍為守護不不也瞿曇阿摩晝汝及汝師以是應非仙人不入仙道然則阿摩晝無論何人有疑我者問我可也我當為說一一爾時佛出於大房舍經行阿摩晝隨佛經行於佛身中數求三十二大人相目觀佛身盡見餘他諸相唯不見二相此二相者即馬陰藏相及廣長舌相以此生疑而心不定不起信心一二佛知其念即示神力使阿摩晝見馬陰藏佛復出舌舐兩耳竅及兩鼻孔并以其舌覆全額面時阿摩晝如是思惟沙門瞿曇三十二相皆悉具足即白佛言瞿曇我等當去以事甚忙阿摩晝汝可隨意時阿摩晝乘馬車去一三爾時婆羅門沸伽羅娑羅與衆婆羅門俱出郁伽羅於己學園坐待阿摩晝時阿摩晝往詣學園及車止處下車步至沸伽羅娑羅所至則與師問訊於一面坐沸伽羅娑羅問阿摩晝作如是言一四阿摩晝已見尊者瞿曇不我等已見阿摩晝尊者瞿曇有大名聲如所聞不尊者瞿曇如其人不尊者瞿曇有大名聲實如所聞尊者瞿曇實如其人無有虛也彼具足三十二大人相一無所缺阿摩晝汝與瞿曇有共論不我與瞿曇論議往返共論何事阿摩晝即以與佛共論具白其師一五沸伽羅娑羅聞是言時告阿摩晝言咄哉何事我之學徒似是而非如是為使命者身當分散死墮地獄阿摩晝汝語攻瞿曇反為瞿曇泄我祕事咄哉何事我之學徒似是而非如是為使命者身當分散死墮地獄彼起忿怒心蹴退阿摩晝即欲往詣佛所見佛一六爾時餘諸婆羅門告沸伽羅娑羅言今日已遲詣見瞿曇非是時也待諸明日當往詣見沸伽羅娑羅在己舍中備嚼噉食載之車上持篝火俱出郁伽羅往詣伊車能伽羅林及車止處下車徒步進至佛所到佛所問訊已一面坐沸伽羅娑羅婆羅門於一面坐作如是言一七瞿曇我弟子阿摩晝已來不汝弟子阿摩晝已來瞿曇與阿摩晝有共論不有也共論何事爾時佛以共論事具告沸伽羅娑羅沸伽羅娑羅聞說已白佛言瞿曇阿摩晝愚人也唯願尊者恕阿摩晝婆羅門彼阿摩晝當得安穩一八爾時沸伽羅娑羅婆羅門於佛身中數求三十二大人相於三十二相中盡見餘相不見二相唯於此馬陰藏相及廣長舌相生疑惑念而心不定不起信心一九佛知其念即示神通力使沸伽羅娑羅見馬陰藏佛復出舌舐兩耳竅及兩鼻孔并以其舌覆全額面時沸伽羅娑羅如是思惟瞿曇具足三十二相一無所缺即白佛言唯願尊者聽受我請請從今日與比丘衆俱共食膳佛默然受請二時沸伽羅娑羅知佛許可及時白佛言尊者瞿曇時已到食已辦時佛於晨著下衣攜上衣持鉢與比丘衆往詣其舍就座而坐爾時沸伽羅娑羅以甘美嚼食噉食手自斟酌供佛滿足勸請盡量諸青年婆羅門則敬待比丘衆見佛食訖洗鉢洗手畢沸伽羅娑羅取一低座於一面坐二一沸伽羅娑羅坐於一面佛為循序說法示教即施論戒論生天之論說諸欲災厄邪惡穢污及出離利益佛知沸伽羅娑羅心已調柔障已除去信念鬱勃為說諸佛證悟法義即苦及苦因苦滅及苦滅道時沸伽羅娑羅猶如淨潔白疊易為受染即於座上遠塵離垢得生法眼知無論何物凡集起者終歸滅盡二二爾時沸伽羅娑羅見法達法悟法入法度疑去惑得確信心唯從師佛教不從餘道即白佛言善哉瞿曇善哉瞿曇猶如使顛覆者得起幽閉者得開迷途者示之以道冥室燃燈有目得視從瞿曇故以無數方便明導說法亦復如是瞿曇我今率妻子及弟子眷屬歸依佛法及比丘僧唯願聽我自今已後盡壽歸依為優婆塞唯願尊者於郁伽羅至沸伽羅娑羅舍亦如至餘優婆塞舍當使青年婆羅門諸男女衆問訊作禮與座及水起信心者當於彼等永有饒益永得安樂佛言婆羅門所言甚善種德經第四一如是我聞一時世尊在鴦伽國與大比丘衆五百人俱輾轉遊行至瞻婆城止宿伽伽蓮池側時有婆羅門名曰種德住瞻婆城其城生活饒裕富水草木五穀豐盛由摩揭陀王斯尼喻頻婆娑羅授封此城以為淨施二時瞻婆城內婆羅門長者居士聞如是言彼釋迦族出家釋子沙門瞿曇與大比丘衆五百人俱輾轉遊行至瞻娑城止宿伽伽蓮池側世尊瞿曇具足普聞如是美稱此世尊者是阿羅漢等正覺明行足善逝世間解無上士調御丈夫天人師覺者世尊也彼於此世界天界魔界梵天界於此大衆諸天世人沙門婆羅門自身證悟為他說示彼之說法初語亦善中語亦善終語亦善文義具足示教梵行完全清淨完善圓滿如是阿羅漢宜覲見也瞻婆城內諸婆羅門長者居士隊隊相隨即共出城欲詣伽伽蓮池側三爾時種德為午睡故居屋台上見此婆羅門衆隊隊相隨出瞻婆城往詣伽伽蓮池側問侍者曰婆羅門諸長者以何因緣隊隊相隨出瞻婆城往詣伽伽蓮池側釋子沙門瞿曇由釋迦族出家彼與大比丘衆五百人俱遊鴦伽國至瞻婆城止伽伽蓮池則世尊瞿曇具足普聞如是美稱此世尊者是阿羅漢等正覺明行足善逝世間解無上士調御丈夫天人師覺者世尊也此諸人等欲往覲見彼瞿曇耳侍者曷往婆羅門諸長者所持我之聲語諸人曰卿等且住我亦當共俱詣彼瞿曇所侍者稱諾至諸長者所語諸人曰種德有言卿等且住我亦當共俱詣彼瞿曇所四時有婆羅門五百人以少因緣從各方來止宿瞻婆城彼等聞言種德當往覲見瞿曇彼等至種德所如是問言可敬之種德欲往覲見沙門瞿曇有是事不諸卿我作是念亦當往見沙門瞿曇可敬之種德勿往相見種德往見瞿曇非至當也若往相見減種德聲揚瞿曇名減卿之聲揚彼之名故種德不應詣彼瞿曇應詣此見卿種德五所以者何種德父母真正血統清淨遠溯七世譜系不紊不為他人之所輕毀故種德不應詣彼瞿曇應詣此可敬之種德多有財寶為大富裕如是如是瞿曇應詣此可敬之種德誦經持咒於三吠陀吠陀名義集楷書知明語源論及第五古傳說皆悉通曉知語法論通順世論解大人相可敬之種德顏貌端美色麗如蓮丰姿有威無卑陋容可敬之種德有德修德修德成就可敬之種德所談清朗所言優雅語無嗄聲意味明確辨才具足可敬之種德為師中師三百學子教暗誦呪衆多學子由各方來欲勤習咒可敬之種德齡高齒尊經驗富足耆老之人而沙門瞿曇年事幼稚出家人耳可敬之種德為摩揭陀王崇敬尊重可敬之種德為婆羅門沸伽羅娑羅崇敬尊重可敬之種德居瞻婆城受封於王以為淨施其城饒裕富水草木五穀豐盛即此一端種德亦不應詣彼瞿曇應詣此六種德聞言已告諸婆羅門曰諸卿當聽我說我等往覲瞿曇事屬至當瞿曇來見我等非至當也諸卿沙門瞿曇父母真正血統清淨遠溯七世譜系不紊不為他人之所輕毀故瞿曇不應來此我等固應詣彼沙門瞿曇捨離衆親而出家沙門瞿曇地中地上金塊纍纍棄捐不顧而出家沙門瞿曇青年貌美黑髮如漆捨離友好而出家沙門瞿曇父母涕泣不之贊同而彼剃除鬚髮著袈裟衣離家出家入於出家生活沙門瞿曇顏貌端美色麗如蓮丰姿有威無卑陋容沙門瞿曇具足戒行有高貴德善德成就沙門瞿曇所談清朗所言優雅語無嗄聲意味明確辨才具足沙門瞿曇為師中師沙門瞿曇永滅貪欲心離動搖沙門瞿曇為業論者行為論者唯彼始得婆羅門族之所尊信沙門瞿曇由尊貴之剎帝利族出家諸卿瞿曇有豐盈財産由大富種姓出家諸卿衆多之人來自遠方請問瞿曇諸卿數千天人歸依瞿曇諸卿瞿曇聲名普聞一切此世尊者是阿羅漢等正覺明行足善逝世間解無上士調御丈夫天人師覺者世尊也諸卿瞿曇具足三十二相諸卿沙門瞿曇值一切人先自開口即稱善來言語親和