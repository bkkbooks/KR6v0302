盡壽歸依為優婆塞三明經第十三一如是我聞一時世尊欲於拘薩羅國人間遊化與大比丘衆五百人俱至拘薩羅之摩那沙迦多婆羅門村止住是村之北阿致羅筏底河邊之菴羅林二爾時摩那沙迦多村住有名聞甚高而又富裕諸婆羅門如商伽婆羅門多梨車婆羅門沸伽羅娑羅婆羅門生漏婆羅門忉提耶婆羅門等及餘諸婆羅門皆為名聞甚高而又富裕之人也三時有婆悉咤及跋羅陀皤闍二人為休養故遊步諸方互共論議正道邪道四青年婆悉咤曰此為正道此道真正欲解脫者行此正道可入梵天得與共住此是沸伽羅娑羅婆羅門所說五青年跋羅陀皤闍曰此為正道此道真正欲解脫者行此正道可入梵天得與共住此是多梨車婆羅門所說六青年婆悉咤不能說服青年跋羅陀皤闍而青年跋羅陀皤闍亦不能說服青年婆悉咤七時青年婆悉咤語青年跋羅陀皤闍曰跋羅陀皤闍彼釋迦族出家釋子沙門瞿曇現住摩那沙迦多村北阿致羅底河邊之菴羅林世尊瞿曇有美名稱遍流於世彼世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛陀世尊也跋羅陀皤闍我等當詣沙門瞿曇所共向瞿曇問如是義沙門瞿曇有所言說我等如言當共奉持青年跋羅陀皤闍答青年婆悉咤曰唯然八於是青年婆悉咤及跋羅陀皤闍往世尊所至世尊所禮敬問訊於一面坐坐一面已青年婆悉咤問世尊曰瞿曇今者我等遊步諸方互共論議正道邪道我言此為正道此道真正欲解脫者行此正道可入梵天得與共住此是沸伽羅娑羅婆羅門所說而跋羅陀皤闍言此為正道此道真正欲解脫者行此正道可入梵天得與共住此是多梨車婆羅門所說瞿曇於是互有論爭互有異議各持所說莫衷一是九婆悉咤汝今如是言此為正道此道真正欲解脫者行此正道可入梵天得與共住此是沸伽羅娑羅婆羅門所說而青年跋羅陀皤闍作如是言此為正道此道真正欲解脫者行此正道可入梵天得與共住此是多梨車婆羅門所說婆悉咤汝等論爭異議各異所說為何者耶一瞿曇所說實為正道邪道也瞿曇設若諸婆羅門例如阿陀利耶婆羅門提提利耶婆羅門瞻陀迦婆羅門瞻陀筏婆羅門沸羅服摩遮利耶婆羅門說種種道而此等求解脫之諸婆羅門各行其道能盡入梵天得與共住不瞿曇猶如村城附近有多種異道皆向村城瞿曇諸婆羅門例如阿陀利耶婆羅門提提利耶婆羅門瞻陀迦婆羅門瞻陀筏婆羅門沸羅服摩遮利耶婆羅門實亦如是說種種道而此等求解脫者各行其道能盡入梵天得與共住不一一婆悉咤汝言彼等能至梵天耶瞿曇我言彼等能至梵天婆悉咤汝言彼等能至梵天耶瞿曇我言彼等能至梵天婆悉咤汝言彼等能至梵天耶瞿曇我言彼等能至梵天一二婆悉咤通達三明之諸婆羅門中亦有一婆羅門得見梵天者不不也瞿曇無有見者婆悉咤通達三明之諸婆羅門中亦有一師得見梵天者不不也瞿曇無有見者婆悉咤通三明之諸婆羅門中亦有師之師得見梵天者不不也瞿曇無有見者婆悉咤通三明之諸婆羅門中亦有七世先師得見梵天者不不也瞿曇無有見者一三然則婆悉咤通達三明之婆羅門中有創作聖歌傳持此之諸古仙今諸三明婆羅門不過隨古仙教諷詠此等古仙所遺讚歌歌詠詩書重誦其歌重說其語而已若斯古仙如阿咤摩婆摩婆摩提婆毗婆審咤耶婆提伽鴦耆羅跋羅陀皤闍婆悉咤迦葉婆咎曾為如是言耶梵天在何處從循何道得詣梵天向於何處得至梵天於如是問我等知之我等見之不也瞿曇無有言者一四婆悉咤如是三明婆羅門中無一婆羅門見梵天者三明婆羅門中無有一師見梵天者三明婆羅門中無一其師之師見梵天者三明婆羅門中七世先師無有見梵天者三明婆羅門中有創作聖歌傳持此之諸古仙今諸三明婆羅門不過隨古仙教諷詠此等古仙所遺讚歌歌詠詩書重誦其歌重說其語而已若斯古仙如阿咤摩婆摩婆摩提婆毗婆審咤耶摩提伽鴦耆羅跋羅陀皤闍婆悉咤迦葉婆咎不曾為如是言梵天在何處從循何道得詣梵天向於何處得至梵天於如是問我等知之我等見之然彼諸三明婆羅門為如是言此實正道此道真正求解脫者行此正道可入梵天得與共住言雖如是我等猶未知見唯隨此種教言而說得與梵天共住道耳婆悉咤於汝意云何諸三明婆羅門設如是言無意義不誠然瞿曇諸三明婆羅門設如是言無意義也一五婆悉咤彼諸三明婆羅門以不自知不自見之教說與梵天能得共住之道曰此實正道此道真正求解脫者行此正道可入梵天得與共住無是理也婆悉咤猶如盲人次第踵接排成一列其先者不能見中者亦不能見後者亦不能見婆悉咤諸三明婆羅門之言有若盲人如是踵列其先者不見中者亦不見後者亦不見此諸三明婆羅門之言誠屬可笑有名無實空虛言也虛妄言也一六婆悉咤於意云何諸三明婆羅門覩見日月諸餘之人亦見日月於日月出沒時合掌禮敬祈禱讚嘆面向日月出沒處不唯然瞿曇諸三明婆羅門覩見日月諸餘之人亦見日月於日月出沒時合掌禮敬祈禱讚嘆面向日月出沒處所一七婆悉咤於意云何諸三明婆羅門覩見日月諸餘之人亦見日月於日月出沒時合掌禮敬祈禱讚嘆面向日月出沒處所而謂此為正道此道真正求解脫者行此正道可至日月得與共住得作如是言不教示應得與日月共住之道不不也瞿曇不得作如是說言一八婆悉咤諸三明婆羅門見彼日月諸餘之人亦見日月於日月出沒時合掌禮敬祈禱讚嘆面向日月出沒處所於此為正道此道真正求解脫者行此正道可至日月得與共住彼等不能如是言不能說與日月得共住道復次諸三明婆羅門何能得見梵天耶復次諸三明婆羅門