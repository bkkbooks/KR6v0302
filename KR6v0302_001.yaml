貌亦非輕呪輕生系者二種德有甥名曰鴦伽在婆羅門為一青年時侍座中種德尋告諸婆門言可敬諸卿我甥鴦伽汝等見不唯然見也諸卿青年鴦伽顏貌端美色麗如蓮丰姿有威無卑陋容今諸大衆普共集此衆之顏貌唯除瞿曇無及彼者諸卿鴦伽誦經持呪於三吠陀吠陀名義集楷書知明語源論及第五古傳說皆悉通曉知語法論通順世論解大人相彼所習呪為我傳授諸卿鴦伽父母皆悉真正血統清淨遠溯七世譜系不紊不為他人之所輕毀彼之父母我所知也諸卿設若青年鴦伽殺生取非所與邪淫妄語且復飲酒彼有顏貌竟何用為何用呪為何用生系為諸卿婆羅門有德修德修德成就學問高超於護摩捧持者中為第一或第二賢者諸卿彼婆羅門成此二者得名婆羅門自稱我為婆羅門其言真誠無有虛妄也二一婆羅門若有於此二法中捨其一法而具餘一亦得名婆羅門自稱我為婆羅門其言真誠無虛妄耶不也瞿曇所以者何戒能淨慧慧能淨戒慧與戒同戒與慧同有戒者有慧有慧者有戒世之最上稱戒與慧瞿曇猶如以手洗手以足洗足此亦如是戒能淨慧慧能淨戒慧與戒同戒與慧同有戒者有慧有慧者有戒世之最上稱戒與慧二二婆羅門如汝所說戒能淨慧慧能淨戒慧與戒同戒與慧同有戒者有慧有慧者有戒世之最上稱戒與慧婆羅門云何為戒云何為慧瞿曇我等所知唯只此耳善哉瞿曇其義所在當為明示二三婆羅門諦聽諦聽應善思念當為汝說種德答曰唯然世尊如是說言婆羅門今者如來出現於世如來是應供等正覺如是如是乃至婆羅門比丘如是具足戒行參照沙門果經四至六三如是如是入住初禪入第二禪入第三禪乃至入第四禪乃至以心傾注於智見如是乃至此又為彼慧之一分乃至無復來此生此又為彼慧之一分婆羅門此其慧也參照同經七五至九八二四種德聞如是說已白世尊言唯我瞿曇卓越超羣猶如使倒者得起隱者得現迷途者示之以道冥室燃燈有目得視瞿曇以無數方便為我等說法亦復如是我今歸依世尊歸依法歸依僧衆可敬瞿曇唯願聽我自今已後盡壽為歸依優婆塞唯願瞿曇聽受我請垂於明日與比丘衆俱共食膳世尊默然許之爾時種德知世尊許可即從座起問訊世尊右繞作禮而去種德即於當夜在己舍中供辦甘美軟硬食物及時白世尊言瞿曇時已到食已辦二五爾時世尊於晨著下衣攜外衣持鉢與比丘衆詣種德舍就座而坐衆比丘間佛居上座種德手自斟酌以甘美軟硬食供佛及僧歡喜滿足世尊食訖洗鉢澡手爾時種德取一低座於一面坐坐一面已種德白世尊言二六唯我瞿曇若我於座中即席起立禮敬瞿曇衆當輕我如是輕我是減我名名稱減損收入隨減何以故我賴名稱始有收入故若我於座中合掌叉手意同起座請受我禮若我於座中脫除頭巾意同低首請受我禮唯我瞿曇若我於車中離車下乘禮敬世尊瞿曇衆當輕我衆之輕我是減我名名稱減損收入隨減何以故我賴名稱始有收入故唯我瞿曇若我乘車舉揚笞杖意同下乘請受我禮若我乘車以手揚舉意同低首請受我禮二七爾時世尊以法教誡勉勵種德使之歡喜起座而去究羅檀頭經第五一如是我聞一時佛與大比丘衆五百人俱遊行摩揭陀國入佉㝹婆提婆羅門村止宿佉㝹婆提之阿婆羅提迦園中時有婆羅門名究羅檀頭住居佉㝹婆提村此城人畜繁盛草木池水五穀俱豐由摩揭陀國王斯尼喻頻婆娑羅授封此村以為淨施爾時究羅檀頭婆羅門欲設大祀七百牡牛七百牡犢七百牝犢七百牝羊七百牡羊運近祭壇柱側將以供祀二佉㝹婆提諸婆羅門長者居士聞如是言彼釋迦族出家釋子沙門瞿曇與大比丘衆五百人俱遊行摩揭陀國止宿佉㝹婆提之阿婆羅提迦園中世尊瞿曇具足如是美稱普聞此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也彼於此世界天界魔界梵天界於此大衆諸天世人沙門婆羅門自身證悟而為說示彼之說法初語亦善中語亦善終語亦善文義具足闡明梵行純潔清淨完全圓滿如是真人宜覲見也佉㝹婆提諸婆羅門長者居士即便相率出佉㝹婆提隊隊相隨欲詣阿婆羅提迦園三時究羅檀頭婆羅門在高樓上方將午睡見諸婆羅門長者居士出佉㝹婆提隊隊相隨欲詣阿婆羅提迦園問侍者曰諸婆羅門長者居士以何因緣隊隊相隨出佉㝹婆提往詣阿婆羅提迦園釋子沙門瞿曇由釋迦族出家彼與大比丘衆五百人俱遊行摩揭陀國止宿佉㝹婆提之阿婆羅提迦園中世尊瞿曇有具足如是美稱普聞此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也此諸人等欲往覲見彼瞿曇耳四時究羅檀頭婆羅門作是念言我聞是事沙門瞿曇知三種祭祀十六祭法而我不知三種祭祀十六祀法欲設大祀我今寧可詣瞿曇所問三種祭祀十六祀法彼告侍者曰侍者曷往諸婆羅門長者居士所語諸人曰究羅檀頭婆羅門有言諸師小住我亦當共俱詣見沙門瞿曇侍者稱諾即承教命往語諸人五時佉㝹婆提居住婆羅門數百人將助究羅檀頭施設大祀聞究羅檀頭當往覲見沙門瞿曇即便至彼問言尊者究羅檀頭欲往覲見沙門瞿曇有是事不然也我亦欲往覲見沙門瞿曇六尊者究羅檀頭勿往覲見尊者究羅檀頭往覲瞿曇非相應也若往覲見減損究羅檀頭名稱增益沙門瞿曇聲名減尊者之名增瞿曇之聲即此一端尊者究羅檀頭往覲瞿曇亦非相應沙門瞿曇應詣此也尊者究羅檀頭父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀即此一端究羅檀頭不應詣彼沙門瞿曇固應詣此尊者究羅檀頭身為長者大富闊綽如是如是沙門瞿曇固應詣此尊者究羅檀頭誦經持呪於三吠陀吠陀名義集楷書知明語原論及第五古傳說皆悉通曉知語法論通順世論解大人相無有遺漏尊者究羅檀頭顏貌端正美碩秀麗最勝最上得梵色相梵威具足尊者究羅檀頭持戒具足戒德增上尊者究羅檀頭聲美如蜜溫雅具備音吐清朗意味明豁尊者究羅檀頭為衆導師三百學子口受祕典四方學者多來請受尊者究羅檀頭長老耆宿沙門瞿曇年事幼稚普行者耳尊者究羅檀頭為摩揭陀王尊重供養尊者究羅檀頭為婆羅門沸伽羅娑羅尊重供養尊者究羅檀頭居佉㝹婆提此城人畜繁盛草木池水五穀俱豐受封於王以為淨施即此一端尊者究羅檀頭不應詣彼沙門瞿曇固應詣此七究羅檀頭聞是言已告諸婆羅門曰當聽我說我等固應往覲瞿曇尊者瞿曇來見我等非相應也沙門瞿曇父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀即此一端瞿曇不應來此我等固應詣彼沙門瞿曇捨離衆親而出家金銀財寶蓄於地中積於地上棄捐不顧而出家沙門瞿曇冲齡黑髮氣度不凡少壯之年離家出家沙門瞿曇初出家時父母涕泣涕泣聲中剃除鬚髮著袈裟衣離家出家沙門瞿曇顏貌端正美碩秀麗最勝最上得梵色相梵威具足沙門瞿曇戒德具足聖戒善戒具足其德沙門瞿曇聲美如蜜溫雅具備音吐清朗意味明豁沙門瞿曇為衆多人天之導師沙門瞿曇滅盡貪欲於衣食住無有執著沙門瞿曇為業論者實行論者避惡不善為婆羅門衆之所尊重沙門瞿曇為尊貴之剎帝利族為大財富之豪族捨離而出家衆多之人來自遠方請問瞿曇數千天神盡其一生歸依瞿曇沙門瞿曇美稱普聞此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也沙門瞿曇具足三十二大人相沙門瞿曇先自開口善來善來親愛歡喜柔和接人使人易於啓齒進言沙門瞿曇恆為四衆尊敬供養沙門瞿曇為諸天衆人之所篤信沙門瞿曇所止村落或止城邑非人鬼神不敢觸嬈沙門瞿曇弟子衆多為其導師衆教主中最為第一沙門瞿曇所得名稱非如沙門婆羅門以無上明行足是彼大名稱摩揭陀王率王族眷誓盡壽命歸依瞿曇拘薩羅王率王族眷誓盡壽命歸依瞿曇沸伽羅娑羅婆羅門率其家屬誓盡壽命歸依瞿曇沙門瞿曇為摩揭陀國斯尼喻頻婆娑羅王拘薩羅國波斯匿王沸伽羅娑羅婆羅門尊敬供養沙門瞿曇來至佉㝹婆提止宿阿婆羅提迦園中若有沙門或婆羅門來我地者皆我客也我等於客尊敬供養義所應爾今者沙門瞿曇來至佉㝹婆提止宿阿婆羅提迦園中我等之客也我等於客尊敬供養義所應爾即此一端瞿曇不應來此我等固應詣彼我知如是稱讚瞿曇惟任何稱讚猶未得當尊者瞿曇稱讚難盡八諸婆羅門聞是說已白究羅檀頭言如尊者究羅檀頭稱讚瞿曇者設使尊者瞿曇止宿處距此百由旬善信男子猶當攜糧往覲我等宜共相率往覲瞿曇時究羅檀頭與諸婆羅門至阿婆羅提迦佛止宿所問訊已一面坐諸婆羅門長者居士或有禮佛而坐者或有問訊而坐者或有叉手向佛而坐者或有默然而坐者九究羅檀頭坐一面已白佛言瞿曇我聞沙門瞿曇知三種祭祀十六祀法而我不知三種祭祀十六祀法欲設大祀善哉瞿曇請為我說三種祭祀十六祀法婆羅門汝今諦聽善思念之當為汝說究羅檀頭答曰唯然一佛言婆羅門昔有摩訶毗耆陀王富有財寶庫藏盈溢王於間靜處默自念言我於人世富有財寶統大國土今欲設大祀願我得長夜利益安樂時王召婆羅門顧問而語之曰我於間靜處默自念言我於人世富有財寶統大國土今欲設大祀願我得長夜利益安樂婆羅門我欲設大祀願尊者教我可得長夜利益安樂一一婆羅門顧問聞是語已即白王言王之國土多見災厄村有殺傷城有殺傷路有掠劫於此多災國土王惟徵稅彼非法者王未去之王可作是念我以殺捕抄沒呵逐除此掠劫解其苦難然如是解除掠劫苦難非正法也其免殺者後當侵惱王之國土王當如是真正解除掠劫苦難即於國土之內修農牧者當給種子與以食物勤商賈者給以資金勤吏治者備以俸食彼等各事其業當不侵惱王之國土王當得儲積多大財寶國無災厄民當安居歡喜踴躍撫育子孫家不閉戶婆羅門王答顧問曰當如所言即於國內修農牧者給之種子與以食物勤商賈者給以資金勤吏治者備以俸食彼等各事其業皆不侵惱王之國土王得儲積多大財寶國無災厄民得安居歡喜踴躍撫育子孫家不閉戶一二時王復召顧問如是說言掠劫苦難我已解除如尊者所言得儲大財寶國無災厄民得安居歡喜踴躍撫育子孫家不閉戶我欲設大祀願尊者教我可得長夜利益安樂王欲祀者當於國內居都鄙之諸剎帝利族悉告之曰我欲設大祀願諸尊者聽許我請使我得長夜利益安樂復次我王當於國內居都鄙之諸臣眷屬亦悉告以如是如是居都鄙之婆羅門耆宿亦悉告以如是如是居都鄙之居士富豪悉告之曰我欲設大祀願諸尊者聽許我請使我得長夜利益安樂王答顧問曰當如所言即於國內居都鄙之諸剎利種悉告之曰我欲設大祀願諸尊者聽許我請使我得長夜利益安樂衆白王言王欲祀者今正是時王於國內居都鄙之諸臣眷屬乃致居都鄙之婆羅門耆宿乃致居都鄙之居士富豪悉告之曰我欲設大祀願諸尊者聽許我請使我得長夜利益安樂衆白王言王欲祀者今正是時如是得四種臣民許可是此祭祀所應具者一三摩訶毗耆陀王成就八法父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀是為初法顏貌端正美碩秀麗最勝最上所謂梵色梵威具足是為二法多有財寶庫藏盈溢是為三法有威武力具備四軍敵聞其名無不靡伏是為四法信心具足富施與心於諸沙門婆羅門窮人乞者平等施與行善如泉是為五法巨細諸端靡不博識是為六法諸語意味無不解知是為七法博學賢明凡已往事今事將事盡能分別是為八法摩訶毗耆陀王成就此八法如是八法是此祭祀所應具者一四顧問婆羅門成就四法父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀是為初法誦經持咒於三吠陀吠陀名義集楷書知明語源論及第五古傳說皆悉通曉知語法論通順世論解大人相悉無遺漏是為二法戒德具足戒德增上是為三法博學賢明於持祭具勺柄者中居第一位或第二位是為四法顧問婆羅門成就此四法如是四法是此祭祀所應具者一五時顧問婆羅門於祭祀之先以三種法為摩訶毗耆陀王說示若王設大祀以將設時多損財寶起悔恨心此悔恨心不宜生起若王設大祀以在設時多損財寶起悔恨心此悔恨心不宜生起若王設大祀以已設時多損財寶起悔恨心此悔恨心不宜生起顧問婆羅門於祭祀之先以此之法說示於王一六時顧問婆羅門於祭祀之先以十種法除王祀時所生悔恨而白王言施設祭祀諸殺生者不殺生者咸來集會殺生者來聽其自來不殺生者來尊者為之施祀當生歡喜起信念心施設祭祀諸偷盜者不偷盜者亦復如是如是諸邪淫者不邪淫者諸妄語者不妄語者諸兩舌者不兩舌者諸粗語者不粗語者諸綺語者不綺語者諸貪欲者不貪欲者諸嫉妬者不嫉妬者諸邪見者或正見者咸來集會乃至如是邪見者來聽其自來正見者來尊者為之施祀當生歡喜起信念心顧問婆羅門於摩訶毗耆陀王祭祀之先以此十法除王祀時所生悔恨一七時顧問婆羅門於王設大祀以如是十六種法開導王意為之勉勵使之歡喜謂設大祀時或有人言王設大祀而居都鄙諸剎帝利族不召之來共相從事今乃如是施設大祀如是評王殊不可也居都鄙之諸剎帝利族當悉召來共相從事王可由是知如是事說言尊者施祀當生歡喜起信念心設大祀時或有人言王設大祀而居都鄙諸臣眷屬乃至居都鄙之婆羅門耆宿乃至居都鄙之居士富豪不召之來共相從事今乃如是施設大祀如是評王殊不可也居都鄙之居士富豪當悉召來共相從事王可由是知如是事說言尊者施祀當生歡喜起信念心設大祀時或有人言王設大祀而父母不正血統不淨遠溯七世脈系亂紊常為他人之所輕毀今乃如是施設大祀如是評王殊不可也吾王父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀王乃由是知如是事說言尊者施祀當生歡喜起信念心設大祀時或有人言王設大祀而顏貌醜陋非最上之美碩秀麗無梵色相梵威不具乃至無多財寶庫藏不豐乃至無威武力四軍不備敵聞其名無所懾伏乃至信心不具乏施與心不於沙門婆羅門窮人乞者平等施與其行慈善亦不如泉乃至巨細諸端皆無博識乃至諸語意味不能解知乃至不博學賢明凡已往事今事將事不能分別今乃如是施設大祀如是評王殊不可也乃至吾王博學賢明凡已往事今事將事盡能分別王可由是知如是事說言尊者施祀當生歡喜起信念心設大祀時或有人言王設大祀而顧問婆羅門父母不正血統不淨遠溯七世脈系亂紊常為他人之所輕毀王乃如是施設大祀如是評王殊不可也王之顧問婆羅門父母真正血統清淨遠溯七世脈系不紊不為他人之所輕毀王可由是知如是事說言尊者施祀當生歡喜起信念心設大祀時或有人言王設大祀而顧問婆羅門於經於咒誦持不利於三吠陀吠陀名義集楷書知明語源論及第五古傳說皆不通曉不知語法論不通順世論不解大人相皆悉遺漏乃至戒德不具無增上戒乃至不博學賢明於持祭具勺柄者中非居第一或第二位王乃如是施設大祀如是評王殊不可也王之顧問婆羅門乃至博學賢明於持祭具勺柄者中居第一位或第二位王可由是知如是事說言尊者施祀當生歡喜起信念心顧問婆羅門於王設大祀以此十六法開導王意為之勉勵使之歡喜一八婆羅門此大祀時不殺牛羊不殺雞豚及種種生類亦不殺傷不截樹木以為壇柱不刈吉祥草以供祀用不以鞭撻威嚇僕役亦無言語用為威嚇亦無涕淚哭泣以從唯用酥油生酥乳蜜及糖完此祭祀一九婆羅門時居若都若鄙諸剎利種諸臣眷屬居士富豪多持財寶來詣王所而白王言此多財寶為王持來願王受納我有多財寶儲積正當無所匱乏此汝等物可并取去彼等見拒於王退於一面共相議言我等不宜將此財寶持還家中我等寧可備助後祀二婆羅門時於東方祭壇凹處所備施物為都鄙之諸剎利種者南方祭壇凹處所備為都鄙之諸臣眷屬者西方祭壇凹處所備為都鄙之婆羅門耆宿者北方祭壇凹處所備為都鄙之居士富豪者婆羅門此大祀時不殺牛羊不殺雞豚及種種之生類亦不殺傷不截樹木以為壇柱不刈吉祥草以供祀用不以鞭韃威嚇僕役亦無言語用為威嚇亦無涕淚哭泣以從彼等為其所欲不為所不欲彼等於任何事為其所欲不為所不欲唯以酥油生酥乳蜜及糖完此祭祀如是四民許可具足摩訶毗耆陀王成就八法顧問婆羅門成就四法此三者是三種法也婆羅門是謂設祭祀時十六祀法二一諸婆羅門聞是說已舉大聲言噫此之謂祀哉噫此之謂設祀哉究羅檀頭婆羅門默然而坐時諸婆羅門語究羅檀頭婆羅門言尊者究羅檀頭何故不讚瞿曇善說耶我非不讚瞿曇善說設不讚者當裂其頭我乃如是自思惟耳瞿曇不言如是我聞有如是事瞿曇唯言爾時如是爾時如是我自思惟沙門瞿曇明是爾時大祀施主摩訶毗耆陀王或是大祀祭主顧問婆羅門也尊者瞿曇是設此祭祀或使設此祭祀身壞命終生於善趣天界中者然歟否歟然也婆羅門我是設此祭祀或使設此祭祀身壞命終生於善趣天界中者我即爾時大祀祭主顧問婆羅門也二二瞿曇復有餘祀較此之祭祀十六祀法能小煩雜亦少傷害得大果報大功德者耶婆羅門復有餘祀較此三祭祀十六祀法乃至得大功德者也何者是此祀耶婆羅門為常時施與具足戒德出家者常時施與祖先供養者是也二三瞿曇常時施與祖先供養如是祭祀以何因緣較此三祭祀十六祀法能少煩雜少傷害得大果報大功德耶婆羅門若此等祭祀彼阿羅漢或入阿羅漢道者不之近也所以者何於如是處常見鞭撻有捕喉事故如是祭祀彼阿羅漢或入阿羅漢道者不之近也若為常時施與具足戒德出家者常時施與祖先供養如是供養彼阿羅漢或入阿羅漢道者即之近也所以者何於如是處不見鞭撻無捕喉事故如是供養彼阿羅漢或入阿羅漢道者即之近也婆羅門常時施與祖先供養以是因緣齊彼三祭祀十六祀法能少煩雜少傷害得大果報大功德也二四瞿曇復有餘祀較此三祭祀十六祀法及常時施與祖先供養能少煩雜亦少傷害得大果報大功德者耶婆羅門復有餘祀較此三祭祀十六祀法乃至大功德者也何者是此祀耶婆羅門為四方僧伽起建精舍是也二五瞿曇復有餘祀較此三祭祀十六祀法常時施與祖先供養及起精舍能少煩雜亦少傷害得大果報大功德者耶婆羅門復有餘祀較此三祭祀十六祀法乃至大功德者也何者是此祀耶婆羅門具深信心歸依佛歸依法歸依僧是也二六瞿曇復有餘祀較此三祭祀十六祀法常時施與祖先供養起建精舍及歸依三寶能少煩雜亦少傷害得大果報大功德者耶婆羅門復有餘祀較此三祭祀十六祀法乃至大功德者也何者是此祀耶婆羅門具深信心受持五戒不殺生不偷盜不邪淫不妄語不飲酒是也二七瞿曇復有餘祀較此三祭祀十六祀法常時施與祖先供養起建精舍為三歸依及持五戒能少煩雜亦少傷害得大果報大功德者耶婆羅門復有餘祀較此三祭祀十六祀法乃至大功德者也何者是此祀耶婆羅門今者如來出現於世如是乃至比丘如是具足戒行參照沙門果經四至六三婆羅門較彼祭祀能少煩雜少傷害得大果報大功德者此為最勝也如是如是入住初禪參照同經七五婆羅門較彼祭祀能少煩雜少傷害得大果報大功德者此為最勝也如是乃至入第二禪入第三禪乃至入第四禪參照同經七七至八一婆羅門較彼祭祀能少煩雜少傷害得大果報大功德者此為最勝也如是乃至以心傾注於智見參照同經八三婆羅門較彼祭祀能少煩雜少傷害得大果報大功德者此為最勝也如是乃至無復來此生參照同經九七婆羅門較彼祭祀能少煩雜少傷害得大果報大功德者此為最勝也二八究羅檀頭婆羅門聞是說已白佛言善哉瞿曇善哉瞿曇猶如使倒者得起閉者得開迷途者示之以道冥室燃燈有目得視從瞿曇以無數方便明導說法亦復如是瞿曇今我歸依瞿曇歸依法歸依僧衆尊者瞿曇唯願聽我自今已後盡壽歸依為優婆塞瞿曇我當放此七百牛七百牡犢七百牝犢七百牝羊七百牡羊全其生命涼水青草聽其飲食任彼涼風為之吹拂二九時佛為究羅檀頭依次說法即施論正論生天之論諸欲災厄邪惡污穢出離利益佛知究羅檀頭心已調柔障礙已除信念勃生為說諸佛證悟法義苦及苦因苦滅及苦滅道究羅檀頭猶如潔淨白疊易為受染即於座上遠離塵垢得生法眼知無論何物凡集起者終歸滅盡三爾時究羅檀頭見法達法悟法入法度疑去惑得確信心唯從師佛教不從餘道即白佛言唯願尊者瞿曇許我請於明日與比丘衆俱共食膳佛默然許之時究羅檀頭知佛許可即從座起禮敬而去究羅檀頭越宿躬自於祭壇凹處供設甘美嚼食噉食到時白佛言時已到食已辦佛於晨時著下衣攜上衣持鉢與比丘衆往究羅檀頭祭壇凹處就座而坐比丘衆間佛居上座時究羅檀頭以甘美嚼食噉食手自斟酌供佛及僧勸請盡量食至滿足見佛食訖洗鉢澡手畢究羅檀頭取一低座於一面坐佛為說法示教利喜已從座起而去摩訶梨經第六一如是我聞一時世尊在毗舍離城外大林重閣講堂時拘薩羅國與摩揭陀國衆多婆羅門以事遣派在毗舍離彼等風聞如是言釋種出家沙門瞿曇今適在毗舍離尊者瞿曇有如是美譽彼世尊者是應供正覺者明行足善逝幸福者世間解無上士調御丈夫天人師覺者世尊也世尊於此世界天界魔界梵天界於此大衆諸天世人沙門婆羅門自身證知而為說示世尊說法初中後善文義具足示教梵行完全圓滿亦復清淨善哉覲見如此應供二拘薩羅國與摩揭陀國婆羅門衆往詣大林重閣講堂爾時尊者那耆多為世尊侍者彼等近前白言尊者那耆多世尊瞿曇今在何所我等咸欲覲見世尊諸友覲見非是時也今者世尊退居己室婆羅門衆為欲覲世尊而後歸故却坐一面三爾時復有離車人名曰兔唇亦與衆離車人俱來至大林重閣講堂那耆多側近前禮敬立而白言尊者那耆多應供正覺者世尊今在何所我等來此欲覲世尊摩訶梨覲見世尊非是時也世尊今已退居己室離車人兔唇為欲覲世尊而後歸故亦却坐一面四爾時沙彌師子至那耆多前禮敬已立而白言尊者迦葉拘薩羅國與摩揭陀國衆多婆羅門來此欲覲世尊離車人兔唇與衆離車人來亦欲覲世尊尊者迦葉為令諸人等可得覲見不亦善乎師子汝可自往啓白世尊沙彌師子報那耆多曰唯然尊者即詣世尊所禮敬已旁立白言世尊拘薩羅國與摩揭陀國衆多婆羅門今者來此欲覲世尊離車人兔唇與衆離車人來亦欲覲世尊此諸人等冀許面覲師子於香室前隱蔽之處敷座可也沙彌師子報世尊曰唯然世尊乃於香室前隱處敷座世尊出室至室前隱處就座而坐五爾時拘薩羅國與摩揭陀國衆婆羅門近至世尊側問訊已一面坐離車人兔唇與衆離車人俱亦至世尊側問訊已一面坐離車人兔唇白世尊言世尊二三日前離車人善宿來至我處作如是言摩訶梨我在世尊所僅經三年而我得見天之形色令人興奮快樂歡喜惟未得聞令人興奮快樂歡喜天之聲音世尊如是可樂天之聲音為彼善宿不得聞者有耶無耶摩訶梨如是天聲為彼善宿不得聞者是有非無六世尊天之聲音非無是有善宿何故不能聞耶摩訶梨設有比丘在於東方為求得見天之形色興奮歡樂非為求聞天之聲音專一修定此比丘者在於東方一向修定即於東方見天形色而不得聞天之聲音何以故以此比丘在於東方為求得見天之形色非為求聞天之聲音一向修定故七復次摩訶梨設若比丘在於南方如是如是在於西方如是如是在於北方如是如是乃至上下四維為求得見天之形色非為求聞天之聲音一向修定此比丘者上下四維一向修定即於上下四維見天形色而不得聞天之聲音何以故以此比丘於上下四維為求得見天之形色非為求聞天之聲音一向修定故八摩訶梨設若比丘在於東方為求得聞天之聲音興奮歡樂非為求見天之形色一向修定此比丘者在於東方一向修定即於東方聞天聲音而不得見天之形色何以故以此比丘在於東方為求得聞天之聲音非為求見天之形色一向修定故九復次摩訶梨設若比丘在於南方如是如是在於西方如是如是在於北方如是如是乃至上下四維為求得聞天之聲音非為求見天之形色一向修定此比丘者上下四維一向修定即於上下四維聞天聲音而不得見天之形色何以故以此比丘於上下四維為求得聞天之聲音非為求見天之形色一向修定故一摩訶梨設若比丘在於東方為求得見天之形色興奮歡樂復為求聞天之聲音兼同修定此比丘者在於東方兼同修定即於東方見天形色聞天聲音何以故以此比丘在於東方為求得見天之形色復為求聞天之聲音兼同修定故一一復次摩訶梨設若比丘在於南方如是如是在於西方如是如是在於北方如是如是乃至上下四維為求得見天之形色復為求聞天之聲音兼同修定此比丘者上下四維兼同修定即於上下四維見天形色聞天聲音何以故以此比丘於上下四維為求得見天之形色復為求聞天之聲音兼同修定故摩訶梨天之聲音非無是有善宿不得聞者以此故也一二世尊諸比丘衆在世尊所淨修梵行即為修習并為發得此等定耶摩訶梨諸比丘衆在我之處淨修梵行非為修習非為發得此等定也摩訶梨於此等外復有勝法諸比丘衆為證現是在我之處淨修梵行一三世尊何者是此法耶摩訶梨謂有比丘斷滅三結入預流果不墮惡趣必趣證悟諸比丘衆為證現是在我之處淨修梵行之殊勝法即此是也摩訶梨復有比丘斷滅三結薄貪瞋癡入一來果唯有一度還來此世使苦終盡諸比丘衆為證現是在我之處淨修梵行之殊勝法即此是也摩訶梨復有比丘斷滅五下分結成為化生者即於是處入涅槃於此世界不復還來諸比丘衆為證現是在我之處淨修梵行之殊勝法即此是也摩訶梨復有比丘滅盡諸漏成無漏心解脫慧解脫自身實證實現入住諸比丘衆為證現是在我之處淨修梵行之殊勝法即此是也摩訶梨凡此諸法為殊勝法諸比丘衆為證現是在我之處淨修梵行一四世尊證現此等諸法為有道迹不摩訶梨有其道迹世尊何者是道迹耶謂八支聖道正見正思正語正業正命正精進正念正定是為證現諸法之道迹也一五摩訶梨我曾在憍賞彌瞿師羅園時有遊行者滿提左與其持鉢弟子闍利師徒出家二人近我問訊立於一面作如是言敬友瞿曇命身二者一耶異耶我答之曰吾友諦聽善思念之當為汝說彼等答曰唯然吾友一六我如是言吾友今者如來出現於世如來是應供等正覺乃至我友比丘如是具足戒行參照沙門果經四至六三如是如是入住初禪參照同經七五吾友命身二者一耶異耶之語於如是知如是見比丘豈相應耶吾友此語不相應也吾友我亦如是知見故不說言命身二者一耶異耶一七如是如是入第二禪如是如是入第三禪如是如是乃至入第四禪參照同經七七至八一吾友命身二者一耶異耶之語於如是知如是見比丘豈相應耶吾友此語不相應也吾友我亦如是知如是見故不說言命身二者一耶異耶一八如是如是以心傾注於智見參照同經八三於如是知如是見比丘說言命身二者一耶異耶之語豈相應耶吾友此語不相應也吾友我亦如是知如是見故不說言命身二者一耶異耶一九如是如是乃至無復來此生參照同經九七於如是知如是見比丘說言命身二者一耶異耶之語豈相應耶吾友於如是知如是見比丘此語不相應也吾友我亦如是知如是見故不說言命身二者一耶異耶離車人兔唇聞世尊說發歡喜心闍利經第七一如是我聞一時佛住憍賞彌瞿師羅園美音精舍時遊行者滿提左與其持鉢弟子闍利師徒出家二人近佛問訊立於一面作如是言敬友瞿曇命身二者一耶異耶吾友諦聽善思念之當為汝說二人答曰唯然吾友二至五佛言吾友今者如來出現於世如來是應供等正覺乃至吾友我亦如是知如是見而不說言命身二者一耶異耶本經與摩訶梨經一六至一九全文相同故從略彼等二人聞佛說已發歡喜心迦葉師子吼經第八一如是我聞一時世尊在委若國金槃鹿野林爾時裸形梵志迦葉詣世尊所禮敬問訊於一面立裸形迦葉白世尊言二瞿曇我聞瞿曇呵責一切苦行極力毀罵諸苦行人指一切生活為弊穢瞿曇如是人言瞿曇呵責一切苦行極力毀罵諸苦行人指一切生活為弊穢斯言果是瞿曇之所說耶或為誤謗世尊瞿曇耶或是如法宣法耶或大小言論與如是人等同其主張者皆悉可以輕毀不耶我等所以為如是問者實以不願尊者瞿曇誤受誹謗也三迦葉若有人言瞿曇呵責一切苦行極力毀罵諸苦行人指一切生活為弊穢作此言者非述我說彼等或以僞言誹謗我也迦葉我以清淨超人間天眼如是乃至見有苦行人生活弊穢身壞命終生於惡生惡趣惡處地獄中者迦葉我以清淨超人間天眼如是乃至又見苦行人生活弊穢身壞命終生於善趣天界中者迦葉我以清淨超人間天眼如是乃至或見苦行人住於少苦身壞命終生於惡生惡趣惡處地獄中者迦葉我以清淨超人間天眼如是乃至或見苦行人住於少苦身壞命終生於善趣天界中者迦葉此諸苦行人若來若去若死若生我則如是如實知之我寧呵責一切苦行耶寧極毀罵諸苦行人指一切生活為弊穢耶四迦葉或有沙門婆羅門精智善辨其細心處如弓矢家能穿秋毫以己智慧謂能摧破空論彼我之間關於某點有相同者有不同者或有彼等說是處我亦說是彼等說非處我亦說非或有彼等說是處我則說非彼等說非處我則說是或有我說是處他亦說是我說非處他亦說非或有我說是處他則說非我說非處他則說是五我往彼等處說如是言吾友所不同者我等捨置所相同者有智之人當以師問師以教衆問教衆按此方法推尋談論其不善者說是不善當非難者說當非難不當為者說不當為不合賢聖者說不合賢聖污濁者說是污濁如斯諸不善法於此二師中誰能堪任全捨離者為是沙門瞿曇耶抑異衆師耶六迦葉亦得有如是事有智之人尋問談論為如是言其不善者說不善乃至污濁者說是污濁如斯諸不善法於此二師中沙門瞿曇全能捨離餘異衆師所不能及迦葉彼有智者如是尋問如是論時而於此中特稱讚我七迦葉復次有智之人當以師問師以教衆問教衆按此方法推問談論其是善者則說是善無可非難者說無可非難當為者則說當為合賢聖者說合賢聖清淨者說是清淨如斯諸善法於此二師中誰能堪任全獲得者為是沙門瞿曇耶抑異衆師耶八迦葉亦得有如是事有智之人尋問談論為如是言其是善者則說是善乃至清淨者說是清淨如斯諸善法於此二師中沙門瞿曇全能獲得餘異衆師所不能及迦葉彼有智者如是尋問如是論時而於此中特稱讚我九迦葉復次有智之人當以師問師以教衆問教衆按此方法推尋談論其不善者則說是不善乃至污濁者則說是污濁如斯諸不善法於此二師中誰能堪任全捨離者為是沙門瞿曇弟子衆耶抑異衆師之弟子衆耶一迦葉亦得有如是事有智之人尋問談論為如是言其不善者則說是不善乃至污濁者說是污濁如斯諸不善法於此二師中沙門瞿曇之弟子衆全能捨離餘異師衆之弟子衆所不能及迦葉彼有智者如是尋問如是論時而於此中特稱讚我一一迦葉復次有智之人當以師問師以教衆問教衆按此方法推尋談論其是善者則說是善乃至清淨者則說是清淨如斯諸善法於此二師中誰能堪任全獲得者為是沙門瞿曇弟子衆耶抑異衆師之弟子衆耶一二迦葉亦得有如是事有智之人尋問談論為如是言其是善者則說是善乃至清淨者說是清淨如斯諸善法於此二師中沙門瞿曇之弟子衆全能獲得餘異衆師之弟子衆所不能及迦葉彼有智者如是尋問如是論時而於此中特稱讚我一三迦葉有道有迹登道迹者確能如是自知自見沙門瞿曇所言所說適時真實有義合法合乎律儀復次迦葉登道迹者自知自見念言沙門瞿曇所言所說適時真實有義合法合乎律儀然是何道耶是何迹耶曰八聖道即正見正思正語正業正命正精進正念正定是也迦葉是實為道是實為迹登道迹者確能如是自知自見沙門瞿曇所言所說適時真實有義合法合乎律儀一四如是說已裸形迦葉白世尊言吾友瞿曇或有沙門婆羅門以如是諸種苦行有得沙門名有得婆羅門名離服裸形不重儀禮食後舐手施主請近施食不受其食請待施食亦不受食不受齎來之食不受特備之食不受請食不直取瓶皿中食不取閥內食不取杖間食不取杵間食不受二人中間一人所給食不受孕婦食不受乳婦食不受在男處之女食不受飢饉時食有狗在旁者不受其食有蠅羣聚者不受其食不食魚不食肉不飲穀酒不飲果酒不飲麩酒於行乞時或受一家食唯受一餐食或受二家食唯受二餐食或受七家食唯受七餐食唯以一施物為活以二施物為活以七施物為活或一日一食二日一食乃至七日一食迄至半月一食如是隔置一定期間取食修行吾友瞿曇或有沙門婆羅門實以如是諸種苦行有得沙門名有得婆羅門名若或食莠或復食稷或復食糲或復食革或食水草或食糠粃或食飯汁或食胡麻粉或食野草或食牛糞或食樹根花實或食自落果以為生活吾友瞿曇或有沙門婆羅門實以如是諸種苦行有得沙門名有得婆羅門名或披莎衣或披半莎衣或著冢間衣或著糞掃衣或衣提利多樹皮或衣黑羚羊皮或著黑羚羊皮條所編衣或著吉祥草衣或衣樹皮或衣木片或著人髮所編衣或著馬毛所編衣或著梟羽所編衣或拔鬚髮或常站立不坐牀席或常蹲踞或臥荊棘或臥板牀或臥露地或常唯側臥或被塵埃任其附著或住露天隨臥而安或食污物或不飲吸涼水或一夜三浴住修苦行一五迦葉設若有人離服裸形不重儀禮食後舐手如是乃至半月一食如是隔置一定期間取食修行然戒不具足心不具足慧不具足不能勤修彼於沙門名婆羅門名相去實遠迦葉比丘為無恚心為無害心修慈悲心復盡諸漏成無漏心解脫慧解脫即於現在逮達自知自證住時彼實得名為沙門名為婆羅門迦葉設復有人若或食莠或復食稷或復食糲如是乃至或食樹根花實