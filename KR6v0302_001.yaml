聽我認罪必制將來一王父公正無偏卿愚冥不善為罪制伏乃弒父王但自認罪如法懺悔我當納受卿之懺悔設若有人自認其罪如法懺悔以制將來是蓋聖律繁榮所由一一世尊如是言時阿闍世白世尊言大德我今欲去我事甚忙諸端待理王欲去者自可隨意於是摩揭陀國王韋提希子阿闍世如是聞世尊教歡喜隨喜即從座起問訊世尊圍繞作禮而去一二阿闍世王退去不久世尊告諸比丘言諸比丘此王衷心感激認罪悔過若王不弒父者即當於此座上遠塵離垢得法眼淨世尊如是說已諸比丘聞世尊說歡喜隨喜阿摩晝經第三第一誦品一如是我問一時佛遊拘薩羅國與大比丘衆五百人俱往伊車能伽羅娑羅門村止宿伊車能伽羅林中時有沸伽羅娑羅婆羅門住郁伽羅城此城人畜繁盛草木池水五穀俱豐由拘薩羅國王波斯匿授封此城以為淨施二沸伽羅娑羅婆羅門聞如是言彼釋迦種出家釋子沙門瞿曇遊拘薩羅國與大比丘衆五百人俱至伊車能伽羅村止伊車能伽羅林中可敬瞿曇具足普聞如是美稱此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也彼於此世界及天界魔界梵天界於此大衆諸天世人沙門婆羅門自身證悟而為說示彼說教法初善中善亦復終善文義具足闡明梵行純潔清淨完全無缺善哉如是真人應往親覲三爾時沸伽羅娑羅婆羅門有青年弟子名阿摩晝誦經持呪於三吠陀吠陀名義集楷畫知明語源論及第五古傳說皆悉通曉知語法論通順世論解大人相師所傳授三明聖語無不通利其人於師前足稱我所知者汝知之汝所知者我知之四時沸伽羅娑羅婆羅門告阿摩晝青年婆羅門曰阿摩晝彼釋迦種出家釋子沙門瞿曇遊拘薩羅國與大比丘衆五百人俱至伊車能伽羅村止伊車能伽羅林中可敬瞿曇具足普聞如是美稱此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也乃至善哉如是真人應往親覲阿摩晝汝今當往沙門瞿曇所往就瞿曇驗知其人是否如是美稱流聞復可驗知若斯人者是否虛實我等由是得知瞿曇五我當以何驗知瞿曇阿摩晝吾神典相傳有三十二大人相具足此諸大人相者必趣二途無有他也若其在家當為轉輪聖王有正義具信念服四海安邦土具七寶身七寶如是一輪寶二象寶三馬寶四摩尼寶五玉女寶六居士寶七將軍寶彼有王子數逾千人碩大勇猛破一切敵彼之國境廣達海濱不用刀杖悉以正義居有天下若其出家即於此世當成應供等正覺者脫除煩惱阿摩晝我授神典汝其執持六阿摩晝尋報師曰如命奉行即起禮沸伽羅婆羅乘牝馬車與衆青年婆羅門俱往詣伊車能伽羅林及車止處下車徒步進入園林七時衆比丘遊步露地阿摩晝至比丘許而問之曰尊者瞿曇今在何所我等特來覲彼尊者八時衆比丘如是思惟此阿摩晝出身名門為著名沸伽羅娑羅之名弟子佛與如是善男子談當無所苦彼等報阿摩晝言阿摩晝彼閉戶處有香房在靜聲前進徐至房前作咳叩關佛當啓戶九時阿摩晝靜聲前進徐至房前作咳叩關佛為啓戶乃入房內餘諸青年波羅門亦隨之入與佛相互問訊於一面坐阿摩晝於佛坐時且步且立問訊交談一時佛告阿摩晝曰阿摩晝今汝於我坐時且步且立問訊交談汝與汝師與師之師耆宿長老大婆羅門相交談時當為是耶瞿曇决不然也我婆羅門相互之間與步與立與坐與臥交談共論分固應爾今諸禿頭沙門卑陋下劣習黑冥法我與此輩交談共論一若與汝固當如是一一阿摩晝汝來此處當有所冀汝來此意善自思念阿摩晝青年婆羅門缺乏修養而自恃修養懷憍慢心此非因缺乏修養而何耶一二時阿摩晝聞佛說言缺乏修養忿而不喜心謂瞿曇於我當懷惡意然我即此攻佛侮佛乃告佛言瞿曇釋迦族子生性險惡釋迦族子生性粗暴釋迦族子生性輕率釋迦族子生性饒舌彼實卑陋而貶婆羅門輕婆羅門惡婆羅門侮婆羅門慢婆羅門釋迦族子出身卑陋於婆羅門不尊重供養不之敬禮義不應爾阿摩晝青年婆羅門為是初次放言於釋迦族指為卑陋一三阿摩晝諸釋迦族何攖汝怒瞿曇昔我一時為師遣使赴迦毗羅衛城至釋種講堂爾時衆多釋迦族諸王與其王子高坐於上互擽哄笑以為戲弄無人為我導入座席由是觀之是必嘲我實釋迦族出身卑陋於婆羅門不尊重供養不之敬禮義不應爾阿摩晝青年婆羅門如是再次放言於釋迦族指為卑陋一四阿摩晝小鳥如鶉處其巢中猶鳴自恣迦毗羅衛城為釋迦族本土汝怒及瑣事義不應爾一五瞿曇世有四姓剎帝利婆羅門吠舍首陀羅其中三姓剎帝利吠舍首陀羅當敬奉婆羅門而釋迦族出身卑陋於婆羅門不尊重供養不之敬禮義不應爾阿摩晝青年婆羅門如是三次放言於釋迦族指為卑陋一六佛自念言此阿摩晝毀釋迦族指為卑陋殊極強暴我今當問其為何姓佛告阿摩晝曰阿摩晝汝姓何者瞿曇我姓乾訶耶那阿摩晝考汝父母系昔之姓氏知是釋迦族主人所出汝為釋迦族下婢子孫阿摩晝釋迦族祖先為沃伽伽王昔時王欲讓位於寵妃子將年長四王子沃伽無伽迦爛陀訶提若耶希尼富蘭放逐國外彼等被擯居娑迦林在雪山麓湖水之畔恐亂血統與己姐妹匹配為偶沃伽伽王語侍臣曰我諸王子今在何所王子住所在娑迦林雪山之麓湖水之畔恐亂血統與己姊妹匹配為偶時沃伽伽王歡喜發言釋迦哉王子最上釋迦哉王子從此已來我釋迦族遂以為名此王實釋迦族先祖也阿摩晝王有下婢名曰方面産一黑兒生而乾訶黑便舉聲曰母其洗我母其浴我母其為我除此穢物會當於汝有所饒益爾時之人其稱乾訶義為惡鬼猶今之人呼惡鬼也衆如是說此子生便能言生乾訶