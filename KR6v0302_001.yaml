入住如是諸法阿難彼尊者瞿曇稱讚諸法為何者耶又勸導衆人使之入住於何處耶六儒童彼世尊稱讚三蘊又勸導衆人使人住此處云何為三曰聖戒蘊曰聖定蘊曰聖慧蘊儒童此等三蘊為彼世尊之所稱讚又勸導衆人使人住其處復次阿難彼尊者瞿曇之所稱讚又為勸導使人入住之聖戒蘊為何者耶七至二九儒童今者如來出現於世如是如是乃至儒童比丘如是具足戒行參照沙門果經四至六三三儒童是謂彼世尊之所稱讚又為勸導使人入住之聖戒蘊然於此中更有須成辦者希有也阿難未曾有也阿難阿難所謂聖戒蘊者已圓滿非不圓滿也阿難我於佛教之外沙門婆羅門中未見有如是圓滿之聖戒蘊阿難佛教之外沙門婆羅門設於己中見如是圓滿之聖戒蘊者彼等唯此以為滿足自念唯此已足唯此可達沙門所期此外我等無有更須成辦者而尊者阿難言然於此中更有須成辦者第二誦品一至一二復次阿難彼尊者瞿曇所稱讚又為勸導使人入住之聖定蘊為何者耶儒童云何比丘守護諸根之門如是如是乃至全身到處離生喜樂無不普洽參照同經六四至七六一三儒童比丘已度諸欲離不善法由離生喜樂有尋有伺具住初禪此之初禪以離生喜樂而潤其身周遍潤漬亦復充滿彼之全身離生喜樂無不普洽於彼定中亦有此也一四至一五儒童復有比丘息滅尋伺乃至全身到處定生喜樂無不普洽參照同經七七至七八如是乃至於彼定中亦有此也一六至一八儒童復有比丘離喜住捨乃至捨念清淨如是如是全身到處無喜之樂乃至以純淨心周洽普遍參照同經七九至八二如是乃至於彼定中亦有此也一九儒童是謂為彼世尊之所稱讚又為勸導使人入住之聖定蘊然於此中更有須成辦者希有也阿難未曾有也阿難阿難所謂聖定蘊者已圓滿非不圓滿也阿難我於佛教之外沙門婆羅門中未見有如是圓滿之聖定蘊阿難佛教之外沙門婆羅門設於已中見如是圓滿之聖定蘊者彼等唯此為滿足自念唯此已足唯此可達沙門所期此外我等無有更須成辦者而尊者阿難言然於此中更有須成辦者二至二一復次阿難彼尊者瞿曇所稱讚又為勸導使人入住之聖慧蘊為何者耶如是心寂靜純淨如是如是乃至又我之識依存於此與此關聯參照同經八三至八四二二儒童比丘如是得心寂靜純淨純潔無穢無隨煩惱柔軟堪忍堅住不動時因知見故於一切心引發引導彼便知是事此身是色四大所造母父所生飯粥積集以無常消耗磨滅破壞壞滅為本性而我之識依存於此與此聯關於彼慧中亦有此也二三至二四彼如是心寂靜純淨如是乃至具足一切大肢小肢及與異根參照同經八五至八六於彼慧中亦有此也二五至三五彼如是心寂純靜淨如是乃至證知生已盡乃至無復來此生參照同經八七至九八三六儒童比丘如是心寂靜純淨純潔無穢無隨煩惱柔軟堪忍堅住不動時因漏盡智於一切心引發引導彼便如實知此是苦此是苦集此是苦滅此是趣苦滅道如實知此是漏此是漏集此是漏滅此是趣漏滅道如是知如是見時彼心自欲漏解脫有漏解脫無明漏解脫得解脫時生解脫智證知生已盡梵行已立所作已辦無復來此生於彼慧中亦有此也三七儒童是謂為彼世尊之所稱讚又為勸導使人入住之聖慧蘊唯於此中無復須成辦者希有也阿難未曾有也阿難復次阿難所謂聖慧蘊者已圓滿非不圓滿也復次阿難我於佛教之外沙門婆羅門中未見有如是圓滿之聖慧蘊可謂於此中無復須成辦者殊勝也阿難殊勝也阿難猶如使倒者得起隱者得現示道於迷暗中來燈有目得視尊者阿難正復如是以種種方便開示正法阿難我今歸依世尊瞿曇又歸依法又歸依僧尊者阿難唯願知我自今已後盡壽歸依為優婆塞云堅固經第十一一如是我聞一時世尊在那爛陀城婆婆利菴羅園中爾時居士堅固詣世尊所禮敬世尊於一面坐時居士堅固白世尊言世尊此那爛陀城殷盛豐樂人民熾盛城中之人敬信世尊善哉世尊唯願世尊勑一比丘以上人法為現神通神變則那爛陀城人當益敬信世尊為是言時世尊告居士堅固曰堅固我實不教比丘等以如是法謂汝比丘等可為白衣在俗者以上人法現神通神變二居士堅固又復白世尊言世尊我非意欲擾惱世尊但猶一再白此事世尊此那爛陀城殷盛豐樂人民熾盛城中之人敬信世尊善哉世尊唯願世尊勑一比丘以上人法為現神通神變則那爛陀城人當益敬信世尊世尊復告居士堅固曰堅固我實不教比丘等以如是法謂汝比丘等可為白衣在俗者以上人法現神通神變三居士堅固三復白世尊言世尊我非意欲惱擾世尊但猶一再白此事世尊此那爛陀城殷盛豐樂人民熾盛城中之人敬信世尊善哉世尊唯願世尊勑一比丘以上人法為現神通神變則那爛陀城人當益敬信世尊堅固我自識知體現而教說者為三種神變云何三種曰神通神變觀察他心神變及教誡神變是也四堅固云何為神通神變堅固今有一比丘現無量神通能以一身現作多身能以一身還作一身若顯若隱牆壁山嶽通過無礙如處空虛出沒大地如在水中涉水不沈如履地上於空虛中趺坐駛行如鳥附翼夫謂日月有大神力與大威德手能捫之能以現身立至梵天或為得信歸依者見彼一比丘能現無量神通而以一身現作多身而以多身還作一身若顯若隱牆壁山嶽通過無礙如處空虛出沒大地如在水中涉水不沈如履地上於空虛中趺坐駛行如鳥附翼夫謂日月有大神力與大威德手能捫之能以現身立至梵天五彼得信歸依者以其所見語未信未歸依者言友奇特哉友希有哉沙門之大神通大威德也我見一比丘能現無量神通而以一身現作多身如是乃至能以現身立至梵天彼未信未歸依者將如是答彼得信歸依者言友實有明呪曰達馱梨彼比丘者以此明咒現無量神通蓋能一身現作多身如是乃至能以現身立至梵天也堅固汝意云何彼未信未歸依者於彼得信歸依者將為如是言不耶世尊將為如是言堅固是故我於神通神變作過患觀厭惡慚愧而避之也六復次堅固云何為觀察他心神變堅固今有一比丘能觀諸有情及他人之心觀察心所觀察尋伺言汝意如此汝意如斯汝心如是或為得信歸依者見彼一比丘能觀諸有情及他人之心觀察心所觀察尋伺言汝意如此汝意如斯汝心如是七彼得信歸依者以其所見語未信未歸依者言友奇特哉友希有哉沙門之大神通大威德也我見一比丘能觀諸有情及他人之心觀察心所觀察尋伺言汝意如是汝意如是汝心如是彼未信未歸依者將如是答彼得信歸依者言友有明咒曰摩尼柯彼比丘者以此明咒觀諸有情及他人心觀察心所乃至言汝意如是汝意如是汝心如是堅固汝意云何彼未信未歸依者於彼得信歸依者將為是言不耶世尊將為如是言堅固是故我於觀察他心神變作過患觀厭惡慚愧而避之也八復次云何為教誡神變堅固今有一比丘為如是教誡汝等當如是尋思勿如是尋思當如是作意勿如是作意當捨離此達彼而住堅固此實名為教誡神變也九至四三復次堅固今者如來出現於世如來是應供等正覺如是云云參照沙門果經四至七四四四捨此五蓋觀自身者便生歡喜歡喜者生喜懷喜者身安穩身安穩便覺樂樂則心入三昧彼離諸欲離不善法有尋有伺離生喜樂入住初禪彼已離生喜樂潤漬其身周遍盈溢且復充滿全身到處無不普洽離生喜樂參照同經七五四五堅固譬如熟巧浴僕或其弟子於盥浴器而撒洗粉以水漬調洗粉受潤因潤散碎內外俱潤以至周遍無不廣普如是堅固離生喜樂潤漬其身周遍盈溢且復充滿全身到處無不洽普離生喜樂堅固此實名為教誡神變也參照同經七六四六至四九參照同經七七至八五至五一如是如是入第四禪乃至堅固此實名為教誡神變也參照同經八一至八二五二如是心寂靜純淨無有煩惱離隨煩惱柔然將動而恆安住於不動相中爾時比丘以心傾注於智見如是如是乃至堅固此即名為教誡神變也參照同經八三五三至六六如是如是證知生已盡梵行已立所作已辦無復來此生堅固此即名為教誡神變也參照同經八四至九八六七堅固此三種神變我自識知體現而教說者堅固昔於比丘教衆之中一比丘心起如是念此等四大種地水火風於何處滅盡耶堅固時彼比丘統攝一心而入於定如趣天道其路現前六八堅固爾時比丘往彼四大王衆天所問四大王衆天言卿等此等四大種地水火風於何處滅盡堅固如是問時四大王衆天答比丘言比丘此等四大地水火風於何處滅盡吾等實不知之比丘遠勝吾等者有四大王彼等當知此等四大種地水火風於何處滅盡六九堅固爾時比丘往彼四大王所問四大王言卿等此等四大種地水火風於何處滅盡堅固如是問時四大王答比丘言比丘此等四大地水火風於何處滅盡吾等實不知之比丘有天遠勝吾等名曰三十三天彼等當知此等四大種地水火風於何處滅盡七堅固爾時比丘往三十三天所問三十三天言卿等此等四大種地水火風於何處滅盡堅固如是問時三十三天答比丘言比丘此等四大種地水火風於何處滅盡吾等實不知之比丘遠勝吾等者有天主帝釋名曰沙迦此等四大種地水火風於何處滅盡彼當知之七一堅固爾時比丘往帝釋天所如是乃至如是比丘有天遠勝我名曰夜摩如是乃至彼當知之七二堅固爾時比丘往夜摩天所如是乃至如是比丘有天子遠勝吾等名曰須夜摩如是乃至彼當知之七三堅固爾時比丘往須摩天子所如是乃至如是比丘有天遠勝我名曰覩史多如是乃至彼當知之七四堅固爾時比丘往覩史多天所如是乃至如是比丘有天子遠勝吾等名曰覩史多天子如是乃至彼當知之七五堅固爾時比丘往覩史多天子所如是乃至如是比丘有天遠勝我名曰樂變化天如是乃至彼當知之七六堅固爾時比丘往樂變化天所如是乃至如是比丘有天子遠勝吾等名曰妙化天子如是乃至彼當知之七七堅固爾時比丘往妙化天子所如是乃至如是比丘有天遠勝我名曰他化自在天如是乃至彼當知之七八堅固爾時比丘往他化自在天所如是乃至如是比丘有天子遠勝吾等名曰自在天子如是乃至彼當知之七九堅固爾時比丘往自在天子所如是乃至如是比丘有天遠勝我名曰梵衆天如是乃至彼當知之八堅固時彼比丘統攝一心而入於定如趣天道其路現前堅固爾時比丘往梵衆天所問梵衆天言卿等此等四大種地水火風於何處滅盡堅固如是問時梵衆天答比丘言比丘此等四大種地水火風於何處滅盡吾等實不知之比丘有梵天大梵天勝者無能勝者一切見者支配者自在者作者化作者優越者創造者主宰者已生未生者之父彼遠勝吾等此等四大種地水火風於何處滅盡彼當知之卿等彼大梵天今在何所比丘梵天何在何由住於何方吾等實不知之比丘但現兆相生光明顯光耀則梵天出現生光明顯光耀即梵天出現之前相也八一堅固時彼大梵天尋即出現堅固時彼比丘往大梵天所問梵天言卿此等四大種地水火風於何處滅盡堅固如是問時彼大梵天答比丘言比丘我為梵天大梵天勝者無能勝者一切見者支配者自在者作者化作者優越者創造者主宰者已生未生者之父也八二堅固比丘又復問梵天言卿我非問卿卿為梵天大梵天勝者無能勝者一切見者支配者自在者作者化作者優勝者創造者主宰者已生未生者之父卿我為問卿此等四大種地水火風於何處滅盡堅固彼大梵天復答比丘言比丘我為梵天大梵天勝者無能勝者一切見者支配者自在者作者化作者優越者創造者主宰者已生未生者之父八三堅固比丘三復問彼大梵天言卿我非問卿卿為梵天大梵天勝者無能勝者一切見者支配者自在者作者化作者優越者創造者主宰者已生未生者之父卿我為問卿此等四大種地水火風於何處滅盡堅固時大梵天執比丘臂退於一隅語比丘言比丘於此世界中梵衆天皆謂不論任何物梵天無不見不論任何物梵天無不知不論任何物梵天無不驗以是之故於彼等前我未說也比丘此等四大種地水火風於何處滅盡我實不知比丘於此世界捨彼世尊而向餘者索解此問是汝之苦亦汝之失比丘汝可往詣彼世尊所質此疑問如世尊說善受持之八四堅固時彼比丘譬如壯士屈臂乍伸伸臂乍屈頃於梵天界倏忽隱身現於我前堅固時比丘禮敬我一面坐堅固彼比丘白我言世尊此等四大種地水火風於何處滅盡八五堅固我於如是問答彼比丘言比丘昔有航海者攜鳥尋陸地乘船航海洋不見陸地時由船放彼鳥飛東南西北既翔於上方復翱於四維彼若見陸地飛去固確實若不見陸地彼還歸船來比丘汝亦如是乃至上往梵天質疑索解竟不成就還來我前比丘汝今不應如是問世尊此等四大種地水火風於何處滅盡比丘應如是問於何不堅牢水與地火風並長短粗細淨以及不淨於何名與色永滅令無餘今答如是識無形無量遍通一切處於此水與地火風不堅牢長短與粗細不淨淨亦然於此名與色永滅令無餘由於識滅故一切令永滅佛陀如是說爾時充滿喜悅居士堅固聞佛所說心生歡喜露遮經第十二一如是我聞一時世尊與大比丘衆五百人俱遊行拘薩羅國入娑羅婆提村時露遮婆羅門領有娑羅婆提村其村人民熾盛草木繁茂水有利便五穀豐饒為王領地拘薩羅國波斯匿王即封此村與婆羅門以為淨施二爾時露遮婆羅門起如是惡見謂諸有沙門或婆羅門苟知善法則其所證善法不應為他人說所以然者人於他人能何用為此事猶如壞故縛已更造新縛我說斯是貪欲惡法所以然者人於他人能何用為三時露遮婆羅門聞如是言自釋迦族出家釋子沙門瞿曇遊行拘薩羅國與大比丘五百人俱來娑羅婆提村彼世尊瞿曇名稱如是流聞天下此世尊者是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛陀世尊也彼於此世界天界魔界梵天界於此大衆諸天世人沙門婆羅門自覺自證為他人說彼所說法初善中善亦復終善文義具足說示梵行完全清淨如此應供宜往覲見四爾時露遮婆羅門語剃頭師毗史迦言毗史迦今持我聲詣沙門瞿曇所敬候沙門瞿曇無病息災氣力安住可如是言瞿曇露遮婆羅門敬候世尊無病息災氣力安住尊者瞿曇受露遮婆羅門明日之饗請與比丘衆俱共受食五剃頭師毗史迦報露遮婆羅門言宜也尊者即到世尊所禮世尊一面坐剃頭師毗史迦坐一面已白世尊言世尊露遮婆羅門敬候世尊無病息災氣力安住命如是言世尊受露遮婆羅門明日之饗請與比丘衆俱共受食爾時世尊默然受請六時剃頭師毗史迦知世尊許可起座禮世尊作右繞禮至露遮婆羅門所而告之曰尊者我等以卿言白世尊世尊露遮婆羅門敬候世尊無病息災氣力安住命如是言世尊受露遮婆羅門明日之饗請與比丘衆俱共受食七露遮婆羅門即於翌日在己舍中具辦甘美嚼食噉食語剃頭師毗史迦言毗史迦可詣沙門瞿曇所以時白言瞿曇時已到食已辦剃頭師毗史迦報露遮婆羅門言宜也尊者即詣世尊所禮世尊一面立剃頭師毗史迦以時白世尊言世尊時已到食已辦爾時世尊清旦整下衣攜上衣持鉢與比丘衆俱往娑羅婆提村八時剃頭師毗史迦隨侍世尊白世尊言露遮婆羅門起如是惡見謂諸有沙門或婆羅門苟知善法則其所證善法不應為他人說所以然者人於他人能何用為此事猶如壞故縛已更造新縛我說斯是貪欲惡法所以然者人於他人能何用為唯願世尊除彼惡見毗史迦將如汝願毗史迦將如汝願九爾時世尊至露遮婆羅門舍就座而坐露遮婆羅門以甘美嚼食噉食手自斟酌供養佛陀及比丘衆世尊食訖去鉢行澡水畢時露遮婆羅門取一小牀於一面坐世尊告露遮婆羅門曰露遮汝起惡見言諸有沙門或婆羅門苟知善法則其所證善法不應為他人說所以然者人於他人能何用為此事猶如壞故縛已更造新縛我說斯是貪欲惡法所以然者人於他人能何用為汝實起如是惡見耶實爾瞿曇一露遮汝意云何娑羅婆提村汝所領有耶實爾瞿曇露遮若有人言露遮婆羅門領有娑羅婆提村是村所産唯獨露遮為應享有勿給餘人則於依汝生活衆中彼豈不為障害者耶瞿曇是障害者露遮為障害者是於彼等齎與利益恩惠或不齎與耶瞿曇彼不齎以利益恩惠也不齎以利益恩惠者是於彼等起慈心耶起害心耶瞿曇起害心也起害心者為邪見耶抑正見耶瞿曇是邪見也露遮我說邪見之人當墮地獄或畜生道唯此二道必墮其一一一露遮汝意云何迦尸及拘薩羅國為波斯匿王所領有耶實爾瞿曇露遮若有人言波斯匿王領有迦尸及拘薩羅國迦尸及拘薩羅國之所産唯波斯匿王為應享有勿給餘人則於依波斯匿王生活之汝身及餘衆人彼豈不為障害者耶瞿曇是障害者為障害者是於彼等齎與利益恩惠耶抑不齎與耶瞿曇彼不齎以利益恩惠也不齎以利益恩惠者是於彼等起慈心耶抑起害心耶瞿曇起害心也起害心者為邪見耶抑正見耶瞿曇是邪見也露遮我說邪見之人當墮地獄或畜生道唯此二道必墮其一一二如是露遮若有人言露遮婆羅門領有娑羅婆提