尊在王舍城小兒醫師耆婆菴婆園中與大比丘衆千二百五十人俱爾時摩揭陀國王韋提希子阿闍世於第四月迦剌底迦月十五日月滿之夜布薩之日諸大臣圍繞坐華宮高樓摩揭陀國王韋提希子阿闍世於布薩日感興發言明月之夜何其可愛明月之夜何其美麗明月之夜何其可樂明月之夜何其清和明月之夜何其多福今者我等當近侍何等沙門婆羅門能悅豫我心二有一大臣乃白王言大王茲有不蘭迦葉為僧伽主教衆元首教衆導師多有知識名稱遠聞一派開祖衆所尊崇出家歲久經驗宏富一長老也王宜近侍彼心或悅豫雖如是言而摩揭陀國王韋提希子阿闍世默然不應三時復有大臣亦白王言大王茲有末伽梨瞿舍利為僧伽主教衆元首教衆導師多有知識名稱遠聞一派開祖衆所尊崇出家歲久經驗宏富一長老也王宜近侍彼心或悅豫雖如是言而摩揭陀國王韋提希子阿闍世默然不應四時復有大臣亦白王言大王茲有阿耆多翅舍欽婆羅如是云云阿闍世默然不應五時復有大臣亦白王言大王茲有婆浮陀迦旃那如是云云乃至默然不應六時復有大臣亦白王言大王茲有散若夷毗羅梨沸如是云云乃至默然不應七時復有大臣亦白王言大王茲有尼乾子如是云云乃至默然不應八爾時小兒醫師耆婆在王近處默然而坐阿闍世王告耆婆曰忠良耆婆今何沈默大王茲有世尊應供等正覺者與大比丘衆千二百五十人俱住我菴婆園中世尊瞿曇有如是美稱彼世尊者實是應供等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊也王宜近侍彼心或悅豫忠良耆婆汝曷為我嚴裝乘象九小兒醫師耆婆答曰大王唯然即嚴王龍象及五百牝象訖白王言乘象已備願候舉措爾時王自乘龍象使五百婦人乘五百牝象侍從執炬現王威嚴出王舍城往詣耆婆菴婆園一如是前進到菴婆園不遠處王忽心生恐怖遍體戰栗身毛森豎王充滿驚怖身毛豎立告耆婆曰忠良耆婆汝非謀我耶忠良耆婆汝非欺我耶忠良耆婆汝非引我置於敵手耶曷有大比丘衆千二百五十人寂然無聲嚏響咳音絶無一聞有是理耶大王請勿畏怖臣非謀君非欺君王非引君王置於敵手王請前進王請前進在彼周廊燃燈輝耀一一王乘龍象進行象可通行之道然後下乘步近廊口告耆婆曰忠良耆婆今佛世尊為在何所大王世尊在彼中央柱旁向比丘衆東面而坐一二王近世尊於一隅坐坐一隅已見比丘衆默然靜坐如水清澄以感興語口自發言今比丘衆具足寂靜願我太子優陀夷跋陀亦復如是爾時世尊告王曰大王卿念愛者耶唯然大德我愛太子優陀夷跋陀今比丘衆具足寂靜願我太子優陀夷跋陀亦復如是一三王向世尊恭敬頂禮向比丘衆合掌禮拜於一隅坐坐一隅已白世尊言大德我欲略有所問若蒙許可乃敢請問大王卿欲問者便可問也一四大德世有種種技術職業之人如調象師調馬師車術師弓術師旗手元帥戰士武將軍事偵探如龍勇士裝甲兵士奴隸出身者庖人剃髮師浴僕餅師織鬘師漂白匠織物師籠匠陶師算數家戒指刻印師世之所知餘諸種種技術職業者彼等皆以技能目覩現世享受報酬使其自身幸福安樂父母妻子及其知友幸福安樂又於沙門婆羅門尊勝布施當生天界獲天界之安穩福報大德沙門生活亦得施設如是目覩現報耶一五大王卿念卿曾詣沙門婆羅門所問如是義不唯然大德我念我曾詣沙門婆羅門所問如是義彼等如何應答王若無礙者說之可也大德在世尊前或在如世尊者前言如是事絶無所礙然則大王說之可也一六大德我於一時訪不蘭迦葉相問訊已於一隅坐坐一隅已我問彼言迦葉世有種種技術職業之人如調象師調馬師車術師弓術師旗手元帥戰士武將軍事偵探如龍勇士裝甲兵士奴隸出身者庖人剃髮師浴僕餅師織鬘師漂白匠織物師籠匠陶師算數家戒指刻印師世之所知餘諸種種技術職業者彼等皆以技能目覩現世享受報酬使其自身幸福安樂父母妻子及其知友幸福安樂又於沙門婆羅門尊勝布施當生天界獲天界之安穩福報迦葉沙門生活亦得施設如是目覩現報耶一七大德不蘭迦葉乃報我言大王不論自作何事或教人作截使截苦使苦惱使惱栗使栗殘害生命取非所與踰人家牆劫盜掠奪與人妻通口為妄語行如此事非為惡也若有人焉以鋒利輪寶臠割地上衆生以為肉聚以為肉塊不因此事而生罪惡亦無罪報有人於此行恆河南殺或使殺截或使截苦或使苦不因此事而生罪惡亦無罪報有人於此行恆河北從事布施或教布施從事祭祀或教祭祀不因此事而生功德亦無福報不因布施不因調御不因禁戒不因實語而生功德亦無福報一八大德我問沙門生活現得果報不蘭迦葉實乃如是自說非業猶如問菴羅樹果答言麵包樹果問麵包樹果答言菴羅樹果不蘭迦葉亦復如是問沙門生活現得果報自說非業我起如是念如我者得非令境內沙門婆羅門起不快感致如是耶故於彼言亦不稱讚亦不輕毀時我內心雖懷忿結不出忿言惟以平靜聽受彼說而且不加尊重起座退出一九大德我於一時訪末伽梨瞿舍利相問訊已於一隅坐坐一隅已我問彼言瞿舍利世有種種技術職業之人如是如是乃至瞿舍利沙門生活亦得施設如是目覩現報耶二大德末伽梨瞿舍利乃報我言大王有情染著無因無緣無因無緣有情染著有情清淨無因無緣無因無緣有情清淨無有自作亦無他作亦無人作亦復無力亦無精進無人體力亦無氣力一切有情一切生物一切有類一切靈魂無自在力無力無精進由於宿所決定由於結合由於自然性互為變異於六階級受諸苦樂實以百四十萬種生門為首有六千及六百種生門有五百種業五種業三種業一業半業有六十二種道跡有六十二種中劫有六種階級有八種人地有四千九百種生業有四千九百遊行者四千九百龍土二千根三千地獄三十六塵界七想胎七無想胎七節胎七天七人七鬼七池七林七百林七嶮七百嶮七夢七百夢有八百四十萬大劫而於其間為一切賢愚流轉輪回苦當終滅於此之間不自說言我以此戒行以此苦行以此梵行成熟未熟業忍受已熟業繼續不已使之滅盡夫苦與樂稱有定量於輪回中無有終滅亦無消長亦無增減如投線毱所捲之線終至散解一切賢愚亦復如是流轉輪回完了之後始為苦之終滅二一大德我問沙門生活現得果報末伽梨瞿舍利如是自說輪回淨化猶如問菴羅樹果答言麵包樹果問麵包樹果答言菴羅樹果末伽梨瞿舍利亦復如是問沙門生活現得果報答言輪回淨化我起如是念如我者得非令境內沙門婆羅門起不快感致如是耶故於彼言亦不稱讚亦不輕毀時我內心雖懷忿結不出忿言惟以平靜聽受彼說而且不加尊重起座退出二二大德我於一時訪阿耆多翅舍欽婆羅相問訊已於一隅坐坐一隅已我問彼言阿耆多翅舍欽婆羅世有種種技術職業之人如是如是乃至阿耆多翅舍欽婆羅沙門生活亦得施設如是目覩現報耶二三大德阿耆多翅舍欽婆羅乃報我言大王無布施無供犧無祭祀無善惡業之異熟果亦無今世亦無他世無母無父亦無化生之有情世間無有沙門婆羅門正住正行亦無今世他世悉皆自知自證為他宣說人依四大種所成若命終者地還歸地身水還歸水身火還歸火身風還歸風身諸根歸入空虛四人以第五牀輿舉尸運往冢聞至冢雖作讚嘆語經火燒後其骨為鴿色供物成灰土布施之說愚者言耳若謂人死後仍存無根妄說耳不論賢愚身壞命終斷滅消失一無所存二四大德我問沙門生活現得果報阿耆多翅舍欽婆羅如是自說斷滅論猶如問菴羅樹果答言麵包樹果如是如是乃至不加尊重起座退出二五大德我於一時訪婆浮陀迦旃那相問訊已於一隅坐坐一隅已我問彼言婆浮陀迦旃那世有種種技術職業之人如是乃至婆浮陀迦旃那沙門生活亦得施設如是目覩現報耶二六大德婆浮陀迦旃那乃報我言大王此七身不能作不能使作不能造不能使造亦一無産生如山頂常住如石柱屹立不動彼等不動搖不轉變不互侵不互致苦不互致樂不互致苦樂云何七身地身水身火身風身苦樂及第七之靈魂是此七身不能作不能使作不能造不能使造亦一無産生如山頂常住如石柱屹立不動彼等不動搖不轉變不互侵不互致苦不互致樂不互致苦樂是故無能殺者無使殺者無能聞者無使聞者無能識者無使識者若以利劍斷他人頭皆不因此喪人生命僅此七身為劍貫通其間隙耳二七大德我問沙門生活現得果報婆浮陀迦旃那以他見地自說他事猶如問菴羅樹果答言麵包樹果如是乃至不加尊重起座退出二八大德我於一時訪尼乾子相問訊已於一隅坐坐一隅已我問彼言尼乾子世有種種技術職業之人如是乃至尼乾子沙門生活亦得施設如是目覩現報耶二九大德尼乾子報我言大王尼乾子由四禁戒而為制御如何由四禁戒而為制御尼乾子禁用一切水制一切惡離一切惡達一切惡之制御如是由四禁戒而為制御是故稱尼乾子是稱心已達於最高極致心為抑制心為安定三大德我問沙門生活現得果報尼乾子如是自說四禁戒猶如問菴羅樹果答言麵包樹果如是乃至不加尊重起座退出三一大德我於一時訪散若夷毗羅梨沸相問訊已於一隅坐坐一隅已我問彼言散若夷毗羅梨沸世有種種技術職業之人如是乃至散若夷毗羅梨沸沙門生活亦得施設如是目覩現報耶三二大德散若夷毗羅梨沸乃報我言汝若問我有他世耶我若以為有他世當答汝有他世然我亦不以為如是亦不以為唯然亦不以為是其他亦不以為不然亦不以為非不然汝若問我無他世耶亦復如是云云乃至他世有耶無耶他世亦非有耶亦非無耶有化生之有情耶無化生之有情耶化生之有情有耶無耶化生之有情亦非有耶亦非無耶有善惡業之異熟果耶無善惡業之異熟果耶善惡業之異熟果有耶無耶善惡業之異熟果亦非有耶亦非無耶如來死後存耶如來死後不存耶如來死後存耶不存耶如來死後亦非存耶亦非不存耶我若以為如來死後亦非存亦非不存當答汝如來死後亦非存亦非不存然我亦不以為如是亦不以為唯然亦不以為是其他亦不以為不然亦不以為非不然三三大德我問沙門生活現得果報散若夷毗羅梨沸如是言說矯亂猶如問菴羅樹果答言麵包樹果如是乃至不加尊重起座退出三四大德我於世尊亦如是問大德世有種種技術職業之人如是乃至大德沙門生活亦得施設如是目覩現報耶大王我能施設我今於此還以問卿卿當隨意答三五大王於意云何今有卿家一奴僕為卿從事勤務夙興夜寐執服卿之雜役和顏悅色言說愛語力承卿歡彼念功德果報與其成熟實希有也未曾有也摩揭陀國王韋提希子阿闍世亦人也我亦人也然此王者五欲自娛具足其樂嬉戲如神我則反是為彼之奴為彼從事勤務夙興夜寐執服彼之雜役和顏悅色言說愛語力承彼歡我欲如彼我亦行彼如是功德我當剃除鬚髮著袈裟衣離家出家彼於後時剃除鬚髮著袈裟衣離家出家如是出家彼身語意住於制御粗衣糲食而自滿足離世間居自以為樂時卿之臣而以彼事奏卿言願王知之彼原為王奴為王從事勤務夙興夜寐執服雜役和顏悅色言說愛語力承王歡彼後剃除鬚髮著袈裟衣離家出家如是出家彼身語意住於制御粗衣糲食而自滿足離世間居自以為樂爾時卿作是言耶令彼還歸我處復