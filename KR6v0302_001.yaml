body:
  text: 長部經典一江鍊百據日譯本重譯沙門芝峯校證目次梵網經第一宇井伯壽原譯一舊譯長阿含卷第十四梵動經大正藏一及梵網六十二見經大正藏二一本經內容依二部構成首說凡夫讚嘆如來類言瑣細卑近之戒其下分述小中大三戒小戒所述為與五戒或十戒相當之戒中戒大戒復將此諸戒詳為敘述此部說法見引於長部經典第一之多數經典中為修道大綱之一部分與後所分之三學五分法身以及五根五力中之戒相當並為此等綱目所從出之根本次說如來自證自知並現證而說甚深難見諸法於此處述及六十二見據經典言此六十二種見屬過去者十八屬未來者四十四就見之種類言分為我及世間之常住論有常無常論無因論世間之有邊無邊論詭辨論死後之有想論無想論非有想非無想論斷滅論現在涅槃論等其中心間題不出我及世間二者而此諸說或於深進思想缺乏根底或僅就餘說折衷補遺要皆為佛在世時異學窮研細究之處蓋此部經典極屬重要可視為當時思想界之縮圖且佛教立場於焉闡明而其所居地位亦得由是察知故在相應部經典之某經中述本經處則揭舉經名在中部經典之某經中竟有顯依本經者或有預想本經者其在阿含經典中地位之重要殊堪注意沙門果經第二羽溪了諦原譯二六舊譯長阿含卷第十七沙門果經大正藏一增一阿含卷第三十九之第七經大正藏一二五寂志果經大正藏二二舊譯諸經或將本經重要教義約略敘說或混同為說本經則記述詳細且其內容極為鮮明經之前半介紹六師外道之說後半詳述沙門現世果報即佛教中心之戒定慧三學六師外道即在佛陀時代反婆羅門主義所起之思想運動中為最有力之代表本經包舉一切並揭其學說與主張殆世所罕見之重大特點且復將此諸說與佛教中心思想列舉而出故於考察佛陀時代之一般思想上本經特為重典後半部中如梵網經分述大中小戒列舉具足此等戒之比丘內心狀態如制御諸根正念正智少欲知足離脫五蓋是次就得歡喜心以入禪定指而明之更復由四禪六通四諦之證得以至阿羅漢果加以詳述此後半部所述在長部經典第一所載之大部分中反覆重見故諸經中於此等處大抵從略實以經本配列關係故於餘處加以省略非因本經此種部分較為遠古或較為根本之作凡讀長部經典者務希注意復次為便利計在諸經省略處一一附注參照本經某項云云阿摩晝經第三長井真琴原譯四七舊譯長阿含卷第十三阿摩晝經大正藏一舊譯中關於三學部分本經從略蓋此部分已詳前之沙門果經本經內容於四姓中論婆羅門及剎帝利之優劣佛對青年婆羅門阿摩晝述說釋迦族為沃伽伽王所出之尊貴武族婆羅門則為王下婢所出之卑族示以世間尊重剎帝利之事實挫折阿摩晝之自負令其歸佛婆羅門稱為四姓之首而對之作強有力之說法者即本經是種德經第四久野芳隆原譯五八舊譯長阿含卷第十五種德經大正藏一本經內容述婆羅門之歸佛描寫彼等當時之心理殊饒興味蓋種德婆羅門慕佛名詣佛所而餘諸婆羅門則加阻止雙方之間乃起佛與婆羅門之比較論及種德抵佛所列舉婆羅門五殊勝法而一一為佛說倒遂認戒定慧為最上乘有此三學之說法終乃歸佛種德訪佛之前及其歸佛之後猶慮為衆所輕自墜聲譽損其收入於此等處可以窺知婆羅門間佛力所及亦強而有威也究羅檀頭經第五長井真琴原譯六五舊譯長阿含卷第十五究羅檀頭經大正藏一本經內容述婆羅門究羅檀頭欲設大祀不諳儀禮乃詣佛所蒙示祭祀儀式進而示說其根本精神終得歸依佛法讀本經可知佛陀時代婆羅門之施設祭祀多囿於形式抹煞根本精神佛非僅反對婆羅門儀禮而其態度轉足以化儀禮於精神使之躍然有生氣此亦本經所顯示之別一法門也摩訶梨經第六赤沼智善原譯七六舊譯無本經內容述修習梵行之目的在斷諸結與證無漏之心解脫及慧解脫其實現法門為八聖道次說若命身一異之論則於修行禪定之比丘全不適應闍利經第七木村泰賢原譯八舊譯無本經除首尾數句與摩訶梨經相異外全文與摩訶梨經一五至一九同故此部分概從略迦葉師子吼經第八金倉圓照原譯八舊譯長阿含卷第十六倮形梵志經大正藏一本經初列舉諸苦行謂修此之人雖有稱為沙門婆羅門者然得戒具足心具足慧具足之人始可稱為真正之沙門婆羅門而佛於此點則較任何餘者為優越復謂異學之人欲出家受戒當先令留住四月期間蓋本經所述以諸苦行決非證道之方便而其詳舉苦行種類之處當注意也布吒婆樓經第九木村泰賢原譯九舊譯長阿含卷第十七布吒婆樓經大正藏一本經內容分二部第一部以想為中心論其生滅一多想與智想與我等問題第二部示我得即我之正解更於兩部前後舉示佛所說法有決定記不決定記按經中說想為有因有緣依習修有生滅由此生滅論及想滅智定其次進論我與想之關係以此二者為異學所難了解而諷人當入佛道復於當時成問題之世間有常無常有限無限命身一異如來死後事等指為與解脫無關而為不決定記斥外道所說我之常樂示我得及滅所成功德闡明一切悉皆有因有緣須婆經第十荻原雲來原譯一三舊譯無本經內容述阿難答須婆問明示戒定慧三學為佛所稱讚所勸導使人入住之法須婆承其開示歸依三寶堅固經第十一坂本幸男原譯一八舊譯長阿含卷第十六堅固經大正藏一本經內容所述為佛教之神通觀神觀及世界觀佛教以解脫為最高理想所謂神通不過教化衆生之一方便故與其理想無何直接關係神觀則以諸神輪回生死同時讚護我佛及其教說而擯斥世界有邊無邊諸問題申述因識之滅一切隨滅此等處殆可謂為後世唯識說之濫觴也又本經中言成為後世阿毗達磨佛教之論題者數見不鮮例如四大滅於何處婆沙論第一二九大梵天之避馬勝問而自矜讚則為有覆無記之表業存於梵世之徵俱舍論第十一大梵天自稱梵天大梵天乃至一切之父而梵衆天皆信之則為見取及戒禁取二惡見所由起婆沙論第九八等是露遮經第十二花山信勝原譯一一二舊譯長阿含卷第十七露遮經大正藏一本經內容所述為露遮婆羅門生惡見以沙門婆羅門雖證知善法而不應為他人說佛謂如是之見是為邪見當墮地獄或畜生道世有三師不自覺而不覺他不自覺而覺他自覺而不覺他如此等師皆可受責難唯自覺覺他之師不可責難佛正是此師並示三學四諦之說法三明經第十三山田龍城原譯一一八舊譯長阿含卷第十六三明經大正藏一三明者詳言之係指利俱沙摩耶柔盧三種吠陀今解作廣義通指吠陀故三明經可謂為記述奉此吠陀之婆羅門者也佛應二青年婆羅門之請以極自然言為之說法使之滿足令其領悟佛陀之教如何優勝於婆羅門教經中舉稱婆羅門諸古仙外而與優婆尼沙陀有關之某某諸派之名亦有舉述於察知佛陀時代婆羅門諸派之一斑本經殊為重要提提利耶及瞻陀迦等之名見於佛典者除本經外餘經之中殆鮮言之而本經之主要人物如婆悉咤跋羅陀皤闍亦為古文獻中所見之利俱吠陀傳承者由是可知本經殆為研究古代婆羅門教者所深感興味之一種典籍大本經第十四平等通昭原譯一二八舊譯長阿含卷第一大本經大正藏一本經與舊譯二者相較本經偈文不及其多而散文所述較詳內容為過去七佛之傳記以記毗婆尸佛者實居大部分先就七佛列舉其族姓壽量成道處主要弟子僧會父母都城等次為毗婆尸佛傳自入胎起至誦出最初婆羅提木叉止最後記述瞿曇佛至淨居天諸天於毗婆尸佛瞿曇佛所修行生天之事而毗婆尸傳內所述諸佛常法則為諸佛必經之類型的過程此種傳記不僅為王子出家故事尤有二點特堪注意一為申述出家後之進程二為述說佛成道時之十因緣所謂十二因緣中之無明與行則未言及是也長部經典凡例本經據日本大藏出版株式會社發行之日譯本重譯其原本為巴利聖典出版協會本兼參照錫蘭本與暹邏本云日譯本於經文行端標有數字示巴利原本之頁數俾便互相對照今一一仍之概用大寫數字標出文中字之右角上所記之七號小寫數字為注釋之號碼注釋隨附每經之後文中內之語或句乃日譯者為助讀者瞭解起見而加襯者今仍之文中內之名詞乃日譯者就原語所引用之舊有義譯文中節略語句方式不一一依前後之語氣用乃至如是乃至云云如是云云亦然亦復如是如是如是等於中加者為日譯本所節略無者為原底本所節略日譯本於目次下每經各附有提要今仍之中華民國三十三年九月漢譯校證者沙門芝峯謹識長部經典一梵網經第一第一誦品一如是我聞一時世尊與大比丘衆五百人俱行王舍城至那爛陀大道一遊行者須卑與其弟子梵施童子亦行此道途次須卑以種種語言謗佛法僧而其弟子梵施童子則以種種方便讚佛法僧師徒二人互持異論隨世尊及比丘僧之後而行二爾時世尊與比丘僧在阿婆羅提迦園內國王休憩堂止宿一宵遊行者須卑與其弟子梵施童子亦在堂一宿須卑於此復以種種語言謗佛法僧梵施童子則以種種方便讚佛法僧師徒二人互持異論如是而住三時夜方曉衆多比丘起而集坐於講堂中作如是議諸友希有也諸友未曾有也阿羅漢等正覺者世尊親知親見其能洞察衆生志意之所趣耶何以故彼須卑以種種語言謗佛法僧而其弟子梵施童子則以種種方便讚佛法僧師徒二人互持異論隨世尊及比丘僧之後而行故四爾時世尊知比丘間有如是議至彼講堂就座而坐告比丘等曰諸比丘今者諸子因何語議集坐此處所議何事議半而止比丘等白世尊言吾師適夜方曉我等晨起集坐講堂作如是議諸友希有也乃至隨世尊及比丘僧之後而行故弟子等議至半適世尊來五諸比丘餘人謗我謗法僧者諸子不得痛心不得憂恨不得懷忿怒諸比丘餘人謗我謗法僧者諸子忿怒若不歡喜此於諸子當成障礙諸比丘餘人謗我謗法僧者諸子忿怒若不歡喜如是諸子其能判定餘人為善說為謬說不不也吾師諸比丘餘人謗我謗法僧者諸子不可不辨別其以非實為非實以如是故非屬事實以是如故不得真相我等之間無如是事亦不存有如是事六諸比丘餘人讚我讚法僧者諸子不得歡喜不得欣悅不得懷愈佚諸比丘餘人讚我讚法僧者諸子若歡喜欣悅愈佚此於諸子當成障礙諸比丘餘人讚我讚法僧者諸子不可不審定其以事實為事實以如是故斯屬事實以如是故斯得真相我等之間有如是事亦存有如是事七諸比丘凡夫讚歎如來之言惟以瑣細惟以卑近惟以戒行諸比丘云何凡夫讚歎如來之言惟以瑣細惟以卑近惟以戒行小戒八謂沙門瞿曇捨殺離殺不用刀杖懷慚愧心充滿慈愛利益一切生類有情而住哀愍諸比丘凡夫以此讚嘆如來沙門瞿曇捨不與取離不與取取其所與求其所與毫無盜心自住清淨諸比丘凡夫以此讚嘆如來沙門瞿曇捨非梵行淨修梵行行遠離行捨於淫欲離於粗鄙諸比丘凡夫以此讚嘆如來九沙門瞿曇捨妄語離妄語言真實從真實正直誠心不欺世人諸比丘凡夫以此讚嘆如來沙門瞿曇捨兩舌離兩舌不以此言告彼離間此衆不以彼言告此離間彼衆其為人也有乖離者能令和睦已親密者增其親密有所言說愛樂和合足致和合諸比丘凡夫以