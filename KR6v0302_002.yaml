養今問汝唯願於我有所賜典尊汝言供養物今為汝故我納受為現法益或來世恣所欲問許汝問四五爾時大典尊蒙常童梵天許其咨問即自思念當問常童梵天現法善利耶來世善利耶時大典尊已熟知現法善利而且他人轉從彼聞現法善利故自思念當於常童梵天問來世善利時大典尊以偈問曰梵童是無疑能為我決疑今所咨問者亦衆所欲知應於何處住應於何修習人方得到達不死梵界耶婆羅門應知於世捨我執成心一境相專修悲禪定為解脫臭穢遠離不淨法應於此處住應於此修習人乃得到達不死之梵界四六梵天捨我執法是我所知有人於此捨其家財不論大小捨其親屬不問多寡剃除髮鬚著袈裟衣離於在家入出家生活梵天我知此是捨我執法梵天心一境相亦我所知人於此時遠離住處即就森林以及樹根山嶽洞窟墓地林藪野外場處住梵天我知此是得心一境相法專修悲禪定法亦我所知其人於此時以悲與俱心使遍滿一方而住如是第二方第三方第四方亦然即遍於上下水平一切處以悲與俱之廣大無邊無冤無害心於全世界遍滿而住梵天我知此是專修悲禪定法梵天汝言臭穢為我所不知人間之臭穢是為何者耶因我不知此求説於賢者生類由何蔽以致放惡臭梵界為所閉而墮於惡趣忿怨與妄語偽瞞與不信貪婪與高慢妬嫉與欲求疑惑與害他貪欲與瞋恚憍慢與愚癡有是等諸蔽若於此繫縛臭穢不得離梵界為所蔽而墮於惡趣汝説臭穢我已解知夫在家者於此等事無由得制是故梵天我今意欲離於在家入出家生活典尊汝知時宜者是當可行四七爾時大典尊詣黎努王所到已白王言大王唯願我王別求帝師輔佐王位我今意欲離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制大王故我意欲離在家境營出家生活奉告黎努王願主聽我語王位王所知師位非我喜諸欲若不足我當滿汝欲設有害汝者我為國土主我領率士卒當為汝剪除汝如我之父我猶汝之子唯願大典尊勿捨我而去諸欲非不足害我者亦無我聞超人語故不樂家居云何為超人以何事語汝汝何一聞此悉捨我等去我曾修供養欲舉行此時敷陳吉祥草壇火炎炎熾是時從梵界常童梵天現我聞彼答語故不樂家居奉告典尊聽我信汝所言是聞超人語此外無他途我等當從汝奉汝為教主猶如貴琉璃淨潔放光輝我等心清淨當守汝教訓典尊汝若離在家境營出家生活則我亦將離在家境營出家生活蓋汝所往處亦即是我所往處四八爾時大典尊往彼六人剎帝利所到已語彼等曰汝等今當別選帝師輔佐王位諸子我欲離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活爾時六剎帝利集於一處共相念言凡婆羅門為貪欲者是故我等今可以財誘大典尊彼等詣大典尊所為如是言此七王國多有財寶故隨汝欲可恣意取諸子無用我蒙汝等已多財寶我欲捨斯名譽離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活四九爾時六剎帝利集於一處以婆羅門當好婦人是故我等今可以婦人誘大典尊彼等詣大典尊所為如是言此七王國婦人衆多故隨汝欲可與俱去諸子無用我有身分同等四十夫人我欲悉捨彼女離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活五典尊汝若離在家境營出家生活我等亦將離在家境營出家生活蓋汝所往處亦即是我等所往處汝若欲捨却凡夫諸執著是則當具足堅固忍辱力如此者是道正道無上道生梵由正法善人所守護五一然則典尊汝可留待七年過七年後我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處諸子七年歲月毋乃過長待汝七年我所不能人之壽命誰能知者未來必至智必須證善根必作梵行必修生必有死我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活五二典尊汝可留待六年如是如是留待五年四年三年二年乃至留待一年過一年後我等亦將離在家境營出家生活蓋汝所往處亦即是我等所往處五三諸子一年歲月毋乃過長待汝一年我所不能人之壽命誰能知者未來必至智必須證善根必作梵行必修生必有死我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活典尊汝可留待七月過七月後我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處五四諸子七月為時毋乃過長待汝七月我所不能人之壽命誰能知者未來必至智必須證善根必作梵行必修生必有死我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活典尊汝可留待六月如是如是留待五月四月三月二月一月乃至留待半月過半月後我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處五五諸子半月為時毋乃過長待汝半月我所不能人之壽命誰能知者未來必至智必須證善根必作梵行必修生必有死我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活然則典尊可待七日以便我等付王國於子或兄弟過七日後我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處諸子七日非長我當待汝五六爾時大典尊詣七富婆羅門及七百梵行期已終了者所到已語彼等曰汝等今可別求軌範師教授咒文諸子我欲離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活典尊汝勿離在家境營出家生活出家力微所得者少為婆羅門則具偉力所得者多勿言出家力微所得者少勿言為婆羅門則具偉力所得者多諸子除我以外復有何人更為偉大更多所得耶我今實為王中之王於婆羅門我為梵天而於長者我則為神即此一切我亦捨離意欲離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制諸子故我意欲離在家境營出家生活典尊汝若離在家境營出家生活我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處五七爾時大典尊往身分同等四十夫人所到已語彼等曰若意所欲可歸汝家或親屬家擇夫而侍我欲離在家境營出家生活我從梵天聞説臭穢夫在家者於此等事無由得制故我意欲離在家境營出家生活我等欲親屬者唯汝為親欲侍夫者唯汝是侍典尊汝若離在家境營出家生活我等亦將離在家境營出家生活蓋汝所往處亦即我等所往處五八時大典尊婆羅門過七日已剃除鬚髮著袈裟衣離在家境入出家生活七剎帝利王七富婆羅門七百梵行期已終了者身分同等四十夫人數千剎帝利數千婆羅門數千長者及婦女衆中衆多婦人等皆悉剃除髮鬚著袈裟衣從大典尊而為出家是大典尊為此會衆之所圍繞遊行村城都會之間大典尊每到村城為王中王於婆羅門彼為梵天而於長者彼則為神當時人民於嚏於躓輒言歸命大典尊歸命於人師五九大典尊婆羅門以慈與俱心遍滿一方而住如是於第二方第三方第四方亦然即遍於上下水平一切處以慈與俱之廣大無邊無冤無害心於全世界遍滿而住以悲與俱心亦復如是如是而住以喜與俱心亦復如是如是而住乃至以捨與俱心使遍滿一方而住如是於第二方第三方第四方亦然即遍於上下水平一切處以捨與俱之廣大無邊無冤無害心於全世界遍滿而住以梵天為友之道示諸弟子六爾時大典尊婆羅門弟子若已具足了達諸所教者身壞命終生於有福梵天其未充分了達諸所教者身壞命終或者得與他化自在天為伴侶或者得與化樂天為伴侶或者得與兜率天為伴侶或者得與夜摩天為伴侶或者得與三十三天為伴侶或者得與四天王天為伴侶其最低身者亦得乾闥婆身此等一切出家善男子悉有實益而非唐捐齎得果報及功德云六一五髻説言世尊猶記憶耶世尊曰五髻我尚記憶我於爾時為大典尊我示諸弟子以與梵天為友之道五髻但此梵行非導趣於厭污離欲滅寂靜神智力正覺涅槃之法唯是生於梵界之法五髻然我梵行是導趣於厭污離欲滅寂靜神智力正覺涅槃之究竟法此是八聖道即正見正思正語正業正命正精進正念正定五髻唯此梵行方是導趣於厭污離欲滅寂靜神智力正覺涅槃之究竟法六二五髻我之弟子若已具足了達諸所教者則為滅漏以無漏心解脫慧解脫於現法中而自現證得神通而住其有未能充分了達諸所教者或斷五下分結而得涅槃在更不還法所有者住處於此世間無父母故而不再生復有未能充分了達諸所教者或斷三結漸減貪瞋癡成斯陀含一度還此世令苦終滅復有未能充分了達諸所教者或斷三結成須陀洹離墮惡趣法必得成正覺五髻此等一切出家善男子悉有實益而非唐捐齎得果報及功德也世尊如是説乾闥婆子五髻心生歡喜聞世尊説滿足感謝禮敬世尊右繞而退大會經第二十一如是我聞一時世尊住釋迦族地迦毗羅城之大園林與大比丘衆五百人俱皆是阿羅漢衆多諸天欲覲世尊及比丘衆從十方世界咸來集會二時四淨居天念言今彼世尊住釋迦族地迦毗羅城之大園林與大比丘衆五百人俱皆是阿羅漢衆多諸天欲覲世尊及比丘衆從十方世界咸來集會我等何不亦詣世尊所於世尊前各自唱偈三於是彼等諸天猶如力士屈伸臂頃從淨居天疾速隱身現世尊前時彼諸天禮拜世尊於一面立立一面已中有一天於世尊前以偈唱曰大會此園林諸天衆來集我等亦與會覲無能勝僧是時餘天於世尊前以偈唱曰是處諸比丘心安靜而正如御者執轡衆賢護諸根是時餘天於世尊前以偈唱曰斷除諸羈絆門閂亦切斷打破城門礎離欲而遊行具眼之彼等清淨離垢穢譬如少壯象曾受善調御復次餘天於世尊前以偈唱曰諸歸依佛者終不墮惡趣其捨此人身得天身圓滿四爾時世尊告諸比丘衆曰諸比丘衆多諸天為覲世尊及比丘衆故從十方世界咸來集會諸比丘於昔久遠時有應供等正覺者曾有此等最高諸天為諸世尊咸來集會猶如今日諸天咸皆為我集會諸比丘遠於未來將有應供等正覺者亦當有此等最高諸天為諸世尊咸來集會猶如今日諸天咸皆為我集會諸比丘我當為汝等稱諸天族名諸比丘我當為汝等宣諸天族名諸比丘我當為汝等示諸天族名當善諦聽善憶念之我告汝等彼諸比丘答曰世尊願如所説世尊如是言五我今亦以偈當為汝等説謂有地處所諸天所寄託住於山窟者心決定堅固如衆獅子毛豎立而卷縮持有潔白心清淨復澄明知迦毗羅城在城園林中為數五百餘衆多弟子等教主告彼等喜受教弟子天族已到來比丘宜知識聞佛陀教已彼等皆奮勵六彼諸比丘等明識非人相或者見一百亦見有七萬或又見非人其數為百千或見無邊數多遍一切處具眼師宣説悉知彼諸天即便告彼等喜受教弟子天族已到來比丘宜知識我今以頌言稱道彼諸天次第無錯謬一一為汝宣七迦毗羅城地夜叉有七千具神通光明威容與聲名彼等皆歡喜來比丘園林雪山之夜叉其數有六千此諸夜叉衆各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林娑多山夜叉其數有三千此諸夜叉衆各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林共一萬六千各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林八毗波密夜叉其數有五百此諸夜叉衆各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林住毗富羅山而在王舍城有金毗羅神奉彼夜叉衆數逾百千衆王舍城所住彼金毗羅神亦來到園林九統東方天王名提頭賴吒乾闥婆之長具名聞大王衆子有大力皆字因陀羅具神通光明威容與聲名彼等皆歡喜來比丘園林次南方天王名曰毗樓勒鳩槃荼之長具名聞大王衆子有大力皆字因陀羅具神通光明威容與聲名彼等皆歡喜來比丘園林次西方天王名毗樓博叉實諸龍之長具名聞大王衆子有大力皆字因陀羅具神通光明威容與聲名彼等皆歡喜來比丘園林次北方天王名曰俱毗羅實諸夜叉長具名聞大王衆子有大力皆字因陀羅具神通光明威容與聲名彼等皆歡喜來比丘園林在東方天王是提頭賴吒在南方天王此是毗樓勒在西方天王是毗樓博叉在北方天王此是俱毗羅如斯四天王光普照四方立迦毗羅城衆比丘園林一彼等部下衆有幻偽虛妄復懷有惡心咸共來到此摩野拘天陀復共吠天陀以及韋馱質與韋馱遮俱復有旃陀那與加摩世致及迦尼延豆並尼延豆俱復有波那摣及嗚呼杈奴并與摩頭羅是天之御者復有乾闥婆支多羅斯那復有那羅王俱共闍尼沙復有珍浮樓修利婆折斯與般闍尸呵亦皆來到此凡此一切衆與餘他諸王及諸乾闥婆咸與諸王俱悉懷歡喜心來比丘園林一一時那陀瑟龍與毗舍離俱復與怛叉迦咸共來到此又加毗羅攝與波耶伽俱復與其親族咸共來到此又有耶無那及提頭賴吒具名聲諸龍咸共來到此又有彼大龍名伊羅婆陀亦前來與會而詣於園林彼於速疾間能搏龍王去具淨眼雙翅天再生者鳥從天空飛來棲止園林中美麗金翅鳥是彼等名稱其時諸龍王曾無所畏怖因佛已為設避難安穩處彼等兩者間互以愛語呼諸龍與衆鳥皆已歸依佛一二敗於金剛手住海阿修羅婆三婆弟兄有神通名聲又有大怖畏諸迦羅鏗騫陀那吠伽沙與毗摩質多及蘇啷怛囉并與波羅陀共那無夷俱悉詣於園林又跋離百子皆稱毗盧遮糾合大力軍羅耶跋兜樓曰諸賢來會於比丘園林一三又水地火風諸天亦來此水天與其族蘇摩共耶舍慈悲天一族是有名諸天此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一四有曰毗紐天舍伽利諸天及共阿沙摩並雙孿耶摩月天諸侍者供奉月天來日天諸侍者禮敬日天來遲遲之雲神隨侍諸星來婆藪天之主婆娑婆帝釋即普楞陀陀今亦來到此此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一五沙訶沸諸天爾時亦到來勢如熖頂燃又有阿栗吒俱共櫨耶天風趣如麻華有嚩嚕拏天遮婆陀暮天及以阿周陀與阿尼輸天光輝須勒耶彼衆皆來到毗沙門伊灑亦復來到此此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一六有賒摩天者與摩呵賒摩麼䨲沙與俱摩䨲疏多摩乞陀波頭灑衆皆來到此摩䨲波頭灑亦復來到此時呵羅諸天及與著紅衣露希多諸天亦皆來到此有波羅諸神及摩訶波羅是具有名聲亦皆來到此此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一七叔伽阿羅那共伽羅摩俱及鞞摩尼娑衆皆來到此鳴婆提奇呵鞞波羅微那此等之諸天亦皆來到此有薩陀摩多與訶羅伽遮名聞之彌沙亦皆來到此又有波純提降雨四方者於震雷聲中亦復來到此此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一八差摩與兜率共彼夜摩俱及名聞伽沙共彼藍鞞者與主藍婆天火天之樹提與伊灑天俱及化樂諸天他化自在天相將來到此此等十天族各各異容色具神通光明威容與聲名彼等皆歡喜來比丘園林一九此六十天族各各異容色依名依種族與同等天俱既共來集已咸作如是言願使我等見捨生拔三毒及已渡暴流成就無漏者彼等渡暴流其勢殆如龍又如黑暗中明月乍湧出二神通具足者其子善梵天婆羅摩多共與常童底沙是等梵天子亦來園林會大梵天為王君臨千梵界彼具足光輝有名形可怖時十自在者各名得自在彼等所圍繞中為訶利多如是諸天衆亦復來到此二一復有因陀羅共梵天俱來爾時有魔軍於諸天前曰前進且觀看是緩慢迦訶可縛可捕捉彼實受欲縛從四方合圍勿得任彼脫於是在此時有摩訶塞那遣發迦訶軍以手拍地面其聲可怖驚猶如雨期雲電閃復雷鳴彼由是忿怒不能制其軍乃退而散去二二了知此一切具眼師宣説即便告彼等喜受教弟子魔軍已到來比丘宜知識彼等承佛教精神皆奮舉魔軍今已退不近離欲者一毛未傾動戰乃得全勝彼一切衆生聞此皆歡喜諸天聞此語歡喜亦復然帝釋所問經第二十一第一誦品一如是我聞一時世尊住摩揭陀在王舍城東菴婆散陀婆羅門聚落北毗陀山因陀娑羅窟爾時天主帝釋發渴仰心欲見世尊彼乃思惟世尊應供等正覺者今住何所天主帝釋見世尊住摩揭陀王舍城東菴婆散陀婆羅門聚落北毗陀山因陀娑羅窟彼遙瞻已語忉利諸天曰諸天彼世尊住摩揭陀王舍城東菴婆散陀婆羅門聚落北毗陀山因陀娑羅窟今者我等欲往詣見彼世尊應供等正覺者則為如何忉利諸天答天主帝釋曰唯然願卿多福二天主帝釋復語乾闥婆子般遮翼五髻曰般遮翼彼世尊住摩揭陀王舍城東菴婆散陀婆羅門聚落北毗陀山因陀娑羅窟般遮翼今者我等欲見彼世尊應供等正覺者往詣如何乾闥婆子般遮翼答帝釋曰唯然願卿多福即持毗留筏木黃色之琴隨天主帝釋俱行於是天主帝釋忉利諸天之所圍繞率同乾闥婆子般遮翼猶如力士屈伸臂頃於忉利天隱身而沒現於摩揭陀王舍城東菴婆散陀婆羅門聚落北毗陀山三時毗陀山盛光晃耀婆羅門聚落菴婆散陀亦復如是此是諸天神威所致而彼周圍聚落諸人咸作是言毗陀山今正燃燒火焰升騰今毗陀山盛光晃耀婆羅門聚落菴婆散陀亦復如是為何故耶彼等畏悚毛髮豎立四時天主帝釋告乾闥婆子般遮翼曰般遮翼凡入禪定悅樂禪定純靜居時如來則若我者甚難得近今汝先可怡悅世尊而後我等詣見彼世尊應供等正覺者則為如何乾闥婆子般遮翼答帝釋曰唯然願卿多福即持毗留筏木黃色琴詣因陀婆羅窟至已立於一面自念世尊離我不遠亦不近可聞我聲乾闥婆子般遮翼鼓毗留筏木黃色琴於佛法聖者及愛樂者曼聲為之歌曰五跋陀聽我歌如日晶瑩女卿父耽浮樓為我所敬禮是生汝麗姝為我歡喜因如於熱汗人可喜清涼風猶渴夫於水如聖者於法我於卿天女鍾愛亦如此猶藥於病人食於飢餓者如是跋陀兮我思若火燃願卿施涼水解我相思熱蓮池水清涼盈溢浸華梢象受驕陽炙熱逼入於池如是我何堪欲投卿胸次如象不伏鈎突破狼牙棒覿卿胸豐美最使我狂醉如是莫自持更不知所措我專念於汝心神殊平昔猶如吞鈎魚欲吐不可得腿美兮跋陀歡娛恣擁抱青眼任流盻玉手握莫釋如是誠相宜我專意此欲噫此鬈髮女我戀不少弛猶獻供於聖彌增而彌進遍身美嬌姝我於彼聖者所為諸善語福果與卿共遍身美嬌姝我之於此世所為諸功德福報與卿共我於所愛卿晶瑩如日女猶彼牟尼佛依禪定一心聰慧復正念意在求常住如是我所求為在欲得汝如牟尼怡然樂無上正覺若得汝盟約我心深悅樂如願主帝釋為我垂恩澤跋陀我求卿戀戀堅若此慧卿如沙羅初開麗光輝卿父我膜拜斯亦緣彼女六歌聲既畢世尊告乾闥婆子般遮翼曰般遮翼今汝歌聲與絃音和絃音亦復與歌聲和而此歌聲不亞絃音絃音亦不亞於歌聲汝於何時如是薈萃佛法聖者及愛樂者為此曼聲之歌世尊昔時世尊初成正覺住鬱鞞羅在尼連禪河岸阿暗惒羅榕樹下世尊時乾闥婆王耽浮樓有女跋陀晶瑩如日我所思慕但此王女念他男子繫其情思於御者摩兜利之子尸漢陀我竭諸方便以求彼女而不能得乃持毗留筏木黃色琴至乾闥婆王耽浮樓宮所到已鼓琴於佛法聖者及愛樂者曼聲為之歌曰七跋陀聽我歌如日晶瑩女汝父耽浮樓為我所敬禮是生汝麗姝為我歡喜因如是復如是戀戀堅若此慧卿如沙羅初開麗光輝卿父我膜拜斯亦緣彼女如是歌畢彼晶瑩如日跋陀乃語我曰我雖未曾面見世尊然於忉利天善法堂上奏舞之時聞世尊事卿於世尊果讚歎者我等今當相共會也世尊唯於後時彼女會我八爾時天主帝釋如是念言乾闥婆子般遮翼實與世尊彼此之間互訂誼好於是天主帝釋告般遮翼曰般遮翼汝可為我白世尊言天主帝釋宰相扈從禮世尊足乾闥婆子般遮翼答帝釋曰唯然願卿多福即白世尊言天主帝釋宰相扈從禮世尊足般遮翼願天主帝釋與宰相扈從俱共安樂蓋此安樂實為神人及阿修羅龍及乾闥婆一切衆生等所欲得者如來凡於如上諸衆致問訊言皆如是也天主帝釋於彼世尊致問訊已入因陀娑羅窟禮拜世尊立於一面忉利諸天與乾闥婆子般遮翼亦入因陀娑羅窟禮拜世尊立於一面九爾時因陀娑羅窟崎嶇之地自然平坦狹隘之處自然廣博暗窟之內自然光明此是諸天神威所致世尊乃語天主帝釋曰帝釋尊如是任重事繁乘隙臨此殊為難能世尊我於長時已懷斯願為欲詣見世尊但我於忉利天任務紛繁無有間暇欲見世尊來詣未果世尊曾於一時世尊住舍衛國在松林精舍我於是時欲見世尊詣舍衛國一爾時世尊入住三昧而坐毗沙門天后槃遮提奉侍世尊合掌恭敬我曾語槃遮提曰夫人願汝為我啓白世尊天主帝釋宰相扈從禮世尊足槃遮提聞言已語我曰汝見世尊今非其時世尊適在靜居中夫人若世尊從三昧起者為我啓白天主帝釋宰相扈從禮世尊足世尊彼夫人殆已為我啓白世尊世尊當能憶念其辭天主彼夫人白我我憶其辭且我復因聞汝車輪聲從三昧起一一世尊有彼諸天先於我等生忉利天我於彼等而得聞知凡有如來應供等正覺出現於世天衆增盛阿修羅減衰我於其時實曾自見如來應供等正覺出現於世於是天衆增盛阿修羅減衰世尊迦毗羅城曾有釋女名曰瞿毗信佛法僧具足戒行彼捨女心起丈夫心身壞命終得生善趣天界與忉利天為我之子而於彼處以天子瞿波之名見知於衆復有三比丘於世尊所雖修梵行但生卑賤乾闥婆中彼等樂享五欲來我等所奉侍供使天子瞿波訶責之曰卿等豈未曾聞世尊之法面向何處耶我雖女身信佛法僧具足戒行捨棄女心起丈夫心身壞命終得生善趣天界與忉利天儔為天主帝釋之子我於是處以天子瞿波之名見知於衆然而卿等於世尊所雖曾修梵行但生卑賤乾闥婆中俱修同法而乃生於卑賤乾闥婆中者以我觀之可謂愚矣世尊彼等中二人以受訶責於天子瞿波故於其生中已復得念生梵輔天但其一人猶住於欲一二我本名瞿毗具眼優婆夷敬信佛與法樂奉侍僧伽我恆以虔誠從佛所教故得生忉利天今為帝釋子具有大威力復有大光輝且於諸天中以瞿波見知我見乾闥婆衆中所住者前世為比丘而今乃如是彼等先世相實與瞿曇等我為人時見飲食親供養我家雖劇忙來必敬奉侍佛法不受持卿面向何處具眼覺説法自身應憶知我本侍卿等聞諸聖妙説得生忉利天今為帝釋子具有大威力復有大光輝卿等侍勝尊修無上梵行而生於卑賤誤卿等之世俱共受佛法而生於卑賤身為乾闥婆來奉侍諸天使我等觀見嗚呼何愚癡卿等何不觀我本在家者今位乃高尊原為女人身今成大丈夫得天神快樂佛弟子瞿波如是加詰責彼等受其責悶悶心不樂我等從今始當即捨離欲奮勵而精勤身免為人役中二人精進憶念瞿曇道心乃得清淨於欲見過患彼等已切斷強魔繫欲韁猶象破羈紲超忉利天上善法堂諸天帝釋與梵王然彼離愛染離塵欲丈夫是以彼所往超越此會衆時天主帝釋在天衆中央見是懷惱悶作不安念言彼等生卑賤竟超忉利天瞿波聞是言乃白帝釋曰釋迦牟尼佛人世克欲聖彼原佛弟子然以失念故異世而轉變受乾闥婆身佛子受我訶復還得此念三者中之一猶住乾闥婆惟有彼二人能隨於正覺堅定其自性復降伏五欲故神見彼等心亦為惱悶開闡如是法弟子復何疑故我等歸依度暴流斷惑彼佛陀勝者及以人中王於是彼二人覺已而上升得登梵輔天進位於高尊我等於是法亦將即當得若蒙垂許者欲有所請問一三爾時世尊便作是念是帝釋實為長時無垢凡問我者皆屬切要非徒然也又於我所答義彼當即能了解於是世尊以偈答言帝釋恣問我隨意之所樂凡有所問者皆悉為卿決第二誦品一時天主帝釋得許可故乃問世尊曰世尊天人阿修羅龍乾闥婆及餘諸衆生緣以何結彼等雖念我等當無恚無訶無爭無害無怨諸過然猶有恚有訶有爭有害有怨諸過耶天主帝釋於世尊前如是問已世尊答曰天主天人阿修羅龍乾闥婆及餘諸衆生各有嫉慳二結彼等雖念我等當無恚無訶無爭無害無怨諸過然猶有恚有訶有爭有害有怨諸過世尊如是答帝釋已天主帝釋衷心踴躍於世尊説歡喜信受如是白曰唯然世尊唯然善逝我聞世尊答故疑消迷開二天主帝釋聞世尊説如是歡喜信受已復為問曰世尊嫉慳以何為緣從何而起由何而生以何為源有何始有嫉慳無何乃無嫉慳天主嫉慳以愛憎為緣從愛憎起由愛憎生愛憎為源有愛憎時有嫉慳無愛憎時無嫉慳世尊愛憎以何為緣從何而起由何而生以何為源有何始有愛憎無何乃無愛憎天主愛憎以欲為緣從欲而起由欲而生以欲為源有欲時有愛憎無欲時無愛憎世尊欲以何為緣從何而起由何而生以何為源有何始有欲無何乃無欲天主欲以尋為緣從尋而起由尋而生以尋為源有尋時有欲無尋時無欲世尊尋以何為緣從何而起由何而生以何為源有何始有尋無何乃無尋天主尋以妄想諸支為緣從妄想諸支起由妄想諸支生以妄想諸支為源有妄想諸支時有尋無妄想諸支時無尋三世尊彼能滅妄想諸支得道比丘依何而行耶天主我説喜有二種謂可親及不可親我説憂有二種謂可親及不可親我説捨有二種謂可親及不可親茲言天主我説喜有二種謂可親及不可親云何為是言謂若有人自念我親此喜則惡法增而善法減斯喜則不可親又若有人自念我親此喜則惡法減而善法增斯喜可親於斯是有有尋伺者及無尋伺者無尋伺者勝是故得言天主我説喜有二種謂可親及不可親茲言天主我説憂有二種可親及不可親云何為是言謂若有人自念我親此憂則惡法增而善法減斯憂則不可親又若有人自念我親此憂則惡法減而善法增斯憂可親於斯是有有尋伺者及無尋伺者無尋伺者勝是故得言天主我説憂有二種謂可親及不可親茲言天主我説捨有二種謂可親及不可親云何為是言謂若有人自念我親此捨則惡法增而善法減斯捨則不可親又若有人自念我親此捨則惡法減而善法增斯捨可親於斯是有有尋伺者及無尋伺者無尋伺者勝是故得言天主我説捨有二種謂可親及不可親天主彼能滅妄想諸支得道比丘是依此而行也世尊如是答帝釋問天主帝釋衷心踴躍聞世尊説歡喜信受如是白曰唯然世尊唯然善逝我聞世尊答故疑消迷開四天主帝釋聞世尊説如是歡喜信受已復為問曰世尊彼得波羅提木叉律儀比丘依何而行耶天主我説身業有二種謂可親及不可親我説口業有二種謂可親及不可親我説遍尋有二種謂可親及不可親茲言天主我説身業有二種謂可親及不可親云何為是言謂若有人自念我親此身業則惡法增而善法減如斯身業則不可親又若有人自念我親此身業則惡法減而善法增如斯身業可親是故得言天主我説身業有二種謂可親及不可親茲言天主我説口業有二種謂可親及不可親云何為是言謂若有人自念我親此口業則惡法增而善法減如斯口業則不可親又若有人自念我親此口業則惡法減而善法增如斯口業可親是故得言天主我説口業有二種謂可親及不可親茲言天主我説遍尋有二種謂可親及不可親云何為是言謂若有人自念我親此遍尋則惡法增而善法減如斯遍尋則不可親又若有人自念我親此遍尋則惡法減而善法增如斯遍尋可親是故得言天主我説遍尋有二種謂可親及不可親天主彼得波羅提木叉律儀比丘是依此而行也世尊如是答帝釋問天主帝釋衷心踴躍聞世尊説歡喜信受如是白曰唯然世尊唯然善逝我聞世尊答故疑消迷開五天主帝釋聞世尊説如是歡喜信受已復為問曰世尊彼得諸根律儀比丘依何而行耶天主我説以眼知色有二種謂可親不可親天主我説以耳知聲以鼻知香以舌知味以身知觸如是如是乃至我説以意知法有二種謂可親不可親天主帝釋如是聞已白世尊曰世尊今者簡約言之我已一一知其如是世尊於眼知色親之惡法增善法減損者則是眼所知斯色不可親復次世尊於眼知色親之惡法減善法增長者則是眼所知斯色可親復次世尊於耳知聲於鼻知香於舌知味於身知觸如是如是乃至於意知法親之惡法增善法減損者則是意所知斯法不可親復次世尊於意知法親之惡法減善法增長者則是意所知斯法可親世尊今者簡約言之我一一知於是疑消迷開六天主帝釋聞世尊説如是歡喜信受已復為問曰世尊