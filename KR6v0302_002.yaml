諸有智者依譬喻故解所説義王族譬如有人墜落糞坑身首沒溺時卿命臣下言汝等挽救此人出於糞坑彼等承命即從糞坑救出此人卿復命曰汝等可以竹篦三刮其身拭除糞穢彼等承命即以竹篦三刮其身拭除糞穢卿復命曰汝等可以黃土三塗其身彼等承命即以黃土三塗其身卿復命曰汝等可以香油塗抹其身更以細末三潔淨之彼等即以香油塗抹其身又以細末三潔淨之復次卿言汝等可為其人調整鬚髮彼等即為調整鬚髮復次卿言汝等可為其人持取最上花環香水及衣裳來彼等即為持取最上花環香水衣裳來復次卿又命曰汝等可使其人上升高樓恣五欲樂彼等即使彼人上升高樓恣五欲樂王族於卿意云何其人既已淨浴塗香調髮嚴飾美衣上升高樓得五欲樂而恣享樂而更欲墜於糞坑耶不也尊者迦葉是為何故尊者迦葉以糞坑不淨視為不淨糞坑臭穢視為臭穢是可嫌忌當所嫌忌是可厭避當行厭避故王族實則人世亦復如是是於諸天以人界不淨視為不淨人界臭穢視為臭穢是可嫌忌當所嫌忌是可厭避當行厭避王族人界臭氣上達天界實百由旬卿之朋友知己親屬血族之人捨離殺生捨離偷盜捨離邪淫捨離妄語捨離兩舌捨離惡口捨離綺語不為貪欲不為瞋恚為正見者身壞命終生天上界寧當復肯還來告曰斯有他世有化生有情有善惡業報耶王族依此論據卿當可信斯有他世有化生有情有善惡業報一尊者迦葉縱如是言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉設我今有朋友知己親屬血族捨離殺生捨離偷盜捨離邪淫捨離妄語捨離飲酒彼等異日罹疾病故苦惱劇痛我知彼等此病不能痊愈恢復時至彼等所語如是言卿等某沙門婆羅門謂捨離殺生捨離偷盜捨離邪淫捨離妄語捨離飲酒者身壞命終當生善趣天界為忉利天眷屬彼為如是論如是見者卿等實為離殺生離偷盜離邪淫離妄語離飲酒者若彼尊者沙門婆羅門所言真實是則卿等身壞命終當生善趣天界為忉利天眷屬卿等身壞命終若生善趣天界為忉利天眷屬當來告我斯有他世有化生有情有善惡業報卿等實為我所信賴之人故卿等所見猶我自見彼等雖諾我言然不來告亦不遣其使者前來尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報一一然則王族我今有問卿隨意答王族人界百年實當忉利天上一日一夜彼以三十夜為一月十二月為一年以一千年為忉利天壽量卿之朋友知己親屬血族之人為離殺生離偷盜離邪淫離妄語離飲酒者身壞命終當生善趣天界為忉利天眷屬設若彼等作是念言我等當於二三晝夜間得天五欲樂以享樂自恣然後往詣王族弊宿所告以斯有他世有化生有情有善惡業報如是彼等還來寧得語卿以斯有他世有化生有情有善惡業報耶不也尊者迦葉我等是時命終久矣縱有人以有忉利天或忉利天如斯長壽告尊者迦葉者但今尊者迦葉所言有忉利天或忉利天如斯長壽我不信也王族譬如有人生而盲目彼人不見黑白之色不見青黃赤白等色不見同異不見星宿日月而若彼言無黑白色無見黑白色者無青黃赤白同異星宿日月無見青黃赤白同異星宿日月者王族其言正耶不也尊者迦葉有黑白色有見黑白色者有青黃赤白同異星宿日月有見青黃赤白同異星宿日月者尊者迦葉故彼所言我不知不見此等故皆無有非正當也王族卿亦如是如生盲者想以卿亦答言尊者迦葉縱有人言以有忉利天或忉利天是長壽但我等不信尊者迦葉言有忉利天或忉利天長壽王族如斯他世當非如卿思惟肉眼可見者王族沙門婆羅門坐臥於稀聲疏響森林遠處住不放逸一心不亂修淨天眼彼等以超人清淨天眼見此世他世見化生有情王族於是他世可得而見當非如卿思惟以肉眼見者王族依此論據卿當可信斯有他世有化生有情有善惡業報一二尊者迦葉縱如是言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉今者我見沙門婆羅門具戒有德者願生而不欲死求樂而避忌苦尊者迦葉我乃思惟若此具戒有德沙門婆羅門等果知我等從此處死可更得勝境則此具戒有德尊者沙門婆羅門等當仰毒自殺或以刀劍自刎或投墮懸崖然此具戒有德沙門婆羅門等實因不知我等從此處死可更得勝境故是以彼等樂生厭死尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報一三然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族昔者一婆羅門有二夫人大夫人有子十一二歲小夫人有娠行將分娩彼婆羅門時乃命終時彼孺子語小夫人言小母所有財穀及金銀等皆屬於我汝無一分以父遺産交付於我彼小夫人語孺子言小子待我分娩若為童男彼亦應有財産一分若為童女彼女亦當為汝之妻孺子再語小夫人言小母所有財穀及金銀等皆屬於我汝無一分以父遺産交付於我小夫人再語孺子言小子待我分娩若為童男彼亦應有財産一分若為童女彼女亦當為汝之妻孺童三語小夫人言小母所有財穀及金銀等皆屬於我汝無一分以父遺産交付於我時小夫人即執利刀進入內室自剖其腹言欲明知為男為女彼女喪失自己生命亦復喪失胎兒財産彼女如是蒙昧無智貪求遺産蹈陷災禍實為不當王族卿亦如是蒙昧無智貪求他世蹈陷災禍實為不當亦猶如彼婆羅門妻蒙昧無智貪求遺産蹈陷災禍之不當也王族若具戒有德沙門婆羅門等皆為賢智待機成熟未成熟者不強之熟所以者何王族具戒有德沙門婆羅門等以其生存饒益於世王族具戒有德沙門婆羅門等隨住世久長者彼等所生福德則愈多為利益衆人安樂衆人憐愍世間利益人天安樂人天而住於世王族依此論據卿當可信斯有他世有化生有情有善惡業報一四尊者迦葉縱如斯言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉今有臣民等捕獲盜賊惡徒請示我言主君此是盜賊惡徒唯願隨意處彼刑罰我命之曰然則汝等可將此人生投釜中加以覆蓋密封濕皮厚塗濕泥置於竈上以火煮之彼等承命即將此人生投釜中加以覆蓋密封濕皮厚塗濕泥置於竈上以火煮之我等知彼已死時將釜取下解封啓蓋言我等想可見彼生命之出去狀我等徐窺亦不見彼生命出去尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報一五然則王族我今問卿卿隨意答王族卿於日中休息獲夢頗曾嘗歷苑囿林野國邑泉池之怡悅不尊者迦葉我於日中休息獲夢頗曾嘗歷苑囿林野國邑泉池之怡悅也爾時有侏儒傴僂少女處女侍役護衛卿耶唯然尊者迦葉爾時有侏儒傴僂少女處女侍役為我護衛然彼女等亦見卿生命從卿身體出入耶不也尊者迦葉王族於生存者且於生者如卿生命從卿身體出入彼諸女等尚不得見況於死者生命出入卿得見耶王族依此論據卿當可信斯有他世有化生有情有善惡業報一六尊者迦葉縱如是言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉今有臣民等捕獲盜賊惡徒請示我言主君此是盜賊惡徒唯願隨意處彼刑罰我命之曰汝等可將此人於生存中以稱稱之再用弓絃而絞殺之後復以稱稱之彼等承命即將此人於生存中以稱稱之再用弓絃而絞殺之後復以稱稱之彼生存中輕柔易動彼命終後重硬不動尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報一七王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族譬如有人以稱稱彼終日炎熾赤熱鐵丸他日鐵丸已冷却時復以稱稱此鐵丸者何時輕柔易動為炎熾赤熱時耶為冷却失熱時耶尊者迦葉有熱及空氣炎熾赤熱時鐵丸輕柔易動無熱及空氣冷却失熱時鐵丸重硬不動王族人之身體亦復如是壽暖識俱有時輕柔易動壽暖識俱無時重硬不動王族依此論據卿當可信斯有他世有化生有情有善惡業報一八尊者迦葉縱如是言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉今有臣民等捕獲盜賊惡徒請示我言主君此是盜賊惡徒唯願隨意處以刑罰我命之曰汝等可奪此人生命勿傷皮膚肉腱骨髓彼等承命即奪其生命不傷皮膚肉腱骨髓盜賊惡徒於半死時我乃命曰汝等可使此人仰臥我等或可見彼生命之去彼等即使此人仰臥然而我等亦不見彼生命出去我再命曰汝等可使此人俯臥乃至使左側臥使右側臥使起立使倒置撲以手撲以棒撲以杖撲以刀劍如是乃至上下左右而振蕩之我等當可見彼生命之去彼等即上下左右振蕩此人然而我等皆悉不見彼生命之去彼具有眼色亦存在而彼眼處竟不識色彼具有耳聲亦存在而彼耳處竟不識聲彼具有鼻香亦存在而彼鼻處竟不識香彼具有舌味亦存在而彼舌處竟不識味彼具有身觸亦存在而彼身處竟不識觸尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報一九王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族昔有一吹貝者身攜螺貝往到邊國彼至一村落立村中央三吹螺貝將貝置地坐於一面王族時彼邊地諸人如是思惟此誰之聲使人魅惑愈悅陶醉莊重潤朗乃如是耶彼等來集向吹貝者言吾友此誰之聲使人魅惑愈悅陶醉莊重潤朗乃如是耶諸人使人魅惑愈悅陶醉莊重潤朗有如是者是此物聲物名螺貝彼等即將螺貝仰臥曰螺貝螺貝汝可出聲但此螺貝終不出聲彼等乃將螺貝俯臥左側臥右側臥起立倒置以手撲以杖撲以刀劍撲如是乃至上下左右而振蕩之曰螺貝螺貝汝可出聲然此螺貝終不出聲王族時吹貝者如是思惟邊地諸人何其愚昧何以故彼等如是求螺貝聲非適當也乃從彼等觀貝諸人取還螺貝三度吹鳴攜貝而去王族時彼邊地諸人如是思惟此螺貝者實因有人有力有風方始出聲若此螺貝無人力風與俱者當不出聲王族人之身體亦復如是有壽暖識與俱時則可行住坐臥眼可見色耳可聞聲鼻可嗅香舌可嘗味身可感觸意可識法無壽暖識與俱時則不行住坐臥眼不見色耳不聞聲鼻不嗅香舌不嘗味身不感觸意不識法王族依此論據汝當可信斯有他世有化生有情有善惡業報二尊者迦葉縱如是言我猶思惟斯無他世無化生有情無善惡業報王族卿所思惟如是如是有論據耶尊者迦葉我所思惟如是如是有論據也若然王族云何論據尊者迦葉今有臣民等捕獲盜賊惡徒請示我言主君此是盜賊惡徒唯願隨意處以刑罰我命之曰汝等可剝此人之皮我等或可見彼生命彼等雖剝此人之皮我等猶不見彼生命我再命曰可剝其膚乃至可切其肉可斷其腱可截其骨如是乃至可割其髓我等或可見彼生命彼等雖割此人之髓我等猶不見彼生命尊者迦葉我依此論據故如是思惟斯無他世無化生有情無善惡業報二一然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義昔有結髮事火外道住森林茅屋中王族是時彼處到一商隊時彼隊商於彼結髮事火外道草庵附近一宿而去王族爾時結髮事火外道如是思惟我今往彼商隊宿所或可獲得若干糧食彼結髮事火外道適時晨興往彼商隊宿所至宿所已見有仰臥柔嫩孩兒被人遺棄彼見此已如是思惟我親見之而置其死於不顧者豈非非道我今寧可將此孩兒抱歸草菴養之成長時彼結髮事火外道抱孩歸菴而養長之彼童子者年屆十一二歲之時結髮事火外道適因某事須往村落語童子曰小子我欲往村汝善守火勿使火滅若火滅者此處有斧有薪有鑽可再燃火善守護之如是教已即往村落童子貪戲火乃熄滅時彼童子如是思惟我父有言小子汝善守火勿使火滅若火滅者此處有斧有薪有鑽可再燃火善守護之我當燃火善為守護時彼童子以斧斫鑽意當得火但彼於火已不能得將鑽析為二分三分四分五分十分百分漸至細分分之細細置於臼中搗為粉碎粉碎之已播揚於大風之中意當得火但彼於火已不能得時彼結髮事火外道村事已了歸己草菴至已語彼童子曰小子何故汝滅火耶我父我因貪戲故火熄滅時我思惟我父有言小子汝善守火勿使火滅若火滅者此處有斧有薪有鑽可再燃火善守護之我當燃火善為守護我父時我以斧斫鑽意當得火但火已不能得我將鑽分為二分三分四分五分十分百分漸至細分分之細細置於臼中搗為粉碎粉碎之已播揚於大風之中意當得火但我於火已不能得時彼結髮事火外道如是思惟此童何其愚鈍無智求火之道不當乃爾于童子前取鑽作火而語之曰小子求火法應如是汝愚鈍無智求之不當火不能得王族卿亦如是愚鈍無智卿求他世殊不得當王族應捨此惡邪見勿為長夜無益苦惱二二尊者迦葉縱如是言我仍不能捨此邪見拘薩羅國王波斯匿及餘諸國王盡皆知我王族弊宿為如是諭如是見者謂無有他世無化生有情無善惡業報尊者迦葉若我捨此見者衆將笑我王族弊宿信難信事其人何等蒙昧愚鈍緣於嘲笑將生忿覆及以惱怒是故我寧固持我説二三然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義昔有千乘大車商隊從東國土往西國土商隊所至草薪水蔬立時消盡彼商隊中有二導者各各領導五百乘車時彼導者如是思惟此是千乘大車商隊我等所至草薪水蔬立時消盡寧將此隊分為二分各五百車彼等即分為二隊各五百車其一導者多載草薪及多量水率隊進發行二三日見有一人從前路來色黑晴赤髮束散亂執蓮華環衣髮皆濕驢牽之車為泥所塗見已問言卿從何來從如是如是處汝往何處往如是如是處前方荒地降大雨不然也卿等前方荒地大雨如注路為水滿多草薪水卿等可棄所攜草薪及水輕車疾行毋疲軛牛時彼導者語商隊言此人有言前方荒地大雨如注路為水滿多草薪水卿等可棄所攜草薪及水輕車疾行毋疲軛牛汝等可棄草薪及水輕車進發彼商隊等從導者言捐棄所攜草薪及水輕車進發彼等於第一宿處不見草薪及水於第二宿處第三宿處第四宿處第五宿處第六宿處悉皆不見草薪及水如是乃至於第七宿處亦不見有草薪及水全隊陷於災禍之中彼隊人畜皆為夜叉非人所食僅剩骸骨其第二商隊導者知前商隊出發以來為日已久乃多載草薪及多量水率隊進發行二三日見有一人從前路來色黑晴赤髮束散亂執蓮華環衣髮皆濕驢牽之車為泥所塗見已問言卿從何來從如是如是處汝往何處往如是如是處前方荒地降大雨不然也卿等前方荒地大雨如注路為水滿多草薪水卿等可棄所攜草薪及水輕車疾行毋疲軛牛時彼導者語商隊言此人有言前方荒地大雨如注路為水滿多草薪水卿等可棄所攜草薪及水輕車疾行毋疲軛牛汝等當知此人非是我等朋友親屬血族我等何得信之而行所攜草薪及水不可捐棄積載如故將隊進發我等不棄向所積載彼商隊等從導者言積載如故將隊進發彼等於第一宿處不見草薪及水於第二宿處第三宿處第四宿處第五宿處第六宿處如是乃至於第七宿處亦不見有草薪及水而見陷於災禍之前商隊彼隊人畜皆為夜叉非人所食僅剩骸骨時彼導者語商隊言汝等當知彼隊因從愚鈍導者以致陷於如是災禍是故汝等應棄隊中低值之物拾取彼隊中高值物品彼商隊等從導者言棄其隊中低值之物拾取彼隊中高值物品因從如斯賢明導者乃得無恙通過荒地王族卿亦如是貪求他世而陷災禍卿之不當亦猶如彼商隊導者愚鈍無智人以所聞事不加批判為即可信如彼商隊當陷災禍王族應捨此惡邪見勿為長夜無益苦惱二四尊者迦葉縱如是言我仍不能捨此邪見拘薩羅國王波斯匿及餘諸國王盡皆知我王族弊宿為如是論如是見者謂無有他世無化生有情無善惡業報尊者迦葉若我捨此見者衆將笑我王族弊宿信難信事其人何等蒙昧愚鈍緣於嘲笑將生忿覆及以惱怒是故我寧固持我説二五然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族昔有養豚者從己村落往他村落見多乾糞棄於其處彼見此已如是思惟此所棄者多量乾糞是豚飼料當持之歸彼展上衣集多乾糞以衣包之頭戴而行乃於途中逢大驟雨糞汁所塗及於足趾滴瀝淋漓仍戴糞行人見其狀而語之言汝非癲耶汝非神志有錯亂耶何乃戴糞滴瀝淋漓糞汁所塗及於足趾汝等自癲汝等神志自是錯亂所以者何以我如是得豚飼料故王族卿亦如是意卿所答當亦如彼戴糞者言王族應捨此惡邪見王族應捨此惡邪見勿為長夜無益苦惱二六尊者迦葉縱如是言我仍不能捨此邪見拘薩羅國王波斯匿及餘諸國王盡皆知我王族弊宿為如是論如是見者謂無有他世無化生有情無善惡業報若我捨此見者衆將笑我王族弊宿信難信事其人何等蒙昧愚鈍緣於嘲笑將生忿覆及以惱怒是故我寧固持我説二七然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族昔有二博徒為骰子戲其一博徒每逢敗骰即取吞之他一博徒每見彼敗即吞其骰乃語之曰吾友汝必勝也吾友以骰與我將以供神博徒答曰然也吾友以骰與之時他博徒以毒塗骰語彼博徒曰吾友來共博戲彼即欣然諾之乃共相博彼博徒者每逢敗骰復取吞之他一博徒每見彼敗即吞其骰乃語之曰骰塗最惡毒吞之而不覺偽漢汝且吞後當有痛苦王族卿亦如是意卿所答當如博徒王族應捨此惡邪見王族應捨此惡邪見勿為長夜無益苦惱二八尊者迦葉縱如是言我仍不能捨此邪見拘薩羅國王波斯匿及餘諸國王盡皆知我王族弊宿為如是論如是見者謂無有他世無化生有情無善惡業報尊者迦葉若我捨此見者衆將笑我王族弊宿信難信事其人何等蒙昧愚鈍緣於嘲笑將生忿覆及以惱怒是故我寧固持我説二九然則王族我當為卿説譬喻言諸有智者依譬喻故解所説義王族昔有一興盛地時有一人語其友言吾友我等往詣彼地或於其處得些微財物友然其言同往彼地一村道上彼等見有多量之麻棄於其處彼一人者語其友言吾友此處棄有多麻是故吾友汝我各可捆麻成束共攜而行其友答曰唯然吾友即捆麻束彼等荷麻更往一村道見多麻縷棄於其處彼一人者語其友言吾友我等求麻是正為得麻縷今多麻縷棄於此處是故吾友汝我各可棄麻攜縷而行吾友我荷此麻齎來道遠且復縛固有此已足汝可棄之時彼一人乃棄麻束取荷麻縷彼等更往一村道上見多麻布棄於其處彼一人者語其友言吾友我等求麻及麻縷者是正為欲得此麻布今多麻布棄於此處是故吾友汝當棄麻我棄麻縷我等俱荷麻布而行吾友我荷此麻齎來道遠且復縛固有此已足汝可棄之時彼一人棄去麻縷取荷麻布彼等更往一村道上見多亞麻棄於其處亦復如是如是乃至見多亞麻縷棄於其處見多亞麻布棄於其處見有多綿棄於其處見多綿縷棄於其處見多綿麻棄於其處見有多鐵棄於其處見有多銅棄於其處見有多錫棄於其處見有多鉛棄於其處見有多銀棄於其處悉皆如是如是乃至見有多金棄於其處彼一人者語其友言吾友我等求麻及縷與布我等求亞麻及縷與布我等求綿及縷與布我等求鐵求銅求錫求鉛及求銀者是正為欲得金耳是故吾友汝當棄麻我亦捨銀俱荷金行吾友我荷此麻齎來道遠且復縛固有此已足汝可棄之時彼一人乃棄銀取金荷之而行彼等還至己村荷麻還者父母不悅妻子不悅朋友知己亦皆不悅以是因緣彼亦不得喜樂荷金還者父母喜悅妻子喜悅朋友知己亦皆喜悅以是因緣彼亦得喜樂王族卿亦如是意卿所答如荷麻者王族應捨此惡邪見王族應捨此惡邪見勿為長夜無益苦惱三尊者迦葉初設譬喻我已由是喜悅滿足但我猶欲為得聞此種種問答故我思惟應如是反問於尊者迦葉也尊者迦葉至可感歎尊者迦葉至可感歎尊者迦葉猶如使倒者得起隱者得顯示迷以道暗夜來燈具眼得見尊者迦葉亦復如是以無數方便説法示教尊者迦葉我今歸依世尊瞿曇歸依法僧唯願尊者迦葉聽我自今以後盡形壽為歸依優婆塞尊者迦葉我欲為大供養唯願尊者迦葉為我長夜利益為我悅樂教我誨我三一王族人若殺牛殺山羊宰雞豚死諸生類又復執持邪見邪思惟邪語邪業邪命邪精進邪念邪定者王族若為此種供養當無大果無大功德無大光輝無大遍滿王族譬如農夫攜種子犂鋤入於林中彼以破壞腐敗風熱所害陳惡種子播於惡地木株未除耕耘未藏天又不降及時好雨彼種子可發芽成長繁茂耶而彼農夫可得大果耶不也尊者迦葉王族人若殺牛殺山羊宰雞豚死諸生類又復執持邪見邪思惟邪語邪業邪命邪精進邪念邪定者亦復如是王族若為此種供養當無大果無大功德無大光輝無大遍滿王族夫不殺牛不殺山羊不宰雞豚不死諸種生類而持正見正思惟正語正業正命正精進正念正定者若為此種供養當有大果有大功德有大光輝有大遍滿王族譬如農夫攜種子犂鋤入於林中彼以不破壞不腐敗不受風熱所害新良種子播於良地木株盡除耕耘克臧天復降以適時好雨彼種子可發芽成長繁茂耶而彼農夫可得大果耶然也尊者迦葉王族夫不殺牛不殺山羊不宰雞豚不死諸種生類復持正見正思惟正語正業正命正精進正念正定者亦復如是若為此種供養當得大果得大功德得大光輝得大遍滿三二爾時王族弊宿為沙門婆羅門窮人流民乞丐設施其所施與則為粗粥酸粥之食粗布舊服之類於布施時有一儒童名鬱多羅熱心從事於分配事彼施與時而作是言我因此施遇王族弊宿但於他世當不相遇王族弊宿聞鬱多羅儒童施與時而作是言我因此施遇王族弊宿但於他世當不相遇王族弊宿召鬱多羅而語之曰我鬱多羅汝施與時實有此言謂我因此施遇王族弊宿但於他世當不相遇者耶實然我鬱多羅汝於施時何故説言我因此施遇王族弊宿但於他世當不相遇耶我鬱多羅我等欲善福者非冀施果耶卿所施與則為粗粥酸粥之食卿尚不欲以之觸足况食之耶施與粗布舊服之類卿尚不欲以之觸足况著之耶卿於我等愛而喜悅既於我等愛而喜悅云何又加以不喜悅者耶然我鬱多羅今汝得以如我所食為之施與如我所著為之施與鬱多羅儒童諾王族弊宿已即施食物如弊宿所食所施衣服如弊宿所著時王族弊宿為不恭敬施不親手施不至心施為吝惜施故身壞命終為四天王眷屬生榵樹林空宮殿中彼鬱多羅儒童於施與時熱心分配為恭敬施為親手施為至心施為不吝惜施故身壞命終生善趣天界為忉利天眷屬三三爾時尊者牛主常為日中休息故往榵樹林之空宮殿時弊宿天子至尊者牛主前問訊已於一面立弊宿天子立一面已尊者牛主為是問曰吾友汝為誰耶尊者我為王族弊宿汝非曾謂斯無他世無化生有情無善惡業報如是見者耶尊者我為如是見者我復從尊者鳩摩羅迦葉捨此惡邪見吾友鬱多羅儒童於汝施與為熱心分配者生何處耶尊者鬱多羅儒童於我施與熱心分配為恭敬施為親手施為至心施為不吝惜施故身壞命終生善趣天界為忉利天眷屬我為不恭敬施不親手施不至心施為吝惜施故身壞命終為四天王眷屬生榵樹林空宮殿中是故惟願尊者牛主至人間世界宣如斯言應恭敬施應親手施應至心施應不吝惜施王族弊宿以不恭敬施不親手施不至心施為吝惜施故身壞命終為四天王眷屬生榵樹林空宮殿中但鬱多羅儒童於弊宿施從事分配為恭敬施為親手施為至心施為不吝惜施故身壞命終生善趣天界為忉利天眷屬三四時尊者牛主來人間世界宣如是言應恭敬施應親手施應至心施應不吝惜施王族弊宿以不恭敬施不親手施不至心施為吝惜施故身壞命終為四天王眷屬生榵樹林空宮殿中但鬱多羅儒童於弊宿施從事分配為恭敬施為親手施為至心施為不吝惜施故身壞命終生善趣天界為忉利天眷屬
