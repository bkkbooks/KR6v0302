彼處那提迦人諸信者五十餘人命終斷五下分結成不還者生於天上而取滅度從彼世界不再還來那提迦人諸信者九十餘人命終斷除三結滅貪瞋癡成一來者唯餘一度還來此世苦得終盡那提迦人諸信者五百餘人命終斷除三結成預流者不墮惡趣必趣正覺那提迦人諸信者悉皆滿足聞世尊解説欣然喜悅六復次世尊此摩揭陀人諸信者多有久時修行而命終者有人或於鴦伽摩揭陀人將思鴦伽摩揭陀人無有善信而命終者然而世尊彼等亦皆信佛信法信僧善行於教彼等命終而不蒙世尊説其運命設於彼等亦為説者斯誠慶幸衆當信之緣是當得趣於善趣又彼摩揭陀國王斯尼喻頻婆娑羅為如法者從法之王彼於婆羅門及居士於都市居民於一般人民皆悉深具哀愍之情衆實讚王言彼如法者從法我王如是以福賜與我等然後命終我等如是於彼如法從法王之國土幸福生存世尊彼實亦為信佛信法信僧善行於教衆人實又作如是念摩揭陀王斯尼喻頻婆娑羅終生稱讚世尊讚已命終彼命已終猶不蒙世尊説其運命設若於彼亦為説者則為幸甚衆當信之緣是當得趣於善趣復次世尊世尊實於摩揭陀國得成正覺云何世尊於此成正覺地之摩揭陀人諸信者不説彼等命終之後所再生處世尊若世尊於摩揭陀人諸信者不説彼等命終之後所再生處是於摩揭陀人殊為不幸云何世尊於摩揭陀人諸信者以不説故致不幸者而不為説耶尊者阿難為摩揭陀人諸信者事於世尊前作是説已即從座起禮敬世尊右繞而去七阿難去未久世尊清旦整下衣著上衣持鉢往那提迦村乞食乞食歸來食後洗足步入磚屋於摩揭陀人諸信者事行深思惟心念專一就常座坐而如是念我將欲知彼等所趣及其運命將知彼尊者等趣云何趣及其運命於是世尊見知摩揭陀人諸信者趣云何趣彼尊者等為何運命世尊便於夕刻從獨坐起步出磚屋於僧院蔭就常座坐八時尊者阿難詣世尊所禮敬世尊於一面坐尊者阿難坐一面已白世尊言世尊今觀世尊寂然而靜世尊顏色蓋因諸根清淨故現光明世尊今者寂然而靜以度斯日耶九阿難汝為摩揭陀人諸信者事在我面前作是説已起座而去時我即往那提迦村乞食從乞食歸食後洗足步入磚屋於摩揭陀人諸信者事行深思惟心專一念就常座坐而如是念我將欲知彼等所趣及其運命將知彼尊者等趣云何趣及其運命阿難我見知彼摩揭陀人諸信者趣云何趣彼尊者等為何運命阿難時一夜叉隱形舉聲言曰世尊我是闍尼沙善逝我是闍尼沙阿難汝嘗聞知有如是名名闍尼沙者耶世尊我未嘗聞知有如是名名闍尼沙者我聞闍尼沙名故身毛豎立我如是念彼有如是名名闍尼沙者當非尋常夜叉一阿難時彼夜叉聲言未久面色光明現於我前復舉聲言世尊我是頻婆娑羅善逝我是頻婆娑羅世尊我生為毗沙門天王眷屬此是七度前者之我為人間王由彼處滅生於天上又為非人王從此經彼各七度共輪回歷十四度凡我前世所經者知有如許之住處世尊我已久時為不墮惡趣者自知不墮惡趣我住是願將成一來者是尊者闍尼沙夜叉所言我已久時為不墮惡趣者自知不墮惡趣又言我住是願將成一來者誠不可思議為希有事也然尊者闍尼沙夜叉以何因緣能如是偉大得殊勝智耶一一世尊唯世尊教不依餘教唯善逝教不依餘教我自最初一向歸信世尊自是以後我已久時為不墮惡趣者自知不墮惡趣而住是願將成一來者我今奉毗沙門天王命以事往詣增長天王所於路途中見世尊步入磚屋於摩揭陀人諸信者事行深思惟心專一念思惟將知彼等所趣及其運命彼尊者等趣云何趣為何運命然曾一時毗沙門天王偶於衆會中説彼摩揭陀尊者等趣云何趣為何運命我於彼前親聞親受於是我念欲覲世尊奉告此事世尊我以此二緣來覲世尊一二世尊曾於遠昔初雨安居月之十五滿月之夜布薩之時三十三天衆集坐善法堂衆大天神普坐諸方又四天王在四方坐持國天王在東方坐其面西向諸神在前增長天王在南方坐其面北向諸神在前廣目天王在西方坐其面東向諸神在前毗沙門天王在北方坐其面南向諸神在前世尊三十三天衆集坐善法堂衆大天神普坐諸方又四天王亦在四方坐者此是彼等四天王之坐法也彼等座後有我等座世尊若有諸神於世尊所淨修梵行新生於三十三天者彼等色光勝餘諸神三十三天諸神由是充滿喜悅念言實天界增盛阿修羅界減滅故生歡喜一三世尊時帝釋天知三十三天諸神歡喜以偈隨喜曰三十三天衆與主共歡喜歸命於如來法之善法性見新生諸神於佛所梵行今來生此間故色光最勝見彼色光壽超餘諸天神大智者弟子生此乃殊勝三十三天衆與主共歡喜歸命於如來法之善法性三十三天諸神由是彌更喜悅念言實天界增盛阿修羅界減滅故生歡喜一四世尊三十三天諸神集會善法堂共相思惟集會所以彼四天王於此義趣受教言已在其座前各自起立彼四天王受教言已心淨寂靜各立座前一五世尊時於北方現大光明其光顯耀遠勝在會諸神神威時帝釋天告三十三天曰諸卿若所現相光明現起光耀發時梵天當現如是光明現起光耀顯發者乃實梵天出現前相徵斯現相梵天當現大光晃耀梵天之兆一六世尊三十三天諸神各於座上説言欲知此光齎有何果欲詣其處而實見之四天王亦各於座上言欲知此光齎有何果欲詣其處而實見之三十三天諸神聞已共相和言欲知此光齎有何果欲詣其處而實見之一七世尊常童形梵天於三十三天諸神之前出現時是以粗相化現而出蓋若出現梵天自然相者彼三十三天諸神眼難見故常童形梵天出現三十三天之前彼之色光勝餘諸神世尊如黃金體光勝人體常童形梵天亦復如是出現三十三天之前彼之色光勝餘諸神常童形梵天出現三十三天前時集會諸神不與交言亦不起立亦不請坐衆咸默默而於座上合掌結跏趺坐作如是念常童形梵天今於某神有事將就彼座而坐常童形梵天於是坐其所坐彼座之神得大法悅得大歡喜如為剎帝利王灌頂新即王位時得大法悅得大歡喜常童形梵天坐其所坐彼座之神實亦如是得大法悅得大歡喜一八世尊常童形梵天即化作粗相為童子形頭五角髻現於三十三天之前彼行虛空於虛空間結跏趺坐猶如力士於平正地上寬廣床座結跏趺坐常童形梵天實亦如是行虛空中於虛空間結跏趺坐知三十三天諸神歡喜乃以偈隨喜曰三十三天衆與主共歡喜歸命於如來法之善法性見新生諸神於佛所梵行今來生此間故色光最勝見彼色光壽超餘諸天神大智者弟子生此乃殊勝三十三天衆與主共歡喜歸命於如來法之善法性一九世尊常童形梵天説如此事説此事時具備八種聲音即玲瓏清徹美妙和雅充滿不亂甚深廣博世尊常童形梵天若唯以聲告此集會時其聲即不出於會外具備此八種聲者稱曰梵聲二世尊常童形梵天即以己身化作三十三身結跏趺坐於三十三天一一座上告三十三天曰三十三天諸卿於意云何彼世尊為福利衆生安樂衆生哀愍世間饒益人天福樂人天故有所行動是以若人歸依佛陀歸依法歸依僧伽善行於教則身壞命終或有生於他化自在天界者或有生於化樂天界者或有生於覩史多天界者或有生於夜摩天界者或有生於三十三天界者或有生於四天王界者即趣低界亦得趣於乾闥婆界二一世尊常童形梵天説如此事説此事時諸神咸各自作是念在我座上者唯有一神説一神説時衆化神説一神默坐衆化神默三十三天與主同念在我座上唯一神説二二世尊常童形梵天即攝己身還於一身攝一身已結跏趺坐於帝釋天座上告三十三天曰三十三天諸卿於意云何豈不從彼世尊知者見者應供者等正覺者為令充滿神通熟達神通變化神通故善説此等四神足耶云何為四謂令比丘成就欲等持及以勤勇二事修習神足成就精進等持心等持亦復如是修習神足乃至思惟等持及以勤勇二事修習神足此四神足是從世尊知者見者應供者等正覺者為充滿神通熟達神通變化神通故而為教説諸卿過去沙門婆羅門而於種種現諸神通者皆是已曾為四神足之修習者復次諸卿未來沙門婆羅門亦於種種現諸神通者皆是當為四神足之修習者復次諸卿現在沙門婆羅門而於種種現諸神通者皆悉是為四神足之修習者三十三天諸卿亦見我之如是神通威德不然也梵天諸卿我實亦是四神足之修習者故有如是偉大如是威德二三世尊常童形梵天説如此事常童形梵天説此事已復告三十三天曰三十三天諸卿於意云何豈不依彼世尊知者見者應供者等正覺者為令到達安樂故善為開示三徑路耶云何為三諸卿或有衆生親近愛欲親近不善法彼於後時得聞聖法熱心修習了達一切法彼為成就聖法聲聞故熱心修習了達一切法不親近愛欲不親近不善法彼不親近愛欲不親近不善法故即便生樂又於樂上更生喜樂諸卿猶如從愈快中而生喜悅彼不近親愛欲不親近不善法故即便生樂又於樂上更生喜樂亦復如是諸卿依彼世尊知者見者應供者等正覺者為令達安樂故實開示此第一徑路二四復次諸卿或有衆生粗身行不寂滅粗口行不寂滅粗意行不寂滅彼於後時得聞聖法熱心修習了達一切法彼為成就聖法聲聞故熱心修習了一切法粗身行寂滅乃至粗意行寂滅若彼寂滅粗身行寂滅粗口行寂滅粗意行者即便生樂又於樂上更生喜樂諸卿猶如從愈快中而生喜悅彼寂滅粗身行寂滅粗口行寂滅粗意行故即便生樂又於樂上更生喜樂亦復如是諸卿依彼世尊知者見者應供者等正覺者為令達安樂故實開示此第二徑路二五復次諸卿或有衆生不如實知此是善不如實知此是不善不如實知此當誹難此不當誹難此當用此不當用此是卑劣此是高尚此是黑白等分彼於後時得聞聖法熱心修習了達一切法彼為成就聖法聲聞故熱心修習了達一切法如實知此是善如實知此是不善如實知此當誹難此不當誹難此當用此不當用此是卑劣此是高尚此是黑白等分若如是知如是見者則無明滅而明生彼無明滅而明生故即便生樂又於樂上更生喜樂諸卿猶如從愈快中而生喜悅彼既生樂又於樂上更生喜樂亦復如是諸卿依彼世尊知者見者應供者等正覺者為令達安樂故實開示此第三徑路諸卿此三徑路實依世尊知者見者應供者等正覺者為令到達安樂故之所開示二六世尊常童形梵天説如此事説此事已常童形梵天復告三十三天曰三十三天諸卿於意云何豈不依彼世尊知者見者應供者等正覺者於四念處為令到達於善故善説此等四念處耶何云為四諸卿謂比丘當於自身而觀於身精勤專念除世貪憂當於自身而觀於身於是得正靜慮正心平和彼以得正靜慮正心平和故外於他身生知生見當於自身而觀於受亦復如是觀心亦然乃至當於自身而觀於法精勤專念除世貪憂當於自身而觀於法於是得正靜慮正心平和彼以得正靜慮正心平和故外於他法生知生見諸卿此四念處是依世尊知者見者應供者等正覺者為令到達於善故之所開示二七世尊常童形梵天説如此事常童形梵天説此事已復告三十三天曰三十三天諸卿於意云何豈不依彼世尊知者見者應供者等正覺者為令修行正定成就正定故善説七定具耶云何為七謂正見正思惟正語正業正命正精進正念諸卿以此七支心成一向專念者是得名曰具足方法具足資具之聖正定諸卿緣正見生正思惟緣正思惟生正語緣正語生正業緣正業生正命緣正命生正精進緣正精進生正念緣正念生正定緣正定生正智緣正智生正解脫諸卿設有正語者應如是言斯法從世尊故善能為説勝果即現且非一時於諸衆生樂為誘導以智者故自得了知又應為是言不死門已開此實正語也諸卿蓋如斯之法勝果現前且非一時於諸衆生樂為誘導以智者故自得了知者實已從世尊善能為説向不死道其門已開諸卿蓋於佛陀具確信心於法於僧具確信心體得聖樂誡者不論何人及生天者趣入於法如八百四十萬餘摩揭陀人信者命終皆斷除三結成預流者不再墮惡趣必定趣正覺又於彼等中亦有一來者其次之生類當為具德者然我難計量恐犯妄語罪二八世尊常童形梵天説如此事説此事時毗沙門天王心作是念説有如是大師如是大説法如是大勝智實不可思議實為希有也世尊常童形梵天知毗沙門天王心中所念即告毗沙門天王曰毗沙門天王於卿意云何是應説在過去世亦曾有如是大師如是大説法如是大勝智在未來世亦當有如是大師如是大説法如是大勝智二九常童形梵天為三十三天説如此事常童形梵天説此事時毗沙門天王親聞親受為會衆説毗沙門天王為會衆説此事時闍尼沙夜叉親聞親受為世尊説世尊從闍尼沙夜叉親聞親受此事而自了知為尊者阿難説尊者阿難從世尊親聞親受此事為比丘比丘尼優婆塞優婆夷説是故梵行興盛輾轉布演多所附麗益致廣敷頗為世人之所樂説大典尊經第十九第一誦品一如是我聞一時世尊在王舍城靈鷲山中爾時有容貌端正乾闥婆之子五髻於黎明頃放光普照靈鷲山來詣世尊所到已禮敬世尊於一面坐坐一面已乾闥婆子五髻白世尊言世尊我從三十三天諸神親聞親受者欲以白世尊世尊曰五髻汝可告我二世尊昔者於十五日布薩會自恣之日滿月之夜三十三天諸神集會善法堂天人大會衆普坐一切方四天王亦在四方坐持國諸神在東方坐其面西向諸神在前增長天王在南方坐其面向北諸神在前廣目天王在西方坐其面向東諸神在前多聞天王在北方坐其面向南諸神在前世尊三十三天諸神集會善法堂天人大會衆普坐一切方復有四天王亦在四方坐者此是彼等四天王之坐法也彼等座後有我等座世尊有先於世尊所淨修梵行新生於三十三天者衆容色盛光遠勝餘神世尊是故三十三天諸神歡喜悅樂喜悅滿足咸謂諸天衆團實為繁榮阿修羅衆團實為衰減三世尊時天主帝釋知三十三天諸神歡喜以偈讚曰三十三天神共帝釋歡喜禮敬於如來法之善法性見新來諸神從佛修梵行生於此間者色麗而光熾見彼色光壽遠勝餘諸神大智者聲聞特向此間生三十三天神共帝釋歡喜禮敬於如來法之善法性世尊三十三天諸神由是倍生歡喜悅樂喜悅滿足咸謂諸天衆團實為繁榮阿修羅衆團實為衰減四世尊時天主帝釋知三十三天諸神歡喜告三十三天諸神曰諸賢汝等頗欲聞世尊八無等法不賢者我等願樂欲聞世尊八無等法世尊時天主帝釋為三十三天諸神説示世尊八無等法五三十三天諸神汝等於意云何世尊為福利衆生安樂衆生哀愍世間饒益人天福樂人天而有所行若夫教主具足如是為福利衆生安樂衆生哀愍世間饒益人天福樂人天有所行者我等於過去及現在皆所不曾見唯有世尊具足如是六從彼世尊所説示法功德即現非定一時於諸衆生皆樂誘導以智者故內心自得了知若夫教主具足如是説示誘導法者我等於過去及現在皆所不曾見唯有世尊具足如是七實從世尊善説此是善善説此是惡善説此是邪此是正此當從此不當從此是劣此是優此是黑白調和若夫教主具足如是教示善惡邪正當從不當從是劣是優及黑白調和之法者我等於過去及現在皆所不曾見唯有世尊具足如是八實從世尊為弟子等善説趣於涅槃之道涅槃與道結合為一如殑伽河及閻牟那河二水合流世尊實亦如是為弟子等善説趣於涅槃之道涅槃與道結合為一若夫教主具足如是教示涅槃道者我等於過去及現在皆所不曾見唯有世尊具足如是九世尊實與有學并與到達聖道及漏盡阿羅漢為伴為友世尊離去彼等以心傾住於一樂遊若夫教主具足如是以心傾住於一樂遊者我等於過去及現在皆所不曾見唯有世尊具足如是一諸餘王族喜溢眉宇實於世尊供與利養及以名聞是時世尊實離愛樂而唯攝取資養若夫教主具足如是捨離愛樂攝取資養者我等於過去及現在皆所不曾見唯有世尊具足如是一一世尊實所行如言所言如行若夫教主具足如是所行如言所言如行獲得法隨法者我等於過去及現在皆所不曾見唯有世尊具足如是一二世尊實超疑惑脫離疑論已成就欲望及第一梵行思惟若夫教主具足如是超越疑惑脫離疑論成就欲望及第一梵行思惟者我等於過去及現在皆所不曾見唯有世尊具足如是世尊天主帝釋為彼三十三天諸神説示世尊八無等法世尊三十三天諸神得聞世尊八無等法由是倍更歡喜悅樂喜悅滿足一三世尊時有諸神作是説言諸賢若使四人等正覺者出現於世如世尊説法者其為福利衆生安樂衆生哀愍世間饒益人天福樂人天將如何耶或有諸神作是説言諸賢且置四人等正覺者諸賢若使三人等正覺者出現於世如世尊説法者其為福利衆生安樂衆生哀愍世間饒益人天福樂人天將如何耶或有諸神作是説言諸賢且置三人等正覺者諸賢若使二人等正覺者出現於世如世尊説法者其為福利衆生安樂衆生哀愍世間饒益人天福樂人天將如何耶一四世尊如是問已天主帝釋告三十三天諸神曰諸賢於一世界同時出現二人應供等正覺者無有是理諸賢設若世尊無病健全當永生存是為福利衆生安樂衆生哀愍世間饒益人天福樂人天世尊爾時三十三天諸神集會善法堂於所論議深思惟已彼四天王於此義趣承受教説在其座前各自起立彼四天王受教言已心淨寂靜各立座前一五世尊時於北方現大光明輝耀顯赫凌駕諸天之威神力世尊時天主帝釋告三十三天諸神曰諸天若所現相光明現起輝耀顯赫者梵天將現即光明現起光耀顯發者乃是梵天出現前相徵斯現相梵天將現大光晃耀梵天之兆世尊時三十三天諸神各當位坐如是思惟欲知此光生云何果欲詣其處而實見之四天王亦各當位坐如是思惟欲知此光生云何果欲詣其處而實見之三十三天諸神感知是語已咸同意念欲知此光生云何果欲詣其處而實見之一六世尊常童梵天於三十三天諸神之前出現時是以粗相化現而出世尊以梵天本來容貌不能入於三十三天諸神眼界故世尊常童梵天現於三十三天諸神之前色相光明勝餘諸神世尊常童梵天現於三十三天諸神之前會中諸神不之禮敬亦不起立亦不請坐衆咸默然合掌趺坐作如是念今常童梵天若有意於某神將就彼座坐世尊常童梵天於是坐其所坐而彼座之神獲得滿足生大歡喜世尊猶如剎帝利王繼承登位時獲得滿足生大歡喜世尊常童梵天所就之座其座之神亦復如是獲得滿足生大歡喜一七世尊時常童梵天知三十三天諸神歡喜隱身説偈如是讚曰三十三天神共帝釋歡喜禮敬於如來法之善法性見新來諸神依佛修梵行生於此間者色麗而光熾見彼色光壽遠勝餘諸神大智者聲聞特向此間生三十三天神共帝釋歡喜禮敬於如來法之善法性一八世尊常童梵天説如此事世尊説此事之常童梵天聲具八支即朗音智音美音爽音約音短音深音大音世尊常童梵天以此聲告會衆時其聲不聞於會衆外世尊聲具此八支者名曰梵音一九世尊時三十三天諸神向常童梵天作是言善哉梵天我等聞此不勝欣喜我等又聞天主帝釋稱説世尊八無等法不勝欣喜世尊時常童梵天語天主帝釋曰善哉善哉天主帝釋彼世尊之八無等法我亦樂聞天主帝釋答曰唯然大梵天即為常童梵天説世尊之八無等法二大梵天於汝意云何世尊為福利衆生安樂衆生哀愍世間饒益人天福樂人天而有所行若夫教主具足如是為福利衆生安樂衆生哀愍世間饒益人天福樂人天有所行者我等於過去及現在皆所不曾見唯有世尊具足如是二一從彼世尊所説示法功德即現非定一時於諸衆生皆樂誘導以智者故內心自得了知若夫教主具足如是説示誘導法者我等於過去及現在皆所不曾見唯有世尊具足如是二二實從世尊善説此是善善説此是惡善説此是邪此是正此當從此不當從此是劣此是優此是黑白調和若夫教主具足如是教示善惡邪正當從不當從是劣是優及黑白調和之法者我等於過去及現在皆所不曾見唯有世尊具足如是二三實從世尊為弟子等善説趣於涅槃之道涅槃與道結合為一如殑伽河及閻牟那河二水合流世尊實亦如是為弟子等善説趣於涅槃之道涅槃與道結合為一若夫教主具足如是教示涅槃道者我等於過去及現在皆所不曾見唯有世尊具足如是二四世尊實與有學并與到達聖道及漏盡阿羅漢為伴為友世尊離去彼等以心傾住於一樂遊若夫教主具足如是以心傾住於一樂遊者我等於過去及現在皆所不曾見唯有世尊具足如是二五諸餘王族喜溢眉宇實於世尊供與利養及以名聞是時世尊實離愛樂而唯攝取資養若夫教主具足如是捨離愛樂攝取資養者我等於過去及現在皆所不曾見唯有世尊具足如是二六世尊實所行如言所言如行若夫教主具足如是所行如言所言如行獲得法隨法者我等於過去及現在皆所不曾見唯有世尊具足如是二七世尊實超疑惑脫離疑論已成就欲望及第一梵行思惟若夫教主具足如是超越疑惑脫離疑論已成就欲望及第一梵行思惟者我等於過去及現在皆所不曾見唯有世尊具足如是世尊天主帝釋為常童梵天説世尊之八無等法世尊常童梵天得聞世尊八無等法由是歡喜悅樂喜悅滿足二八世尊時常童梵天即化作粗相為童子形頭五角髻現於三十三天諸神之前升虛空中空中趺坐世尊猶如力士坐廣大牀或平地上世尊常童梵天亦復如是升虛空中空中趺坐作如是語告三十三天諸神二九三十三天諸神汝等於意云何世尊於何時為大智者耶古昔有王名曰域主此域主王有婆羅門帝師名曰典尊王又有子名曰黎努典尊婆羅門有子名曰護明黎努王子護明童子與六剎帝利此八人者相與為友其後典尊不久命終彼命終時域主悲泣為如是言嗚呼我等盡以國政委付典尊自繫五欲以耽娛樂其時典尊乃命終矣黎努王子聞斯語時白域主言父王勿以典尊喪如是大悲泣父王典尊有子名曰護明賢過其父聰明有為亦過其父可使護明繼其父事輔佐國政然耶王子實然父王三時域主王告餘臣曰汝今可往詣護明童子所到已可傳言於護明童子護明童子願汝幸福王欲語汝王欲見汝彼臣報曰唯然大王即遵王言詣護明所到已語護明曰護明童子願汝幸福王欲語汝王欲見汝護明童子答曰唯然吾友即從彼臣言詣域主王所到已禮敬於王互道契好作禮如儀於一面坐護明童子坐一面已王告之曰護明童子汝當輔佐我等護明童子此輔助事汝勿辭謝我將以汝補卿父職就典尊位護明童子承諾王意答曰唯然大王三一時域主王即令護明童子就典尊位補乃父職護明童子就典尊位補父職已父所輔佐己亦輔佐所未輔佐亦不輔佐父所為事己亦為