二九尊者莫言彼五百乘車即若六百乘車若七百乘車若八百乘車若九百乘車若一千乘車若一萬乘車何足為難若有既為醒覺等有意識於天降雨電閃雷鳴灼爍霹靂而不之見不聞聲者斯更難能斯更難逮三然而福貴昔於一時我在阿頭住籾穀家時天降雨電閃雷鳴灼爍霹靂殺彼籾穀家兄弟農夫二人及四頭牛福貴時阿頭人衆大聚至所殺兄弟農夫二人及四牛側三一福貴爾時我從籾穀家出於其戶外敞地經行福貴彼大衆中有一人來至我所在向我禮敬於一面立福貴彼立一面已我如是問言三二吾友彼大衆聚為何故耶世尊今天降雨電閃雷鳴灼爍霹靂殺却農夫兄弟二人及四頭牛彼大衆聚正為此故然而世尊身在何處吾友我身在此然則世尊何所見耶吾友我一無所見然則世尊聞何聲耶吾友我未聞聲然則世尊為睡眠耶吾友我未睡也然則世尊為醒覺耶然也吾友然則世尊身即醒覺等有意識於天降雨電閃雷鳴灼爍霹靂而竟不見不聞聲耶然也吾友三三福貴彼人作是念嗚呼實不可思議嗚呼實為希有嗚呼出家之人其心如是寂靜既為醒覺等有意識於天降雨電閃雷鳴灼爍霹靂而竟不見不聞其聲彼人於我發深信言向我禮敬右繞而去三四末羅子福貴聞是言已白世尊言世尊我於阿羅邏迦羅摩一己所信散若風吹逝若奔流殊勝哉世尊殊勝哉世尊如使倒者得起隱者得顯示迷以道冥室燃燈有目得見世尊如是以無數方便曉人以法世尊我今歸依世尊歸依法及比丘僧唯願世尊攝受我盡壽歸依為優婆塞三五末羅子福貴告餘人曰汝將金色柔絹二疊衣為我取來彼人諾末羅子福貴曰唯然尊者即取金色柔絹二疊衣來末羅子福貴以彼金色柔絹二疊衣奉世尊曰世尊是為金色柔絹二疊衣唯願世尊哀愍我故垂賜納受福貴當以一疊施我一施阿難末羅子福貴諾世尊曰唯然世尊即以一疊奉世尊一奉阿難三六爾時世尊於末羅子福貴即以法言示教訓誡鼓舞使喜末羅子福貴依世尊語受教承訓為所鼓舞心生歡喜即從座起禮敬世尊右繞而去三七末羅子福貴去未久尊者阿難即以金色柔絹二疊衣被世尊身金色柔絹光輝若失時尊者阿難白世尊言不可思議哉世尊希有哉世尊如來膚色清淨輝麗世尊我以金色柔絹二疊衣被世尊身時是金色衣光輝若失然也阿難阿難實於二時如來膚色極為清麗云何為二阿難是即如來成無上等正覺之夜及入無餘涅槃界之夜於此二時如來膚色極為清麗三八阿難今夜末更於拘夷那竭末羅種之惒跋單林之沙羅雙樹間如來當般涅槃阿難我欲往河尊者阿難諾世尊言唯然世尊福貴奉柔絹金色二疊衣著衣者我師光色燦若金三九爾時世尊與大比丘衆俱往腳俱多河至已入腳俱多河澡浴飲水出往菴羅林至已告尊者純陀曰純陀汝可為我重敷上衣四疊純陀我疲欲臥尊者純陀諾世尊曰唯然世尊即重敷上衣四疊四世尊即偃右脅作師子臥兩足相纍思欲起立正念正智注心專一是時尊者純陀坐世尊前四一腳俱多河水清澄而爽潔佛趣往其處現極疲氣色世無比如來入河浴復飲教主居於中比丘衆繞圍世尊為説法復趣菴羅林比丘名純陀世尊告之曰於我臥床上宜敷衣四疊純陀受飭勵制己速敷衣教主色極疲就床為臥息爾時有純陀於佛前侍坐四二爾時世尊告尊者阿難曰阿難或亦有人使𨩷工子純陀起悔恨心曰如來最後受汝所奉供養食故便般涅槃吾友純陀是故於汝無有利益無有功德然而阿難於𨩷工子純陀應以如是言除其悔恨心曰如來最後受汝所奉供養食故即般涅槃吾友此事於汝為有利益為有功德吾友純陀我從如來親聞親受於此二供養食果報正等而異熟果亦復正等較餘供養食最為殊勝果報尤大利益尤大云何為二即為如來受此供養食成無上等正覺及如來受此供養食入無餘涅槃界此二供養食果報正等而異熟果亦復正等較餘供養食最為殊勝果報尤大利益尤大𨩷工子尊者純陀得積是業趣於長壽𨩷工子尊者純陀得積是業趣生善種族𨩷工子尊者純陀得積是業趣於安樂𨩷工子尊者純陀得積是業趣於名聞𨩷工子尊者純陀得積是業趣生天界𨩷工子尊者純陀得積是業趣獲王位阿難於𨩷工子純陀應以如是言除其悔恨心四三爾時世尊令知此義已即説偈言於施與者增功德自制其心不積怨善人如是捨惡故滅貪瞋癡而寂定第五誦品一爾時世尊告尊者阿難曰阿難我今欲往熙連禪河彼岸拘夷那竭末羅族之惒跋單沙羅林尊者阿難諾世尊曰唯然世尊世尊即與大比丘衆俱往熙連禪河彼岸拘夷那竭之惒跋單至已世尊告尊者阿難曰阿難汝可為我於沙羅雙樹間敷置床座使頭向北阿難我疲欲臥尊者阿難諾世尊曰唯然世尊即於沙羅雙樹間敷置床座使頭向北世尊即偃右脅雙足相纍作師子臥住於正念正智二是時沙羅雙樹開非時花羣花彌敷供養如來集雨布散於如來身天曼陀羅華亦從空降供養如來集雨布散於如來身天栴檀末亦從空降供養如來集雨布散於如來身天鐃亦為供養如來鳴於虛空天歌亦為供養如來起於虛空三爾時世尊告尊者阿難曰阿難沙羅雙樹開非時花羣花彌敷供養如來集雨布散於如來身天上曼陀羅華亦從空降集雨布散於如來身天上栴檀末亦從空降供養如來集雨布散於如來身天鐃亦為供養如來鳴於虛空天歌亦為供養如來起於虛空阿難雖以如是施設非敬崇如來非供養如來阿難若比丘若比丘尼若優婆塞若優婆夷達住於法達住隨法真正逮達隨法而行斯於如來最上敬崇最上供養是故阿難當達住法達住隨法真正逮達隨法而行阿難當如是修習四爾時尊者優波摩那立世尊前執扇扇世尊世尊命