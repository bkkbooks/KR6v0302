body:
  text: 長部經典二江鍊百據日譯本重譯沙門芝峯校證目次大緣經第十五奇崎修一原譯一舊譯長阿含卷第一大緣方便經大正藏一中阿含卷第二四大因經大正藏二六人本欲生經大正藏一四大生義經大正藏五四本經開端阿難言佛所説緣起法非深邃却為易知佛告以緣不了達此法者不得出離輪回於是為説緣起諸支老死生有取愛受觸名色識之相關關係更説計我者四類七識住八解脫等其中述説緣起之系列有二事可注意一為本經唯舉九支二為述愛支之下更有求利用欲著嫉守護之枝末愛等次第由愛生起由最後之護生杖劍鬬諍爭競爭論惡口妄語等無數罪惡法而由此溯及受換言之於説緣起支之文中存有末枝之釋述是也本經異譯之人本欲生經傳有道安之注釋分別緣起初勝法門經及其異譯之緣生初勝分法本經婆沙論俱舍論等則引用大緣方便經是知後世認為説緣起之經者以此經為重要而特有其一系統故研究十二因緣説不得忽視本經也大般涅槃經第十六平等通昭原譯九舊譯長阿含卷第二至第四遊行經大正藏一佛般泥洹經大正藏五般泥洹經大正藏六大般涅槃經大正藏七本經就分量言為長部經典中之最長經典關於佛陀晚年王舍城附近之消息最後之説法向涅槃地之道途入滅荼毗分舍利等所述頗詳本經全體於巴漢雙方經文中難見一致然就巴漢及漢譯諸經相較可得言者為本經之二大骨幹一為一代師主佛陀之入滅二為領導教團者以後非為佛之自身而是法不論佛或存或沒而此法當永為教團之中心本經以此骨幹為主此外有附加補充形迹所在隨處可見所補充者為佛之入滅談話其相互間初無聯系嗣經整理循序貫串復於語句間增補説明因得演成此部經文蓋本經原非完整之作而於佛之入滅談話當時編纂似較散漫也巴利聖典中如大本經之過去佛傳中部經典第二六及第三六律藏之大品小品及小經集經隨處散記之佛陀生涯之事迹此等記述皆屬鱗爪而完整佛傳除本經外餘無有焉又本經中有二特點一所述佛陀為生身之師同於人法二所載偈文皆為古雅文言於此可見本經所存佛傳資料較近事實足稱為佛傳文學之最古者至華氏城之繁榮及三禍之豫言以某教戒勘校經律辨其正邪比丘相互間稱呼之指示起塔之説等顯屬後代之事實然跋祇與摩揭陀之爭種族國城之七不退法則為表示當時社會政情之資料而經中諸偈多係佛及弟子思想感情之吐露與詠歎為僧團所傳承結集本經之動機在此經文之中心亦在此可謂為最原始之部分大善見王經第十七干潟龍祥原譯五八舊譯中阿含卷第一四大善見王經大正藏一長阿含卷第三遊行經中分之後半大正藏一佛般泥洹經卷下大正藏五般泥洹經卷下大正藏六大般涅槃經卷中卷下大正藏七新譯本生經第九五南傳藏小部經典七及行藏經第四南傳藏小部經典一九本經為述説大善見王本生之經蓋原自有大善見王之故事王所居者為拘尸城地已見於大般涅槃經中以示佛入滅之拘尸城非邊鄙小城故涅槃經中所插入者殆係故事全部惟納之於一經殆有失之於過長而礙全體之結構乃於涅槃經中保留其必要部分而將全部故事獨成一經另置此經於涅槃經之次云闍尼沙經第十八干潟龍祥原譯七二舊譯長阿含卷第五闍尼沙經大正藏一人仙經大正藏九本經主旨係述説以梵天為首一切天界皆是為依佛教修行者之住所修行有進得住上位天界新生於天者依佛道修行之德其色光勝餘天神即諸天界應行之道亦不外佛道本經結構為常童形梵天化作五髻童子現於三十三天為諸天説四神通三徑路四念處七定具歸依三寶善行於教則死後生於他化自在天乃至乾闥婆界毗沙門天王眷屬闍尼沙夜叉從天王聞此説以告佛陀佛復以此告阿難經之開端為佛於那提迦村説村民及諸國信者死後之運命此亦見於大般涅槃經似同出一源而本經所置重者為佛具能力觀知此等死者之運命也大典尊經第十九山本快龍原釋八二舊譯長阿含卷第五典尊經大正藏一大堅固婆羅門緣起經大正藏八本經與前之闍尼沙經同一趣向兩者之中亦有相同部分經述常童梵天化現其身為五髻童子欲使三十三天知世尊成大智非一朝一夕之所致於是説佛前生稱大典尊內大臣或侍從職位為王者師以此段因緣為談話骨幹示以如來八無等法先述修四無量心而至梵界之道復為説示與梵王如是共住然斯究非所以至涅槃之道而真能證涅槃者為八聖道其要旨謂當時一般人均以得生梵天梵界為理想實較佛説涅槃遙有遜色此旨與前之闍尼沙經同大會經第二十阿部文雄原譯九八舊譯長阿含卷第十二大會經大正藏一大三摩惹經大正藏一九雜阿含卷第四四之一一九二經大正藏九九別譯雜阿含卷第五之一五經大正藏一一舊譯後二經僅相當於本經一至三之部分而前二經亦與本經大有出入原文殊屬晦澀殆因諸天神名甚多且全為偈語故西藏譯亦與漢巴兩文頗異本經以偈述説十方世界諸衆天神覲瞻佛陀及其僧團表示讚歎而欲聞法咸集會於迦毗羅城佛所在處諸天神中有化作自然現象者地方神守護神鬼神鳥神龍神夜叉以及淨居天梵天四天王水天日天月天等衆皆歡喜集於大會經末所述有魔軍來圖擾此和平法會未果而去云帝釋所問經第二十一小野島行忍原譯一四舊譯長阿含卷第一釋提桓因問經大正藏一中阿含卷第三三釋問經大正藏二六帝釋所問經大正藏一五雜寶藏經卷第六帝釋問事緣大正藏二三人本經所説佛答帝釋問以妄想為衆生不和之本當就善心滅此妄想具戒修三業向六善境律六根以離欲經初有乾闥婆之相思歌及帝釋説瞿波故事兩皆偈語此歌為情味盎然之絶唱瞿波本事歌詩趣雖不及前歌然亦神韻超逸經末有帝釋六果報偈述其聞法向上之歡喜就此經內容結構觀之在佛教文學上有其優越地位可斷言也大念處經第二十二石川海淨原譯一一四舊譯中阿含卷第二四念處經大正藏二六本經示四念處觀為可淨衆生度憂悲滅苦惱得正法證涅槃之唯一道又説就五蓋五蘊六處七覺支四聖諦如法觀察可破淨樂常我之四倒其中詳述身念處觀就呼吸身體位置態度及其構造要素解剖部分以及死尸等若起精勤正智正念則破其身之四倒得證解脫復述修習四念處者所受果報得阿羅漢果或阿那含果並反覆明示不退轉之奮勉精勤有其必要原因四念處觀之説散見於多數經典中其綱領較簡敷陳適當者為中部經典之念處經而本經所述則於此觀法復加入必要之四聖諦教説此經所述修行方法與戒律關係頗深在相應部經典念處經中將此觀法與戒律視為同一而就正法護持上力述四念處觀於此可見本經內容所説者在根本佛教之重要方面足示一斑也弊宿經第二十三水野弘元原譯一二五舊譯長阿含卷第七弊宿經大正藏一中阿含卷第一六蜱肆經大正藏二六大正句王經大正藏四五本經述佛滅以後事凡明記於文中者南傳五部之中約有十種本經即其一係述佛滅未久鳩摩羅迦葉與婆羅門弊宿相問答以示教化其問答之長而有序為經典中所罕見者此足與彌蘭王問經那先比丘經相比擬婆羅門弊宿否認有來世及化生有情與善惡業報鳩摩羅迦葉巧引諸喻破其邪見善為雜論以暢悅心識善解美語善於言談可知其為談論名手而有比丘五百相從亦可窺知其在教團所處地位也長部經典二大緣經第十五一如是我聞一時佛住拘樓國名劍磨瑟曇之拘樓城邑爾時長老阿難詣世尊所至已禮世尊一面坐長老阿難坐於一面問世尊言云何世尊謂此緣起法極為深邃具深邃相奇特不可思議如我等觀明白易了故阿難勿作此言阿難勿作此言阿難此緣起法殊為深邃具深邃相阿難生類於此法不覺不徹見如絲之紛纏亦如所覆瘡亦如捫叉草如波羅波草不得出離惡生惡趣地獄輪回二阿難若有人問由決定緣有老死耶應答言有若復問言由云何緣有老死耶應告彼言由生緣有老死阿難若有人問由決定緣而有生耶應答言有若復問言由云何緣而有生耶應告彼言由有緣有生阿難若有人問由決定緣而有有耶應答言有若復問言由云何緣而有有耶應告彼言由取緣有有阿難若有人問由決定緣而有取耶應答言有若復問言由云何緣而有取耶應告彼言由愛緣有取阿難若有人問由決定緣而有愛耶應答言有若復問言由云何緣而有愛耶應告彼言由受緣有愛阿難若有人問由決定緣而有受耶應答言有若復問言由云何緣而有受耶應告彼言由觸緣有受阿難若有人問由決定緣而有觸耶應答言有若復問言由云何緣而有觸耶應告彼言由名色緣有觸阿難若有人問由決定緣有名色耶應答言有若復問言由云何緣有名色耶應答彼言由識緣有名色阿難若有人問由決定緣而有識耶應答言有若復問言由云何緣而有識耶應答彼言由名色緣有識三阿難如是緣名色生識緣識生名色緣名色生觸緣觸生受緣受生愛緣愛生取緣取生有緣有生生緣生生老死緣老死生愁悲苦憂惱於是有一切苦蘊集四由生緣有老死既言之矣阿難云何由生緣有老死當如是知阿難若任何者在任何處一切無生如天之於天相乾闥婆之於乾闥婆相夜叉之於夜叉相物精之於物精相人之於人相四足之於四足相鳥之於鳥相蝎蛇之於蝎蛇相阿難若諸有情於如實相無有生時即無一切生時由生滅故亦得施設老死耶是實不然世尊是故阿難此即老死因有其因緣有其集有其緣曰生是也五由有緣有生既言之矣阿難云何由有緣有生當如是知阿難若任何者在任何處一切無有如欲有色有無色有無一切有時由有滅故亦得施設生耶是實不然世尊是故阿難此即生因有其因緣有其集有其緣曰有是也六由取緣有有既言之矣阿難云何由取緣有有當如是知阿難若任何者在任何處一切無取如欲取見取戒取我取無一切取時由取滅故亦得施設有耶是實不然世尊是故阿難此即有因有其因緣有其集有其緣曰取是也七由愛緣有取既言之矣阿難云何由愛緣有取當如是知阿難若任何者在任何處一切無愛如色愛聲愛香愛味愛觸愛法愛無一切愛時由愛滅故亦得施設取耶是實不然世尊是故阿難此即取因有其因緣有其集有其緣曰愛是也八由受緣有愛既言之矣阿難云何由受緣有愛當如是知阿難若任何者在任何處一切無受如眼觸所生受耳觸所生受鼻觸所生受舌觸所生受身觸所生受意觸所生受無一切受時由受滅故亦得施設愛耶是實不然世尊是故阿難此即愛因有其因緣有其集有其緣曰愛是也九阿難如是緣受生愛緣愛生求緣求生利緣利生用緣用生欲欲貪緣欲生著緣著生嫉緣嫉生守緣守生護緣護生劍杖鬬諍爭競爭論惡口妄語等無數罪惡法一緣護生劍杖鬬諍爭競爭論惡口妄語等無數罪惡法既言之矣阿難云何緣護生劍杖鬬諍爭競爭論惡口妄語等無數罪惡法當如是知阿難若任何者在任何處一切無護無一切護時由護滅故亦生劍杖鬬諍爭競爭論惡口妄語等無數罪惡法耶是實不然世尊是故阿難此即生劍杖鬬諍爭競爭論惡口妄語等無數罪惡法之因有其因緣有其集有其緣曰護是也一一緣守有護既言之矣阿難云何緣守有護當如是知阿難若任何者在任何處一切無守無一切守時由守滅故亦得施設護耶是實不然世尊是故阿難此即護因有其因緣有其集有其緣曰守是也一二緣嫉有守既言之矣阿難云何緣嫉有守當如是知阿難若任何者在任何處一切無嫉無一切嫉時由嫉滅故亦得施設守耶是實不然世尊是故阿難此即守因有其因緣有其集有其緣曰嫉是也一三緣著有嫉既言之矣阿難云何緣著有嫉當如是知阿難若任何者在任何處一切無著無一切著時由著滅故亦得施設嫉耶是實不然世尊是故阿難此即嫉因有其因緣有其集有其緣曰著是也一四緣欲有著既言之矣阿難云何緣欲有著當如是知阿難若任何者在任何處一切無欲無一切欲時由欲滅故亦得施設著耶是實不然世尊是故阿難此即著因有其因緣有其集有其緣曰欲是也一五緣用有欲既言之矣阿難云何緣用有欲當如是知阿難若任何者在任何處一切無用無一切用時由用滅故亦得施設欲耶是實不然世尊是故阿難此即欲因有其因緣有其集有其緣曰用是也一六緣利有用既言之矣阿難云何緣利有用當如是知阿難若任何者在任何處無一切利無一切利時由利滅故亦得施設用耶是實不然世尊是故阿難此即用因有其因緣有其集有其緣曰利是也一七緣求有利既言之矣阿難云何緣求有利當如是知阿難若任何者在任何處無一切求無一切求時由求滅故亦得施設利耶是實不然世尊是故阿難此即利因有其因緣有其集有其緣曰求是也一八緣愛有求既言之矣阿難云何緣愛有求當如是知阿難若任何者在任何處無一切愛如欲愛有愛非有愛無一切愛時由愛滅故亦得施設求耶是實不然世尊是故阿難此即求因有其因緣有其集有其緣曰愛是也阿難如是愛有二類法雖由此二類而於受則會於一一九緣觸有受既言之矣阿難云何緣觸有受當如是知阿難若任何者在任何處一切無觸如眼觸耳觸鼻觸舌觸身觸意觸無一切觸時由觸滅故亦得施設受耶是實不然世尊是故阿難此即受因有其因緣有其集有其緣曰觸是也二緣名色有觸既言之矣阿難云何緣名色有觸當如是知阿難依彼形色相貌施設名身然無其形色無其相貌時猶於色身得施設名觸心觸耶是實不然世尊阿難依彼形色相貌施設色身然無其形色相貌時猶於名身得施設有對觸身觸耶是實不然世尊阿難依彼形色相貌雖施設名身色身然無其形色相貌時猶得施設名觸有對觸耶是實不然世尊阿難依彼形色相貌雖施設名色然無其形色相貌時猶得施設名色耶是實不然世尊是故阿難此即觸因有其因緣有其集有其緣曰名色是也二一緣識有名色既言之矣阿難云何緣識有名色當如是知阿難識不入母胎時名色於母胎猶得結成耶是實不然世尊阿難識入母胎後若歸於消滅猶得現名色相耶是實不然世尊阿難若識在幼少童男童女時斷名色猶得增長發達耶是實不然世尊是故阿難此即名色因有其因緣有其集有其緣曰識是也二二緣名色有識既言之矣阿難云何緣名色有識當如是知阿難若識不依名色猶得於未來施設生老死苦集存在耶是實不然世尊是故阿難此即識因有其因緣有其集有其緣曰名色是也阿難唯於人之生老死滅或再生時唯於有名道時有言語道時有施設道時有智慧界時唯於流轉輪回而施設現相時名色悉與識俱二三阿難夫計我者説有幾種阿難計我為有色有量者説言我之我有色有量復次阿難計我為有色無量者説言我之我有色無量復次阿難計我為無色有量者説言我之我無色有量復次阿難計我為無色無量者説言我之我無色無量二四阿難此中計我説有色有量者或於現世計我説有色有量或於來世計我説有色有量彼如是思惟若有異相當使合致我之此相是故阿難謂彼執我為有色有量之邪見蓋至言也阿難此中計我説有色無量者或於現世計我説有色無量或於來世計我説有色無量彼如是思惟若有異相當使合致我之此相是故阿難謂彼執我為有色無量之邪見蓋至言也阿難此中計我説無色有量者或於現世計我説無色有量或於來世計我説無色有量乃至於來世計我説無色無量彼如是思惟若有異相當使合致我之此相是故阿難謂彼執我為無色無量之邪見蓋至言也阿難計我者所説如是二五阿難夫不計我不為是説者又有幾種阿難不計我為有色有量者不説我之我為有色有量復次阿難不計我為有色無量者不説我之我為有色無量復次阿難不計我為無色有量者不説我之我為無色有量復次阿難不計我為無色無量者不説我之我為無色無量二六阿難此中不計我為有色有量不為是説者或不於現世計我説有色有量或不於來世計我説有色有量彼不如是思惟若有異相當使合致我之此相是故阿難謂彼不執我為有色有量之邪見蓋至言也阿難此中不計我為有色無量不為是説者或不於現世計我説有色無量或不於來世計我説有色無量彼不如是思惟若有異相當使合致我之此相是故阿難謂彼不執我為有色無量之邪見蓋至言也阿難此中不計我為無色有量不為是説者或不於現世計我説無色有量或不於來世計我説無色有量彼不如是思惟若有異相當使合致我之此相是故阿難謂彼不執我為無色有量之邪見蓋至言也阿難此中不計我為無色無量不為是説者或不於現世計我説無色無量或不於來世計我説無色無量彼不如是思惟若有異相當使合致我之此相是故阿難謂彼不執我為無色無量之邪見蓋至言也阿難不計我而不説者如是二七阿難云何觀我阿難謂有如是觀我者就受而言或以受是我之我或以受實非我之我不能感受者是我之我阿難或有如是觀我者以受實非我之我